<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情エディタ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e2e8f0;
    --text2: #8892aa;
    --accent: #5b8dee;
    --green: #4ade80;
    --danger: #f87171;
    --warn: #fbbf24;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── ヘッダー ── */
  .header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 9px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 4px 14px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all .12s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn {
    padding: 5px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-export { background: #7c3aed; color: #fff; }
  .status { font-size: 12px; color: var(--text2); margin-left: auto; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--danger); }
  .status.dirty { color: var(--warn); }

  /* ── メインレイアウト: 3ペイン ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── 左: 表情リスト ── */
  .expr-list {
    width: 180px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
    padding: 10px 8px; gap: 4px;
  }
  .expr-item {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all .12s;
  }
  .expr-item:hover { color: var(--text); border-color: var(--accent); }
  .expr-item.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .expr-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .expr-del-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--danger); font-size: 14px; padding: 0 2px; line-height: 1;
    opacity: 0.6; transition: opacity .12s;
  }
  .expr-del-btn:hover { opacity: 1; }
  .expr-del-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .expr-add-btn {
    margin: 4px 0; padding: 6px 8px; border-radius: 6px;
    border: 1px dashed var(--border); background: none; color: var(--text2);
    font-size: 12px; cursor: pointer; text-align: center; transition: all .12s;
  }
  .expr-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .expr-section-title {
    font-size: 10px; letter-spacing: .08em; color: var(--text2); text-transform: uppercase;
    padding: 6px 4px 2px;
  }

  /* ── 中央: プレビュー ── */
  .preview-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: var(--bg); padding: 16px; overflow: hidden;
  }
  .preview-wrap {
    position: relative; background: #1a1a1a;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    overflow: hidden;
  }
  .preview-canvas {
    position: relative;
    /* サイズはJSで設定 */
  }
  .preview-canvas img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: contain;
  }
  .mouth-toggle {
    display: flex; gap: 6px; align-items: center;
  }
  .mouth-btn {
    padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .12s;
  }
  .mouth-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .preview-label { font-size: 11px; color: var(--text2); }

  /* ── 右: スロットピッカー ── */
  .slot-panel {
    width: 420px; flex-shrink: 0;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .slot-section {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .slot-section:last-child { border-bottom: none; }
  .expr-info-grid {
    display: grid;
    grid-template-columns: 96px minmax(0, 1fr);
    gap: 8px;
    align-items: center;
  }
  .expr-info-label {
    font-size: 11px;
    color: var(--text2);
    font-weight: 600;
  }
  .expr-info-value {
    min-width: 0;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text2);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .expr-info-input {
    width: 100%;
    padding: 7px 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
  }
  .expr-info-help {
    grid-column: 1 / -1;
    color: var(--text2);
    font-size: 11px;
    line-height: 1.5;
  }
  .slot-title {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    color: var(--text2); text-transform: uppercase; margin-bottom: 8px;
  }
  .slot-current {
    font-size: 11px; color: var(--accent); margin-bottom: 6px;
  }
  .cand-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .cand-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 4px; border-radius: 6px;
    border: 2px solid transparent; background: var(--surface2);
    transition: border-color .12s;
  }
  .cand-item:hover { border-color: var(--accent); }
  .cand-item.selected { border-color: var(--accent); background: rgba(91,141,238,.15); }
  .cand-item.selected-mouth { border-color: #7c3aed; background: rgba(124,58,237,.15); }
  /* 候補サムネ: 明るい下地で枠クリップ。中身(img)を顔部分にズーム。 */
  .cand-thumb-wrap {
    width: 116px; height: 116px; overflow: hidden; border-radius: 4px;
    background: #f3f1ea; flex-shrink: 0;
  }
  .cand-thumb {
    width: 116px; height: 116px; object-fit: contain;
    /* バスト全体の中央上寄り(顔)を拡大して余白を減らす */
    transform: scale(1.7); transform-origin: 50% 27%;
  }
  .cand-label {
    font-size: 10px; color: var(--text2); text-align: center; max-width: 116px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cand-none {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: 6px; border: 2px solid transparent;
    background: var(--surface2); cursor: pointer; font-size: 12px; color: var(--text2);
    transition: border-color .12s;
  }
  .cand-none:hover { border-color: var(--accent); }
  .cand-none.selected { border-color: var(--accent); background: rgba(91,141,238,.15); }

  /* ── 書き出し進捗 ── */
  .export-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 200; align-items: center; justify-content: center;
  }
  .export-overlay.show { display: flex; }
  .export-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    width: 560px; max-height: 60vh; display: flex; flex-direction: column; gap: 10px;
    padding: 16px;
  }
  .export-box h2 { font-size: 14px; font-weight: 600; }
  .export-log {
    flex: 1; overflow-y: auto; background: var(--bg); border-radius: 5px;
    padding: 8px 10px; font-family: monospace; font-size: 11px; color: var(--text2);
    white-space: pre-wrap; min-height: 200px;
  }
  .export-close { margin-left: auto; }

  @media (max-width: 1100px) {
    body { overflow: auto; }
    .main {
      flex-direction: column;
      overflow: auto;
    }
    .expr-list {
      width: 100%;
      max-height: 160px;
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      flex-wrap: wrap;
      align-content: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 6px;
      padding: 10px;
    }
    .expr-section-title {
      width: 100%;
      padding: 2px 2px 4px;
    }
    .expr-item,
    .expr-add-btn {
      min-width: 148px;
    }
    .preview-area {
      flex: 0 0 auto;
      min-height: 320px;
      padding: 14px 12px;
    }
    .slot-panel {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--border);
      overflow: visible;
    }
    .slot-section {
      padding: 10px 12px;
    }
    .export-box {
      width: min(560px, calc(100vw - 24px));
      max-height: calc(100dvh - 24px);
    }
  }

  @media (max-width: 720px) {
    html, body { font-size: 13px; }
    body {
      height: auto;
      min-height: 100dvh;
    }
    .header {
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px;
    }
    .header h1 {
      width: 100%;
    }
    .tabs {
      width: 100%;
    }
    .tab {
      flex: 1;
      padding: 8px 10px;
    }
    .btn {
      flex: 1 1 0;
      min-height: 38px;
      padding: 8px 10px;
    }
    .status {
      width: 100%;
      margin-left: 0;
      text-align: left;
    }
    .expr-list {
      max-height: 216px;
      padding: 8px;
    }
    .expr-item,
    .expr-add-btn {
      min-width: calc(50% - 3px);
      width: calc(50% - 3px);
    }
    .preview-area {
      min-height: 260px;
      gap: 10px;
      padding: 12px 10px;
    }
    .preview-wrap {
      max-width: 100%;
    }
    .mouth-toggle {
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mouth-btn {
      min-width: 72px;
      padding: 6px 10px;
    }
    .cand-grid {
      gap: 5px;
    }
    .cand-thumb-wrap,
    .cand-thumb {
      width: 88px;
      height: 88px;
    }
    .cand-label {
      max-width: 88px;
    }
    .cand-none {
      min-height: 38px;
    }
    .export-box {
      padding: 14px 12px;
    }
    .export-log {
      min-height: 160px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>表情エディタ</h1>
  <div class="tabs" id="charTabs">
    <button class="tab active" data-char="zundamon">ずんだもん</button>
    <button class="tab" data-char="metan">めたん</button>
  </div>
  <button class="btn btn-primary" id="btnSave">保存</button>
  <button class="btn btn-export" id="btnExport">書き出し(パーツ再生成)</button>
  <span class="status" id="statusMsg"></span>
</div>

<div class="main">
  <!-- 左: 表情リスト -->
  <div class="expr-list" id="exprList">
    <div class="expr-section-title">表情</div>
    <!-- JSで生成 -->
  </div>

  <!-- 中央: プレビュー -->
  <div class="preview-area">
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-canvas" id="previewCanvas">
        <!-- imgレイヤーはJSで生成 -->
      </div>
    </div>
    <div class="mouth-toggle">
      <span class="preview-label">口プレビュー:</span>
      <button class="mouth-btn active" data-mouth="mouth_close">close</button>
      <button class="mouth-btn" data-mouth="mouth_half">half</button>
      <button class="mouth-btn" data-mouth="mouth_open">open</button>
    </div>
  </div>

  <!-- 右: スロットピッカー -->
  <div class="slot-panel" id="slotPanel">
    <!-- JSで生成 -->
  </div>
</div>

<!-- 書き出し進捗オーバーレイ -->
<div class="export-overlay" id="exportOverlay">
  <div class="export-box">
    <h2>書き出し中...</h2>
    <pre class="export-log" id="exportLog"></pre>
    <button class="btn btn-secondary export-close" id="exportClose" disabled>閉じる</button>
  </div>
</div>

<script>
const API_BASE = window.EXPRESSION_EDITOR_API_BASE || "";
const EXPORT_ENDPOINT = window.EXPRESSION_EDITOR_EXPORT_ENDPOINT || (API_BASE + "/api/export");
const IMG_BASE = window.EXPRESSION_EDITOR_IMG_BASE || "/img/";

// ============================================================
// 状態
// ============================================================
let catalog = null;       // /api/catalog
let expressions = null;   // /api/expressions (編集中のメモリ上のデータ)
let currentChar = "zundamon";
let currentExpr = "normal";
let currentMouthSlot = "mouth_close"; // プレビューに使う口スロット
let isDirty = false;

// スロット表示順 (mouthはclose/half/openをまとめて表示)
// タスクA: shadow スロット追加（cheekの直後、fxと同様になし選択可）
const SLOTS_ORDER = ["edamame", "hair_back", "head_dress", "hair_clip", "cheek", "shadow", "brow", "eye", "mouth_close", "mouth_half", "mouth_open", "fx"];
const SLOT_LABELS = {
  "edamame": "枝豆 (edamame)",
  "hair_back": "後ろ髪 (hair_back)",
  "head_dress": "ヘッドドレス (head_dress)",
  "hair_clip": "髪留め (hair_clip)",
  "cheek": "顔色 (cheek)",
  "shadow": "影・かげり (shadow)",
  "brow": "眉 (brow)",
  "eye": "目 (eye)",
  "mouth_close": "口・close",
  "mouth_half": "口・half",
  "mouth_open": "口・open",
  "fx": "エフェクト (fx)",
};

// スロット名 → catalog の slot キー
function slotToCatalogKey(slot) {
  if (slot.startsWith("mouth_")) return "mouth";
  return slot;
}

// bangs(前髪)の URL を解決する（metanのみ存在）
function _bangsSrc(charCat) {
  if (!charCat) return null;
  // bangs は candidates ではなくバスト用の assets/avatars/<char>/bangs.png
  // prep-story が public/avatars/<char>/bangs.png にコピーする
  const file = charCat.bangs;
  return file ? "/img/" + file : null;
}

// 組み込み5種（削除禁止・特殊モーションを持つ）
const BUILTIN_EXPRESSIONS = ["normal", "happy", "surprise", "trouble", "panic"];

// 動的な表情リスト（fetchExpressions 後に expressions のキーから生成）
let expressionList = [...BUILTIN_EXPRESSIONS];

const EXPR_LABEL = {
  "normal": "普通 (normal)",
  "happy": "喜び (happy)",
  "surprise": "驚き (surprise)",
  "trouble": "困り (trouble)",
  "panic": "パニック (panic)",
};

function defaultExpressionLabel(expr) {
  const label = EXPR_LABEL[expr] || "";
  return label.replace(/\s*\([^)]*\)\s*$/, "").trim();
}

function storedExpressionLabel(expr) {
  for (const charData of Object.values(expressions || {})) {
    const raw = charData?.[expr]?.label;
    if (typeof raw === "string" && raw.trim()) return raw.trim();
  }
  return "";
}

function expressionLabel(expr) {
  return storedExpressionLabel(expr) || defaultExpressionLabel(expr);
}

function expressionDisplayLabel(expr) {
  const label = expressionLabel(expr);
  return label ? `${label} (${expr})` : expr;
}

function ensureExpressionCfg(charKey, expr) {
  if (!expressions[charKey]) expressions[charKey] = {};
  if (!expressions[charKey][expr]) expressions[charKey][expr] = {};
  return expressions[charKey][expr];
}

function setExpressionLabel(expr, label) {
  const clean = String(label || "").trim();
  for (const charKey of Object.keys(expressions || {})) {
    const cfg = ensureExpressionCfg(charKey, expr);
    if (clean) cfg.label = clean;
    else delete cfg.label;
  }
}

function updateExpressionListLabel(expr) {
  const label = document.querySelector(`.expr-item[data-expr="${CSS.escape(expr)}"] .expr-item-label`);
  if (!label) return;
  label.textContent = expressionDisplayLabel(expr);
  label.title = expr;
}

// 重ね順: hair_back → base → edamame → head_dress → hair_clip → shadow → cheek → arm → brow → eye → mouth → bangs → fx
// !顔色グループ内は下→上が かげり→青ざめ（shadowをcheekより下に）。bangsはmouthの後。
const LAYER_KEYS = ["hair_back", "base", "edamame", "head_dress", "hair_clip", "shadow", "cheek", "arm", "brow", "eye", "mouth", "bangs", "fx"];
const DEFAULT_SLOT_VALUES = {
  zundamon: { edamame: "normal" },
  metan: { hair_back: "twin_drill", head_dress: "normal", hair_clip: "heart" },
};
const OPTIONAL_SINGLE_SLOTS = new Set(["shadow", "head_dress", "hair_clip"]);

function isMultiSlot(slot) {
  return slot === "fx";
}

function normalizeSlotValue(slot, value) {
  if (!isMultiSlot(slot)) return value ?? null;
  if (Array.isArray(value)) return value.filter((v) => typeof v === "string" && v);
  if (typeof value === "string" && value) return [value];
  return [];
}

function currentSlotValue(cfg, slot) {
  if (Object.prototype.hasOwnProperty.call(cfg || {}, slot)) return normalizeSlotValue(slot, cfg?.[slot]);
  const defaultValue = DEFAULT_SLOT_VALUES[currentChar]?.[slot];
  if (defaultValue) return defaultValue;
  return normalizeSlotValue(slot, cfg?.[slot]);
}

function currentSlotLabel(slot, candidates, value) {
  if (!isMultiSlot(slot)) {
    return candidates.find(c => c.id === value)?.label ?? (value === null ? "なし" : (value || "未設定"));
  }
  const ids = normalizeSlotValue(slot, value);
  if (ids.length === 0) return "なし";
  return ids
    .map((id) => candidates.find((c) => c.id === id)?.label ?? id)
    .join(" / ");
}

// ============================================================
// 初期化
// ============================================================
async function init() {
  await Promise.all([fetchCatalog(), fetchExpressions()]);
  buildCharTabs();
  buildExprList();
  buildSlotPanel();
  renderPreview();
  setupEvents();
}

async function fetchCatalog() {
  const r = await fetch(API_BASE + "/catalog");
  catalog = await r.json();
}

async function fetchExpressions() {
  const r = await fetch(API_BASE + "/expressions");
  expressions = await r.json();
  rebuildExpressionList();
}

// expressions のキーから expressionList を再構築する。
// 組み込み5種を先頭に、追加表情をアルファベット順で続ける。
function rebuildExpressionList() {
  const allKeys = new Set();
  for (const charData of Object.values(expressions || {})) {
    for (const k of Object.keys(charData)) allKeys.add(k);
  }
  const extras = [...allKeys].filter(k => !BUILTIN_EXPRESSIONS.includes(k)).sort();
  expressionList = [...BUILTIN_EXPRESSIONS, ...extras];
  // currentExpr が存在しなければ先頭に戻す
  if (!expressionList.includes(currentExpr)) currentExpr = expressionList[0] || "normal";
}

// ============================================================
// キャラタブ
// ============================================================
function buildCharTabs() {
  document.getElementById("charTabs").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    currentChar = btn.dataset.char;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === btn));
    buildExprList();
    buildSlotPanel();
    renderPreview();
  });
}

// ============================================================
// 表情リスト（左ペイン）
// ============================================================
function buildExprList() {
  const el = document.getElementById("exprList");
  el.innerHTML = '<div class="expr-section-title">表情</div>';

  for (const expr of expressionList) {
    const item = document.createElement("div");
    item.className = "expr-item" + (expr === currentExpr ? " active" : "");
    item.dataset.expr = expr;

    const label = document.createElement("span");
    label.className = "expr-item-label";
    label.textContent = expressionDisplayLabel(expr);
    label.title = expr;
    item.appendChild(label);

    // 削除ボタン（組み込み5種は無効化）
    const del = document.createElement("button");
    del.className = "expr-del-btn";
    del.title = BUILTIN_EXPRESSIONS.includes(expr)
      ? "組み込み表情は削除できません"
      : "この表情を削除";
    del.textContent = "🗑";
    del.disabled = BUILTIN_EXPRESSIONS.includes(expr);
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteExpression(expr);
    });
    item.appendChild(del);

    item.addEventListener("click", () => {
      currentExpr = expr;
      buildExprList();
      buildSlotPanel();
      renderPreview();
    });
    el.appendChild(item);
  }

  // 表情追加ボタン
  const addBtn = document.createElement("button");
  addBtn.className = "expr-add-btn";
  addBtn.textContent = "＋ 表情を追加";
  addBtn.addEventListener("click", addExpression);
  el.appendChild(addBtn);
}

// ============================================================
// 表情追加
// ============================================================
function addExpression() {
  const name = prompt(
    "追加する表情名を入力してください。\n" +
    "使用可能: 半角英数字・ハイフン・アンダースコアのみ\n" +
    "例: angry, shy_smile, wink-left"
  );
  if (name === null) return; // キャンセル
  const trimmed = name.trim();

  // バリデーション
  if (!trimmed) {
    alert("表情名を入力してください。");
    return;
  }
  if (!/^[a-zA-Z0-9_-]+$/.test(trimmed)) {
    alert(
      "表情名に使用できない文字が含まれています。\n" +
      "使用可能文字: 半角英数字・ハイフン(-)・アンダースコア(_)\n" +
      "例: angry, shy_smile, wink-left"
    );
    return;
  }
  if (expressionList.includes(trimmed)) {
    alert("「" + trimmed + "」はすでに存在します。");
    return;
  }

  // 両キャラに追加（normal の設定を複製）
  for (const charKey of Object.keys(expressions)) {
    const normalCfg = expressions[charKey]["normal"] || {};
    const newCfg = Object.assign({}, normalCfg);
    delete newCfg.label;
    expressions[charKey][trimmed] = newCfg;
  }

  // リスト再構築 + 追加した表情を選択
  rebuildExpressionList();
  currentExpr = trimmed;
  buildExprList();
  buildSlotPanel();
  renderPreview();
  markDirty();
}

// ============================================================
// 表情削除
// ============================================================
function deleteExpression(expr) {
  if (BUILTIN_EXPRESSIONS.includes(expr)) {
    alert("組み込み表情（" + expr + "）は削除できません。");
    return;
  }
  if (!confirm("表情「" + expr + "」を両キャラから削除しますか？")) return;

  for (const charKey of Object.keys(expressions)) {
    delete expressions[charKey][expr];
  }

  rebuildExpressionList();
  // 削除した表情が選択中なら先頭に戻す
  if (currentExpr === expr) {
    currentExpr = expressionList[0] || "normal";
  }
  buildExprList();
  buildSlotPanel();
  renderPreview();
  markDirty();
}

// ============================================================
// 現在の表情設定を取得（なければデフォルト）
// ============================================================
function currentCfg() {
  return expressions?.[currentChar]?.[currentExpr] ?? {};
}

// ============================================================
// スロットピッカー（右ペイン）
// ============================================================
function buildSlotPanel() {
  const panel = document.getElementById("slotPanel");
  panel.innerHTML = "";
  const charCatalog = catalog?.[currentChar];
  if (!charCatalog) {
    panel.innerHTML = '<div style="padding:16px;color:var(--text2)">カタログ読込失敗</div>';
    return;
  }
  const cfg = currentCfg();
  const charSlots = charCatalog.slots;

  appendExpressionInfoSection(panel);

  for (const slot of SLOTS_ORDER) {
    const section = document.createElement("div");
    section.className = "slot-section";

    const title = document.createElement("div");
    title.className = "slot-title";
    title.textContent = SLOT_LABELS[slot] || slot;
    section.appendChild(title);

    const catalogKey = slotToCatalogKey(slot);
    const candidates = charSlots[catalogKey] || [];
    if (candidates.length === 0 && slot === "edamame") continue;
    const currentValue = currentSlotValue(cfg, slot);

    if (candidates.length === 0) {
      const warn = document.createElement("div");
      warn.style.cssText = "font-size:11px;color:var(--warn);padding:4px 0";
      warn.textContent = "候補なし (candidates を書き出してください)";
      section.appendChild(warn);
      panel.appendChild(section);
      continue;
    }

    // 現在の割当表示
    const curr = document.createElement("div");
    curr.className = "slot-current";
    curr.id = `slot-curr-${slot}`;
    const currLabel = currentSlotLabel(slot, candidates, currentValue);
    curr.textContent = "現在: " + currLabel;
    section.appendChild(curr);

    const grid = document.createElement("div");
    grid.className = "cand-grid";

    // fx と任意単体スロットはnullを選べる
    if (slot === "fx" || OPTIONAL_SINGLE_SLOTS.has(slot)) {
      const noneEl = document.createElement("div");
      const isSelected = isMultiSlot(slot) ? currentValue.length === 0 : currentValue === null;
      noneEl.className = "cand-none" + (isSelected ? " selected" : "");
      noneEl.dataset.slot = slot;
      noneEl.dataset.id = "__none__";
      noneEl.textContent = "なし";
      noneEl.addEventListener("click", () => assignSlot(slot, null, noneEl.dataset.id, grid, candidates));
      grid.appendChild(noneEl);
    }

    for (const cand of candidates) {
      const item = document.createElement("div");
      let selClass = "";
      if (slot.startsWith("mouth_")) {
        // mouth_* スロットは currentMouthSlot と一致するときにハイライト色を変える
        if (cand.id === currentValue) {
          selClass = slot === currentMouthSlot ? " selected-mouth" : " selected";
        }
      } else {
        const selected = isMultiSlot(slot)
          ? currentValue.includes(cand.id)
          : cand.id === currentValue;
        if (selected) selClass = " selected";
      }
      item.className = "cand-item" + selClass;
      item.dataset.slot = slot;
      item.dataset.id = cand.id;

      // 候補PNGはバスト全体クロップ＝顔パーツが小さく余白が多い。
      // 枠でクリップしつつ顔部分にズームして見やすくする。
      const thumbWrap = document.createElement("div");
      thumbWrap.className = "cand-thumb-wrap";
      const thumb = document.createElement("img");
      thumb.className = "cand-thumb";
      thumb.src = IMG_BASE + cand.file;
      thumb.alt = cand.label;
      thumb.loading = "lazy";
      thumb.onerror = () => {
        thumbWrap.style.background = "var(--surface)";
        thumb.style.opacity = "0.3";
      };
      thumbWrap.appendChild(thumb);

      const label = document.createElement("div");
      label.className = "cand-label";
      label.textContent = cand.label;
      label.title = cand.label;

      item.appendChild(thumbWrap);
      item.appendChild(label);
      item.addEventListener("click", () => assignSlot(slot, cand.id, cand.id, grid, candidates));
      grid.appendChild(item);
    }

    section.appendChild(grid);
    panel.appendChild(section);
  }

  // ── 聞き役時の表情（holdAs・引き継ぎ先） ──
  // 話し終えて聞き役に回ったとき、この表情の代わりに表示する表情を指定できる。
  {
    const section = document.createElement("div");
    section.className = "slot-section";
    const title = document.createElement("div");
    title.className = "slot-title";
    title.textContent = "聞き役時の表情（引き継ぎ先）";
    section.appendChild(title);

    const help = document.createElement("div");
    help.style.cssText = "font-size:11px;color:var(--text2);margin:4px 0 6px;line-height:1.5";
    help.textContent = "この表情で話し終えて聞き役に回ったときに表示する表情。既定は surprise/panic→normal、他はそのまま保持。ZunMeetの非話者タイルにも効く。";
    section.appendChild(help);

    const sel = document.createElement("select");
    sel.style.cssText = "width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 8px;font-size:13px";
    const defOpt = document.createElement("option");
    defOpt.value = "";
    defOpt.textContent = (currentExpr === "surprise" || currentExpr === "panic")
      ? "(既定: normal に戻す)"
      : "(既定: そのまま保持)";
    sel.appendChild(defOpt);
    for (const ex of expressionList) {
      const o = document.createElement("option");
      o.value = ex;
      o.textContent = ex + (ex === currentExpr ? "（そのまま保持）" : "");
      sel.appendChild(o);
    }
    sel.value = cfg.holdAs || "";
    sel.addEventListener("change", () => {
      if (!expressions[currentChar]) expressions[currentChar] = {};
      if (!expressions[currentChar][currentExpr]) expressions[currentChar][currentExpr] = {};
      if (sel.value) {
        expressions[currentChar][currentExpr].holdAs = sel.value;
      } else {
        delete expressions[currentChar][currentExpr].holdAs;
      }
      markDirty();
    });
    section.appendChild(sel);
    panel.appendChild(section);
  }
}

function appendExpressionInfoSection(panel) {
  const section = document.createElement("div");
  section.className = "slot-section";

  const title = document.createElement("div");
  title.className = "slot-title";
  title.textContent = "表情情報";
  section.appendChild(title);

  const grid = document.createElement("div");
  grid.className = "expr-info-grid";

  const keyLabel = document.createElement("div");
  keyLabel.className = "expr-info-label";
  keyLabel.textContent = "表情キー";
  const keyValue = document.createElement("div");
  keyValue.className = "expr-info-value";
  keyValue.textContent = currentExpr;
  keyValue.title = currentExpr;

  const nameLabel = document.createElement("label");
  nameLabel.className = "expr-info-label";
  nameLabel.htmlFor = "exprJapaneseLabel";
  nameLabel.textContent = "表示名（和名）";
  const nameInput = document.createElement("input");
  nameInput.id = "exprJapaneseLabel";
  nameInput.className = "expr-info-input";
  nameInput.type = "text";
  nameInput.value = expressionLabel(currentExpr);
  const defaultLabel = defaultExpressionLabel(currentExpr);
  nameInput.placeholder = defaultLabel ? `例: ${defaultLabel}` : "例: うれしい / 困り顔";
  nameInput.addEventListener("input", () => {
    setExpressionLabel(currentExpr, nameInput.value);
    updateExpressionListLabel(currentExpr);
    markDirty();
  });

  const help = document.createElement("div");
  help.className = "expr-info-help";
  help.textContent = "台本側の表情プルダウンに表示する名前です。表情キーは保存形式として残し、表示名は全キャラの同じ表情に同期します。";

  grid.append(keyLabel, keyValue, nameLabel, nameInput, help);
  section.appendChild(grid);
  panel.appendChild(section);
}

// ============================================================
// スロット割当
// ============================================================
function assignSlot(slot, value, dataId, grid, candidates) {
  if (!expressions[currentChar]) expressions[currentChar] = {};
  if (!expressions[currentChar][currentExpr]) expressions[currentChar][currentExpr] = {};
  let nextValue = value;
  if (isMultiSlot(slot)) {
    const current = currentSlotValue(expressions[currentChar][currentExpr], slot);
    if (value === null) {
      nextValue = [];
    } else {
      nextValue = current.includes(value)
        ? current.filter((id) => id !== value)
        : [...current, value];
    }
  }
  expressions[currentChar][currentExpr][slot] = nextValue;

  // グリッド内の selected クラスを更新
  for (const el of grid.querySelectorAll(".cand-item, .cand-none")) {
    const selectedValues = isMultiSlot(slot)
      ? currentSlotValue(expressions[currentChar][currentExpr], slot)
      : expressions[currentChar][currentExpr][slot];
    const isMatch = isMultiSlot(slot)
      ? (el.dataset.id === "__none__" ? selectedValues.length === 0 : selectedValues.includes(el.dataset.id))
      : el.dataset.id === dataId;
    if (slot.startsWith("mouth_")) {
      el.classList.toggle("selected-mouth", isMatch && slot === currentMouthSlot);
      el.classList.toggle("selected", isMatch && slot !== currentMouthSlot);
    } else {
      el.classList.toggle("selected", isMatch);
    }
  }

  // 現在割当表示更新
  const currEl = document.getElementById("slot-curr-" + slot);
  if (currEl) {
    currEl.textContent = "現在: " + currentSlotLabel(slot, candidates, expressions[currentChar][currentExpr][slot]);
  }

  markDirty();
  renderPreview();
}

// ============================================================
// プレビュー描画
// ============================================================
let _previewImgs = {}; // key -> img element

const PREVIEW_SIZE = 380; // プレビューキャンバスの表示サイズ(px)

function renderPreview() {
  const canvas = document.getElementById("previewCanvas");
  canvas.style.width = PREVIEW_SIZE + "px";
  canvas.style.height = PREVIEW_SIZE + "px";
  const wrap = document.getElementById("previewWrap");
  wrap.style.width = PREVIEW_SIZE + "px";
  wrap.style.height = PREVIEW_SIZE + "px";

  const charCat = catalog?.[currentChar];
  const cfg = currentCfg();

  const fxSrcs = _candidateSrcs(charCat, "fx", cfg["fx"]);

  // 重ね順: hair_back → base → edamame → head_dress → hair_clip → shadow → cheek → arm → brow → eye → mouth → bangs → fx
  // !顔色グループ内は下→上が かげり→青ざめ。shadow(かげり)を cheek より下に。
  // mouth は currentMouthSlot の値を使う
  const withDefault = (slot) => Object.prototype.hasOwnProperty.call(cfg || {}, slot)
    ? cfg[slot]
    : DEFAULT_SLOT_VALUES[currentChar]?.[slot];
  const layers = [
    { key: "hair_back", src: _candidateSrc(charCat, "hair_back", withDefault("hair_back")) },
    { key: "base",   src: charCat?.base ? IMG_BASE + charCat.base : null },
    { key: "edamame", src: _candidateSrc(charCat, "edamame", withDefault("edamame")) },
    { key: "head_dress", src: _candidateSrc(charCat, "head_dress", withDefault("head_dress")) },
    { key: "hair_clip", src: _candidateSrc(charCat, "hair_clip", withDefault("hair_clip")) },
    { key: "shadow", src: _candidateSrc(charCat, "shadow", cfg["shadow"]) },
    { key: "cheek",  src: _candidateSrc(charCat, "cheek",  cfg["cheek"]) },
    { key: "arm",    src: charCat?.arm  ? "/img/" + charCat.arm  : null },
    { key: "brow",   src: _candidateSrc(charCat, "brow",   cfg["brow"]) },
    { key: "eye",    src: _candidateSrc(charCat, "eye",    cfg["eye"]) },
    { key: "mouth",  src: _candidateSrc(charCat, "mouth",  cfg[currentMouthSlot]) },
    { key: "bangs",  src: _bangsSrc(charCat) },
  ];

  // 既存の img を再利用/追加/削除
  for (const { key, src } of layers) {
    if (!_previewImgs[key] || _previewImgs[key].parentNode !== canvas) {
      const img = document.createElement("img");
      img.dataset.layerKey = key;
      canvas.appendChild(img);
      _previewImgs[key] = img;
    }
    const img = _previewImgs[key];
    if (src) {
      if (img.src !== location.origin + src) img.src = src;
      img.style.display = "";
    } else {
      img.style.display = "none";
    }
  }

  for (const key of Object.keys(_previewImgs)) {
    if (key.startsWith("fx-")) {
      _previewImgs[key].style.display = "none";
    }
  }
  fxSrcs.forEach((src, index) => {
    const key = `fx-${index}`;
    if (!_previewImgs[key] || _previewImgs[key].parentNode !== canvas) {
      const img = document.createElement("img");
      img.dataset.layerKey = key;
      canvas.appendChild(img);
      _previewImgs[key] = img;
    }
    const img = _previewImgs[key];
    if (img.src !== location.origin + src) img.src = src;
    img.style.display = "";
  });
}

function _candidateSrc(charCat, slot, id) {
  if (!id || !charCat) return null;
  const candidates = charCat.slots?.[slot] || [];
  const cand = candidates.find(c => c.id === id);
  return cand ? IMG_BASE + cand.file : null;
}

function _candidateSrcs(charCat, slot, ids) {
  const list = normalizeSlotValue(slot, ids);
  return list
    .map((id) => _candidateSrc(charCat, slot, id))
    .filter(Boolean);
}

// ============================================================
// ダーティフラグ
// ============================================================
function markDirty() {
  isDirty = true;
  const s = document.getElementById("statusMsg");
  s.className = "status dirty";
  s.textContent = "未保存の変更あり";
}

function clearDirty() {
  isDirty = false;
  const s = document.getElementById("statusMsg");
  s.className = "status ok";
  s.textContent = "保存しました";
  setTimeout(() => { if (!isDirty) { s.textContent = ""; s.className = "status"; } }, 3000);
}

// ============================================================
// 保存
// ============================================================
async function saveExpressions() {
  const s = document.getElementById("statusMsg");
  s.className = "status";
  s.textContent = "保存中...";
  try {
    const r = await fetch(API_BASE + "/expressions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(expressions),
    });
    const result = await r.json();
    if (r.ok && result.ok) {
      clearDirty();
      try {
        if (window.parent && window.parent !== window && window.parent.storyPlayer?.reloadExpressions) {
          window.parent.storyPlayer.reloadExpressions();
        }
      } catch (e) {}
    } else {
      s.className = "status err";
      s.textContent = result.error || "保存失敗";
    }
  } catch (e) {
    s.className = "status err";
    s.textContent = "通信エラー";
  }
}

// ============================================================
// 書き出し（パーツ再生成）
// ============================================================
async function startExport() {
  const overlay = document.getElementById("exportOverlay");
  const log = document.getElementById("exportLog");
  const closeBtn = document.getElementById("exportClose");
  const h2 = overlay.querySelector("h2");

  log.textContent = "";
  h2.textContent = "書き出し中...";
  closeBtn.disabled = true;
  overlay.classList.add("show");

  try {
    const r = await fetch(EXPORT_ENDPOINT, { method: "POST" });
    if (!r.ok) {
      log.textContent += "[ERROR] HTTP " + r.status + "\n";
      h2.textContent = "書き出し失敗";
      closeBtn.disabled = false;
      return;
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let done = false;
    let buf = "";
    while (!done) {
      const { value, done: d } = await reader.read();
      done = d;
      if (value) {
        buf += decoder.decode(value, { stream: true });
        // センチネル確認
        if (buf.includes("__DONE__ ok")) {
          log.textContent += buf.replace("__DONE__ ok\n", "");
          h2.textContent = "書き出し完了";
          try {
            if (window.parent && window.parent !== window && window.parent.storyPlayer?.reloadExpressions) {
              window.parent.storyPlayer.reloadExpressions();
            }
          } catch (e) {}
          break;
        } else if (buf.includes("__DONE__ err")) {
          const errLine = buf.split("__DONE__ err")[1] || "";
          log.textContent += buf.replace("__DONE__ err" + errLine, "");
          log.textContent += "[ERR] " + errLine;
          h2.textContent = "書き出し失敗";
          break;
        }
        log.textContent += buf;
        buf = "";
        log.scrollTop = log.scrollHeight;
      }
    }
    log.scrollTop = log.scrollHeight;
  } catch (e) {
    log.textContent += "[ERROR] " + e + "\n";
    h2.textContent = "書き出し失敗";
  }
  closeBtn.disabled = false;
}

// ============================================================
// イベント
// ============================================================
function setupEvents() {
  document.getElementById("btnSave").addEventListener("click", saveExpressions);
  document.getElementById("btnExport").addEventListener("click", startExport);
  document.getElementById("exportClose").addEventListener("click", () => {
    document.getElementById("exportOverlay").classList.remove("show");
  });

  // 口プレビュートグル
  for (const btn of document.querySelectorAll(".mouth-btn")) {
    btn.addEventListener("click", () => {
      currentMouthSlot = btn.dataset.mouth;
      document.querySelectorAll(".mouth-btn").forEach(b => b.classList.toggle("active", b === btn));
      // スロットパネルの mouth ハイライトも更新
      buildSlotPanel();
      renderPreview();
    });
  }

  // 未保存離脱確認
  window.addEventListener("beforeunload", e => {
    if (isDirty) {
      e.preventDefault();
      e.returnValue = "";
    }
  });
}

// ============================================================
// エントリポイント
// ============================================================
init().catch(e => {
  document.getElementById("statusMsg").className = "status err";
  document.getElementById("statusMsg").textContent = "初期化失敗: " + e.message;
  console.error(e);
});
</script>
