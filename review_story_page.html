<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ストーリー編集</title>
<style>__CSS__
  .theme { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
  .theme input { flex:1; font-size:16px; font-weight:700; background:#0c0f15; color:var(--fg);
                 border:1px solid var(--line); border-radius:8px; padding:8px 12px; }
  .estbar { background:#0c0f15; border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin-bottom:14px; }
  .estbar b { font-size:15px; } .estbar .es { color:var(--sub); font-size:12px; margin-left:8px; }
  .estbar .es2 { margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
  .estbar .es3 { font-size:11px; color:var(--sub); background:var(--line); padding:2px 9px; border-radius:999px; }
  .sec { background:var(--card); border:1px solid var(--line); border-radius:12px;
         margin-bottom:12px; overflow:hidden; }
  .sec.open { border-color:var(--accent); }
  .sechead { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; }
  .sechead:hover { background:#222a37; }
  .sechead .selcb { width:17px; height:17px; flex:none; cursor:pointer; accent-color:#ffd84d; }
  #regen { background:var(--line); color:var(--fg); }
  #regen:not(:disabled) { background:#ffd84d; color:#1a1a1a; }
  #regen:disabled { opacity:.45; cursor:default; }
  #lockov { position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center;
            background:rgba(8,10,14,.78); backdrop-filter:blur(1px); }
  .lockbox { display:flex; flex-direction:column; align-items:center; gap:14px; color:var(--fg); font-size:15px;
             background:#11151c; border:1px solid var(--line); border-radius:12px; padding:28px 38px; text-align:center; }
  .spin { width:30px; height:30px; border:3px solid var(--line); border-top-color:#ffd84d;
          border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .badge { font-size:12px; padding:2px 10px; border-radius:999px; background:var(--line);
           color:var(--sub); flex:none; }
  .conf { font-size:11px; padding:2px 8px; border-radius:999px; flex:none; font-weight:700; }
  .conf.high { background:#173a25; color:#5fd08a; }       /* 確度: 高=採用OK */
  .conf.medium { background:#3a3217; color:#ffcc4d; }     /* 中=要裏取り・断定回避 */
  .conf.low { background:#3a1d1d; color:#ff6b6b; }        /* 低=原則不採用 */
  .vizb { font-size:11px; padding:2px 8px; border-radius:999px; flex:none; background:#2a2440; color:#c4a8ff; font-weight:700; }
  .sechead .ttl { font-weight:700; flex:none; max-width:34%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sechead .sum { color:var(--sub); font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .thumbs { display:flex; gap:4px; flex:none; }
  .thumbs .th { width:40px; height:24px; border-radius:4px; object-fit:cover; background:#0c0f15;
                border:1px solid var(--line); }
  .thumbs .ph { width:40px; height:24px; border-radius:4px; background:#0c0f15; border:1px dashed var(--line);
                display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:10px; }
  .body { padding:0 16px 16px; }
  input[type=text], textarea, select { font:inherit; background:#0c0f15; color:var(--fg);
          border:1px solid var(--line); border-radius:6px; padding:6px 9px; }
  textarea { width:100%; resize:vertical; overflow:hidden; }
  .lbl { color:var(--sub); font-size:12px; margin:10px 0 4px; }
  .imgrow { display:flex; gap:8px; align-items:center; padding:6px; background:#0c0f15;
            border-radius:8px; margin-bottom:6px; flex-wrap:wrap; }
  .imgrow { align-items:flex-start; }
  .imgrow img, .imgrow .ph2 { width:320px; height:180px; object-fit:contain; background:#11151c;
            border:1px solid var(--line); border-radius:6px; flex:none; }
  /* クロップ反映サムネ：枠内にクロップ後の領域だけを表示（render結果に近い見た目） */
  .imgrow .imgthumb { width:320px; height:180px; position:relative; overflow:hidden; background:#11151c;
            border:1px solid var(--line); border-radius:6px; flex:none; }
  .imgrow .imgthumb img { border:none; border-radius:0; }
  /* 透過余白の表現＝市松模様（背景は固定でないため特定色を出さない） */
  .imgrow .imgthumb.transbg { background-color:#fff; background-image:
    linear-gradient(45deg,#d6dae0 25%,transparent 0),linear-gradient(-45deg,#d6dae0 25%,transparent 0),
    linear-gradient(45deg,transparent 75%,#d6dae0 0),linear-gradient(-45deg,transparent 75%,#d6dae0 0);
    background-size:16px 16px; background-position:0 0,0 8px,8px -8px,-8px 0; }
  .imgrow .ph2 { display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:11px; }
  .imgrow .fields { flex:1; display:flex; flex-direction:column; gap:7px; min-width:0; }
  .imgrow .fields .frow { display:flex; gap:8px; align-items:center; }
  .imgrow .fields input, .imgrow .fields select { width:100%; }
  .imgrow .fields .szinfo { font-size:11px; color:var(--sub); font-variant-numeric:tabular-nums; min-height:13px; }
  .fl { display:flex; flex-direction:column; gap:2px; }
  .fll { font-size:10px; color:var(--sub); }
  .imgrow .fields .frow { align-items:flex-end; }
  .candpanel { background:#0c0f15; border:1px solid var(--line); border-radius:8px; padding:8px; margin:2px 0 8px; }
  .ctabs { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .ctab { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--line);
          background:transparent; color:var(--sub); cursor:pointer; }
  .ctab.on { background:#ffd84d; color:#1a1a1a; border-color:#ffd84d; }
  .chint { font-size:12px; color:var(--sub); padding:8px 2px; }
  .cgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
  .ccell { cursor:pointer; border:2px solid transparent; border-radius:6px; overflow:hidden; background:#11151c; }
  .ccell:hover { border-color:#ffd84d; }
  .ccell.busy { opacity:.5; pointer-events:none; }
  .ccell img { width:100%; height:90px; object-fit:cover; display:block; }
  .ccap { font-size:9px; color:var(--sub); padding:2px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cfoot { display:flex; justify-content:center; padding:8px 0 2px; color:var(--sub); font-size:12px; }
  /* 候補の拡大確認オーバーレイ */
  .cprev { position:fixed; inset:0; background:rgba(0,0,0,.78); display:flex; align-items:center;
           justify-content:center; z-index:50; padding:24px; }
  .cprevbox { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;
              display:flex; flex-direction:column; gap:10px; max-width:90vw; max-height:90vh; }
  .cprevbox img { max-width:84vw; max-height:72vh; object-fit:contain; border-radius:6px; background:#0c0f15; }
  .cprevcap { font-size:12px; color:var(--sub); word-break:break-all; }
  .cprevrow { display:flex; gap:10px; justify-content:flex-end; }
  .cprevrow button { font-size:14px; padding:8px 18px; border-radius:8px; border:none; cursor:pointer;
                     background:var(--line); color:#fff; font-weight:700; }
  .cprevrow button.primary { background:var(--accent); }
  .imgrow .fields .frow select { flex:1; }
  .imgrow .fields .q { font-size:14px; }
  button.mini { font-size:12px; padding:5px 9px; background:var(--line); color:#fff; border:none;
                border-radius:6px; cursor:pointer; font-weight:700; }
  main { max-width:1500px; }
  .turn { display:grid; grid-template-columns:120px 1fr 200px auto; gap:10px; align-items:start;
          padding:6px 0 6px 12px; border-top:1px solid var(--line); border-left:4px solid transparent; }
  .turn .sp { font-size:14px; font-weight:700; padding-top:8px; display:flex; align-items:center; gap:6px; }
  .turn .sp .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .adjust { display:flex; gap:16px; flex-wrap:wrap; margin:2px 0 10px; padding:12px;
            background:#0c0f15; border:1px solid var(--accent); border-radius:8px; }
  .adjust .crop { position:relative; width:560px; height:315px; max-width:100%; background:#11151c; cursor:crosshair;
            flex:none; border-radius:6px; overflow:hidden; user-select:none; }
  .adjust .crop img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
  .adjust .croprect { position:absolute; border:2px solid #ffd84d; background:rgba(255,216,77,.12); pointer-events:none; }
  .adjust .ctl { display:flex; flex-direction:column; gap:8px; min-width:260px; flex:1; }
  .adjust .filters { display:grid; grid-template-columns:auto 1fr; gap:4px 8px; align-items:center; font-size:12px; color:var(--sub); }
  .adjust .filters input[type=range] { width:100%; }
  .adjust .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .adjust .chk { font-size:12px; color:var(--sub); display:flex; align-items:center; gap:5px; }
  .adjust input[type=text] { flex:1; min-width:120px; }
  .adjust select { background:#11151c; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:5px 8px; }
  .adjust .hint { color:var(--sub); font-size:12px; min-height:14px; }
  .cutpick { display:flex; flex-wrap:wrap; gap:5px; }
  .copt { width:88px; height:50px; border:2px solid transparent; border-radius:6px; overflow:hidden;
          cursor:pointer; background:#0c0f15; flex:none; position:relative; }
  .copt.sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent); }
  .copt img { width:100%; height:100%; object-fit:cover; }
  .copt .ph3 { display:flex; width:100%; height:100%; align-items:center; justify-content:center;
          color:var(--sub); font-size:11px; }
  .copt .num { position:absolute; left:2px; top:1px; font-size:10px; color:#fff; background:rgba(0,0,0,.55);
          padding:0 4px; border-radius:3px; }
  .turn .acts { display:flex; flex-direction:column; gap:4px; }
  .turn .acts button { font-size:11px; padding:4px 8px; background:var(--line); color:#fff; border:none; border-radius:6px; cursor:pointer; }
  .turn .acts button.del { background:transparent; color:#c66; }
  .vchips { display:flex; gap:5px; flex-wrap:wrap; padding:0 0 8px 30px; margin-top:-2px; }
  .vchip { font-size:11px; padding:2px 10px; border-radius:999px; border:1px solid var(--line);
           background:transparent; color:var(--sub); cursor:pointer; }
  .vchip.on { background:#2a2440; color:#c4a8ff; border-color:#5a4a8a; font-weight:700; }
  .vchip.dis { opacity:.38; cursor:not-allowed; }
  .vchip.edit { border-color:#5a4a8a; color:#c4a8ff; }
  .vchip.range { font-size:10px; padding:1px 7px; }
  .vizcontent { margin:0 0 10px 30px; padding:10px; background:#0c0f15; border:1px solid #5a4a8a; border-radius:8px; }
  /* 演出の表示範囲バー：開始カード＋範囲内の行を紫の左帯でつなぐ */
  .vizrow { border-left:5px solid #7a5cff !important; }
  .vizhdr { display:flex; align-items:center; gap:8px; margin:8px 0 0; padding:5px 12px;
            border-left:5px solid #7a5cff; background:rgba(122,92,255,0.12); border-radius:0 6px 6px 0; }
  .vizhdr-t { font-size:13px; font-weight:800; color:#c4a8ff; }
  .cutpick.vizmuted { color:var(--sub); font-size:11px; font-style:italic; align-items:center; }
  /* === セリフ駆動ワークスペース：左=セリフ / 中央=プレビュー / 右=設定 / 下=タイムライン === */
  body { overflow:hidden; }
  body > header { height:56px; box-sizing:border-box; }
  main#main { width:100%; max-width:none; height:calc(100vh - 56px); padding:8px; box-sizing:border-box; }
  .tp { position:relative; height:100%; display:grid; grid-template-columns:clamp(310px,22vw,380px) minmax(520px,1fr) clamp(330px,23vw,410px);
        grid-template-rows:var(--tp-split,58%) minmax(0,1fr); gap:8px; align-items:stretch; }
  /* 上段とタイムラインの高さ境界をドラッグするスプリッター（gap内に重ねる） */
  .tp-vsplit { position:absolute; left:0; right:0; height:8px; z-index:6; cursor:row-resize;
               display:flex; align-items:center; justify-content:center; }
  .tp-vsplit::before { content:""; width:64px; height:4px; border-radius:3px; background:#2c3543; transition:background .12s; }
  .tp-vsplit:hover::before, .tp-vsplit.dragging::before { background:#8b5cf6; }
  body.tp-vresizing { cursor:row-resize; user-select:none; }
  .tp-left { min-width:0; overflow:auto; background:#10141b; border:1px solid #1c232e;
             border-radius:10px; padding:10px; }
  .tp-center { min-width:0; overflow:hidden; background:#10141b; border:1px solid #1c232e;
               border-radius:10px; padding:10px; display:flex; flex-direction:column; }
  .preview-toolbar { display:flex; align-items:center; gap:8px; min-height:34px; margin-bottom:8px; }
  .preview-toolbar .spacer { flex:1; }
  .preview-chip { color:var(--sub); background:#1a212c; border:1px solid #2b3442; border-radius:7px;
                  padding:5px 9px; font-size:11px; }
  .preview-viewport { flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
                      overflow:hidden; background:#080a0f; border-radius:8px; container-type:size; }
  .remotion-player-host { flex:none; overflow:hidden; border-radius:8px; background:#080a0f; aspect-ratio:16/9;
                          width:min(100cqw,calc(100cqh * 16 / 9)); height:min(100cqh,calc(100cqw * 9 / 16)); }
  .remotion-player-loading { height:100%; display:flex; align-items:center; justify-content:center;
                             color:var(--sub); font-size:12px; }
  .preview-stage { position:relative; flex:none; overflow:hidden; border-radius:8px; background:#0b0e13;
                   display:flex; align-items:center; justify-content:center; aspect-ratio:16/9;
                   width:min(100cqw,calc(100cqh * 16 / 9)); height:min(100cqh,calc(100cqw * 9 / 16)); }
  .preview-stage img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.82; }
  .preview-empty { color:var(--sub); font-size:13px; }
  .preview-caption { position:absolute; left:5%; right:5%; bottom:5%; z-index:2; padding:10px 16px;
                     background:rgba(8,11,16,.82); border-radius:8px; color:#fff; text-align:center;
                     font-size:clamp(14px,1.7vw,28px); font-weight:800; line-height:1.45; text-shadow:0 2px 5px #000; }
  .preview-speaker { position:absolute; left:5%; bottom:calc(5% + 64px); z-index:3; padding:3px 9px;
                     border-radius:999px; color:#fff; font-size:11px; font-weight:800; }
  .preview-telop { position:absolute; z-index:4; transform:translate(-50%,-50%); padding:7px 18px;
                   border:2px solid #ffd84d; border-radius:8px; background:#121a28; color:#ffd84d;
                   font-weight:900; white-space:pre-line; text-align:center; }
  .preview-controls { display:flex; align-items:center; justify-content:center; gap:12px; min-height:42px;
                      margin-top:8px; color:var(--sub); font-size:12px; }
  .preview-controls button { min-width:52px; height:30px; border:0; border-radius:7px; background:#1a212c;
                             color:var(--fg); cursor:pointer; }
  /* 右ペイン＝補助。背景に寄せ視覚優先度を下げる（細い罫線・低コントラスト） */
  .tp-right { min-width:0; max-height:none; overflow:auto;
              background:#10141b; border:1px solid #1c232e; border-radius:12px; padding:0 12px 12px; }
  /* 広げる：左に被さる大きいパネル */
  .tp-right.wide { position:fixed; top:64px; right:14px; bottom:14px; width:min(960px,84vw);
                   max-height:none; z-index:30; box-shadow:0 12px 48px rgba(0,0,0,.55); }
  /* 右ペイン上端に固定するツールバー（スクロールしても消えない） */
  .rwbar { position:sticky; top:0; z-index:5; display:flex; justify-content:flex-end; align-items:center;
           background:#10141b; margin:0 -12px 10px; padding:9px 12px; border-bottom:1px solid #1c232e; }
  .rwbtn { font-size:12px; font-weight:700; padding:6px 12px; border-radius:7px; border:none;
           background:#1a212c; color:var(--sub); cursor:pointer; }
  .rwbtn:hover { color:var(--fg); background:#222a37; }
  .rwbtn.wide { background:#ffd84d; color:#1a1f2b; }  /* 拡大中の「戻す」は目立たせる */
  /* 章＝セクション。章間は大きく空ける。選択中の章だけ淡く強調 */
  .chsec { margin:30px 0 0; padding:2px 0; border-radius:14px; border-left:3px solid transparent; }
  .chsec.active { background:#12171f; border-left-color:#39424f; padding:2px 10px 6px; }
  .chsec:first-child { margin-top:8px; }
  .chdiv { display:flex; align-items:center; gap:9px; margin:0 0 10px; padding:6px 2px; }
  .chdiv .ttl { font-weight:700; font-size:14.5px; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .chdiv .chedit { flex:none; margin-left:auto; padding:4px 8px; font-size:12px; line-height:1; white-space:nowrap; }
  .chdiv .selcb { width:16px; height:16px; flex:none; accent-color:#ffd84d; }
  .chdiv .chev { background:transparent; border:none; color:var(--sub); font-size:13px; padding:2px 4px; cursor:pointer; flex:none; border-radius:5px; }
  .chdiv .chev:hover { background:#1c232e; color:var(--fg); }
  .chdiv .chcnt { font-size:11px; color:var(--sub); flex:none; display:none; }
  .chsec.collapsed .chcnt { display:inline-block; }
  .chsec.collapsed .line { display:none; }
  /* セリフカード＝Discord風（アイコン＋名前＋本文）。余白広め・罫線なし・6px左カラー */
  .line { position:relative; display:flex; gap:10px; align-items:flex-start; padding:11px 12px; margin-bottom:8px; border-radius:10px;
          cursor:pointer; background:#161b24; border-left:6px solid transparent; }
  .line:hover { background:#1a212c; }
  .line.sel { background:#1f2835; }
  .line .av { width:30px; height:30px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
              font-size:14px; font-weight:800; color:#fff; }
  .line .lc { flex:1; min-width:0; }
  .line .nm { font-weight:700; font-size:12.5px; margin-bottom:3px; }
  .line .tx { font-size:14.5px; line-height:1.8; color:var(--fg); white-space:pre-wrap; word-break:break-word; }
  .line .tx.empty { color:var(--sub); }
  .line textarea { width:100%; font-size:14.5px; line-height:1.7; min-height:46px; }
  .line .mk { flex:none; display:flex; gap:4px; align-items:center; }
  .line.sel .mk { display:none; }
  .line .mk img { width:40px; height:24px; object-fit:cover; border-radius:4px; }
  .line .mk .vz { font-size:11px; color:#a99adf; }
  .line .lacts { display:none; position:absolute; top:6px; right:6px; z-index:3; gap:5px; align-items:center;
                 padding:3px; border-radius:7px; background:rgba(16,20,27,.92); }
  .line.sel .lacts { display:flex; }
  .line .lacts button { font-size:11px; padding:4px 9px; background:#2a323e; color:var(--fg); border:none; border-radius:6px; cursor:pointer; }
  .line .lacts button.del { background:transparent; color:#c97; }
  .line .lacts .lacts-sep { width:1px; height:18px; background:var(--line); margin:0 1px; flex:none; }
  .rtabs { display:flex; gap:6px; margin-bottom:10px; }
  .rtab { font-size:13px; font-weight:700; padding:7px 13px; border-radius:8px; border:none;
          background:#1a212c; color:var(--sub); cursor:pointer; }
  .rtab.on { background:#2a2440; color:#c4a8ff; }
  .rtab.imgon { background:#23354f; color:#cfe0ff; }
  .rhead { position:sticky; top:0; z-index:5; background:var(--bg); padding:2px 0 6px; margin-bottom:4px; border-bottom:1px solid var(--line); }
  .rinfo { font-size:11px; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sec { margin-bottom:14px; }
  .sec-head { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#c4a8ff; margin:0 0 6px; }
  .sec-count { font-size:10px; font-weight:600; color:var(--sub); background:#1a212c; border-radius:999px; padding:1px 7px; }
  .savehint { font-size:10px; color:var(--sub); margin:0 0 8px; line-height:1.5; }
  .savehint.auto { color:#7fb0e0; }
  .adjsub { margin:4px 0; }
  .adjsub > summary { cursor:pointer; font-size:11px; color:var(--sub); padding:4px 0; list-style:revert; }
  .adjsub[open] > summary { color:#c4a8ff; }
  .vizgrp-head { font-size:11px; font-weight:700; color:#8ea0c0; margin:10px 0 5px; border-top:1px solid var(--line); padding-top:8px; }
  .vizdesign { margin-top:6px; }
  .textfx-editor { margin-bottom:12px; padding:10px; border:1px solid #39445a; border-radius:8px; background:#0c0f15; }
  .textfx-source { padding:10px; border:1px solid #2d3745; border-radius:6px; color:var(--fg); line-height:1.7;

  const h=document.querySelector('.tp-vsplit'), tl=document.getElementById('timelinePane');
  if(h&&tl) h.style.top=(tl.offsetTop-8)+'px';   // gap(8px)内にハンドルを重ねる
}
function applyTimelineSplit(){
  const tp=document.querySelector('.tp'); if(!tp)return;
  tp.style.setProperty('--tp-split',(timelineSplit*100).toFixed(2)+'%');
  positionTimelineSplit();
}
function startTimelineSplitDrag(ev){
  ev.preventDefault();
  const tp=document.querySelector('.tp'), h=ev.currentTarget; if(!tp)return;
  h.classList.add('dragging'); document.body.classList.add('tp-vresizing');
  const MIN_TOP=320, MIN_BOTTOM=120, GAP=8;   // 上段とタイムラインが潰れない最小高さ
  const move=e=>{
    const r=tp.getBoundingClientRect();
    const maxTop=Math.max(MIN_TOP,r.height-GAP-MIN_BOTTOM);
    const topPx=Math.max(MIN_TOP,Math.min(maxTop,e.clientY-r.top));
    timelineSplit=topPx/r.height;
    tp.style.setProperty('--tp-split',(timelineSplit*100).toFixed(2)+'%'); positionTimelineSplit();
  };
  const finish=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    h.classList.remove('dragging'); document.body.classList.remove('tp-vresizing');
    localStorage.setItem('reviewTimelineSplit',timelineSplit.toFixed(4));
  };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish);
}

// D&D取り込み共通：OSファイル / data:画像 / WebのURL を ch_NN_MM に保存。行サムネと調整パネルで共用。
async function dropImport(ky, dt, attribution){
  if(dt.files && dt.files.length){
    const f=dt.files[0]; let b64, fn=f.name;
    if(f.size > 8*1024*1024){  // 大きい画像は手元で縮小してから登録（15MB制限/重さ対策）
      try{ const durl=await shrinkImage(URL.createObjectURL(f), 1920, 5*1024*1024); b64=durl.split(',')[1]; fn='resized.jpg'; }
      catch(e){ b64=await new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(f); }); }
    } else {
      b64=await new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(f); });
    }
    return api('/api/replace', {key:ky, filename:fn, dataB64:b64, attribution});
  }
  const url=(dt.getData('text/uri-list')||dt.getData('text/plain')||'').split('\\n').find(s=>s&&!s.startsWith('#'))||'';
  if(!url) return null;
  if(url.startsWith('data:image')) return api('/api/replace', {key:ky, filename:'drop.png', dataB64:url.split(',')[1], attribution});
  return api('/api/import-url', {key:ky, url, attribution});
}
// 候補画像の取得（取得先別・DLせずサムネ表示）。1検索=複数件で追加課金なし。
// lang/query は前回値を引き継ぐ（取得先タブ切替で言語が変わらないように）。
async function loadCand(ci,k,cut,source,lang,query,page,append){ const ky=ci+'_'+k; const prev=candState[ky]||{};
  lang = lang || prev.lang || 'en';
  query = (query!=null) ? query : (prev.query!=null ? prev.query : cut.image_query);
  page = page || 1;
  candState[ky]=Object.assign({},prev,{loading:true,error:null,lang,query}); render();
  const r=await api('/api/candidates',{query:query,kind:cut.image_kind,source:source,lang:lang,page:page});
  const base = (append && prev.candidates) ? prev.candidates : [];
  if(r.ok){ const got=r.candidates||[];
    candState[ky]={loading:false,sources:r.sources,source:r.source,candidates:base.concat(got),
                   error:null,lang,query,page:r.page||page,noMore:got.length===0};
  } else {
    candState[ky]=Object.assign({},prev,{loading:false,error:r.message||'取得失敗',
                   sources:r.sources||prev.sources||[],candidates:base,lang,query});
  }
  render();
}

// 画像を縮小してJPEG dataURLにする（巨大画像の登録対策＝720p動画には十分）。crossOrigin対応URL/Fileを受ける。
function shrinkImage(src, maxDim, maxBytes){
  return new Promise((resolve,reject)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ let w=img.naturalWidth,h=img.naturalHeight;
      const s=Math.min(1, maxDim/Math.max(w,h)); w=Math.max(1,Math.round(w*s)); h=Math.max(1,Math.round(h*s));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      try{ let q=0.88, u=cv.toDataURL('image/jpeg',q);
        while(u.length*0.75>maxBytes && q>0.4){ q-=0.1; u=cv.toDataURL('image/jpeg',q); }
        resolve(u);
      }catch(e){ reject(e); } };
    img.onerror=()=>reject(new Error('画像読み込み失敗'));
    img.src=src;
  });
}

function blobToB64(blob){ return new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(blob); }); }
async function importImageBlob(ky, ci, k, blob){
  let b64, fn='clipboard.png';
  if(blob.size > 8*1024*1024){
    try{ const durl=await shrinkImage(URL.createObjectURL(blob), 1920, 5*1024*1024); b64=durl.split(',')[1]; fn='clipboard.jpg'; }
    catch(e){ b64=await blobToB64(blob); }
  } else { b64=await blobToB64(blob); }
  const r=await api('/api/replace', {key:ky, filename:fn, dataB64:b64, attribution:''});
  if(r.ok){ cutMap[ky]=Object.assign({},cutMap[ky]||{ch:ci,ci:k},
    {image:r.filename,crop:null,filter:null,fit:null,pad:null,bg:null,hide:false}); render(); return true; }
  alert(r.message||'登録に失敗'); return false;
}
let pasteTarget=null;  // フォールバック貼り付け先
async function pasteClipboard(ky, ci, k){
  // ① Clipboard API で直接読む（Chrome等・localhost＋ユーザー操作下なら可）
  if(navigator.clipboard && navigator.clipboard.read){
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){ const ty=(it.types||[]).find(t=>t.startsWith('image/'));
        if(ty){ const blob=await it.getType(ty); await importImageBlob(ky,ci,k,blob); return; } }
      alert('クリップボードに画像がありません（先に スクショ Cmd+Ctrl+Shift+4 を撮ってください）'); return;
    }catch(e){ /* 権限拒否/非対応 → ②フォールバックへ */ }
  }
  // ② フォールバック：貼り付け先を記憶し、Cmd+V を促す（全ブラウザ対応）
  pasteTarget={ky,ci,k};
  alert('このカットを貼り付け先にしました。そのまま Cmd+V を押してください。');
}
// ページ全体の paste（Cmd+V）で画像を取り込む。pasteTarget か、調整パネルが1つだけ開いてればそこへ。
document.addEventListener('paste', async (e)=>{
  const items=(e.clipboardData&&e.clipboardData.items)||[];
  for(const it of items){ if(it.type && it.type.startsWith('image/')){
    let tgt=pasteTarget;
    if(!tgt){ const open=[...adjustOpen]; if(open.length===1){ const [a,b]=open[0].split('_').map(Number); tgt={ky:open[0],ci:a,k:b}; } }
    if(tgt){ e.preventDefault(); const blob=it.getAsFile(); pasteTarget=null; await importImageBlob(tgt.ky,tgt.ci,tgt.k,blob); }
    else { alert('貼り付け先が未選択です。カットの『📋貼付』を押してから Cmd+V してください。'); }
    return;
  } }
});
// 候補を採用：まずサーバ取得、大きすぎる時だけ手元で縮小して登録。
async function applyCandidate(ci,k,cut,ky,c){
  const st=candState[ky]||{};
  const setImg=(fn)=>{ cutMap[ky]=Object.assign({},cutMap[ky]||{ch:ci,ci:k},
    {image:fn,attribution:c.attribution,query:(st.query!=null?st.query:cut.image_query),kind:cut.image_kind});
    candOpen.delete(ky); render(); };
  const r=await api('/api/import-url',{key:ky,url:c.url,attribution:c.attribution});
  if(r.ok){ setImg(r.filename); return; }
  if(/大き|15MB|too large/i.test(r.message||'')){
    try{ const durl=await shrinkImage(c.url, 1600, 3*1024*1024);
      const r2=await api('/api/replace',{key:ky,filename:'cand.jpg',dataB64:durl.split(',')[1],attribution:c.attribution});
      if(r2.ok){ setImg(r2.filename); return; }
      alert(r2.message||'縮小登録に失敗'); return;
    }catch(e){ alert('画像が大きく自動縮小もできませんでした（手元でリサイズしてD&Dしてください）'); return; }
  }
  alert(r.message||'採用失敗');
}

function previewCandidate(ci,k,cut,ky,c){

  const box=document.createElement('div'); box.className='cprevbox';
  const im=document.createElement('img'); im.src=c.url||c.thumb; box.appendChild(im);
  if(c.attribution){ const cap=document.createElement('div'); cap.className='cprevcap'; cap.textContent=c.attribution; box.appendChild(cap); }
  const row=document.createElement('div'); row.className='cprevrow';
  const ok=document.createElement('button'); ok.className='primary'; ok.textContent='これにする';
  ok.onclick=async()=>{ ok.disabled=true; ok.textContent='登録中…'; document.body.removeChild(ov); await applyCandidate(ci,k,cut,ky,c); };
  const ng=document.createElement('button'); ng.textContent='やめる'; ng.onclick=()=>{ if(ov.parentNode) document.body.removeChild(ov); };
  row.appendChild(ok); row.appendChild(ng); box.appendChild(row);
  ov.appendChild(box);

  document.body.appendChild(ov);
}
function buildCand(ci,k,cut){ const ky=ci+'_'+k; const st=candState[ky]||{};
  const wrap=document.createElement('div'); wrap.className='candpanel';
  const tabs=document.createElement('div'); tabs.className='ctabs';
  const ll=document.createElement('span'); ll.className='fll';
  ll.textContent='検索: '+(st.lang==='ja'?'日本語「'+(st.query||'')+'」':'英語')+' ／ 取得先：';
  tabs.appendChild(ll);
  (st.sources||[]).forEach(s=>{ const b=document.createElement('button');
    b.className='ctab'+(s.id===st.source?' on':''); b.textContent=s.label;
    b.onclick=()=>loadCand(ci,k,cut,s.id,st.lang,st.query); tabs.appendChild(b); });
  const cx=document.createElement('button'); cx.className='ctab'; cx.textContent='× 閉じる';
  cx.onclick=()=>{ candOpen.delete(ky); render(); }; tabs.appendChild(cx);
  wrap.appendChild(tabs);
  const has=(st.candidates||[]).length;
  if(st.loading && !has){ wrap.insertAdjacentHTML('beforeend','<div class="chint">検索中…</div>'); return wrap; }
  if(st.error && !has){ const d=document.createElement('div'); d.className='chint'; d.textContent=st.error; wrap.appendChild(d); return wrap; }
  if(!has){ wrap.insertAdjacentHTML('beforeend','<div class="chint">候補なし（検索語や取得先を変えてください）</div>'); return wrap; }
  const grid=document.createElement('div'); grid.className='cgrid';
  st.candidates.forEach(c=>{ const cell=document.createElement('div'); cell.className='ccell'; cell.title=c.attribution||'';
    const im=document.createElement('img'); im.src=c.thumb; im.loading='lazy'; cell.appendChild(im);
    const cap=document.createElement('div'); cap.className='ccap'; cap.textContent=c.attribution||''; cell.appendChild(cap);
    cell.title='クリックで大きく確認 → 採用';
    cell.onclick=()=>previewCandidate(ci,k,cut,ky,c);  // すぐ反映せず大きいサイズで確認
    grid.appendChild(cell); });
  wrap.appendChild(grid);
  // ページング：もっと見る / 読み込み中 / これ以上なし
  const foot=document.createElement('div'); foot.className='cfoot';
  if(st.loading){ foot.textContent='読み込み中…'; }
  else if(st.noMore){ foot.textContent='これ以上ありません'; }
  else { const mb=document.createElement('button'); mb.className='ctab'; mb.textContent='もっと見る（'+has+'枚表示中）';
    mb.onclick=()=>loadCand(ci,k,cut, st.source, st.lang, st.query, (st.page||1)+1, true); foot.appendChild(mb); }
  wrap.appendChild(foot); return wrap;
}
function cssFilter(f){ return f?`brightness(${f.brightness??1}) contrast(${f.contrast??1}) grayscale(${f.grayscale??0})`:''; }
function contentRect(img,box){ const nw=img.naturalWidth,nh=img.naturalHeight; if(!nw||!nh) return {x:0,y:0,w:box.width,h:box.height};
  const s=Math.min(box.width/nw,box.height/nh),w=nw*s,h=nh*s; return {x:(box.width-w)/2,y:(box.height-h)/2,w,h}; }
// crop要素外でボタンを離しても確定するよう、ドラッグ中だけwindowでmouseを追跡する。
// 終了・キャンセル時に必ず解除するため、再描画を繰り返してもlistenerは蓄積しない。
function bindCropDrag(crop,imgEl,rectEl,onCommit,drawCrop){
  let drag=null;
  const cleanup=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',finish); window.removeEventListener('blur',cancel); };
  const move=(e)=>{ if(!drag)return; const x=e.clientX-drag.box.left,y=e.clientY-drag.box.top;
    if(!Number.isFinite(x)||!Number.isFinite(y))return; drag.x=x; drag.y=y;
    rectEl.style.display='block'; rectEl.style.left=Math.min(drag.x0,x)+'px'; rectEl.style.top=Math.min(drag.y0,y)+'px';
    rectEl.style.width=Math.abs(x-drag.x0)+'px'; rectEl.style.height=Math.abs(y-drag.y0)+'px'; };
  const finish=()=>{ if(!drag){ cleanup(); return; } const d=drag,rr=d.r,x=d.x,y=d.y;
    drag=null; cleanup();
    const nm=(px,py)=>[(px-rr.x)/rr.w,(py-rr.y)/rr.h], cl=v=>Math.max(0,Math.min(1,v));
    let [l,t]=nm(Math.min(d.x0,x),Math.min(d.y0,y)), [r,b]=nm(Math.max(d.x0,x),Math.max(d.y0,y));
    const c={l:cl(l),t:cl(t),r:cl(r),b:cl(b)};
    if(c.r-c.l<0.02||c.b-c.t<0.02){ drawCrop(); return; }
    onCommit(c); };
  const cancel=()=>{ drag=null; cleanup(); drawCrop(); };
  crop.onmousedown=(e)=>{ if(e.button!==0)return; e.preventDefault(); cleanup();
    const box=crop.getBoundingClientRect(),x0=e.clientX-box.left,y0=e.clientY-box.top;
    drag={box,r:contentRect(imgEl,box),x0,y0,x:x0,y:y0};
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',finish); window.addEventListener('blur',cancel); };
}
function mkrange(min,max,step,val){ const s=document.createElement('input'); s.type='range'; s.min=min; s.max=max; s.step=step; s.value=val; return s; }
// スライダーに −/＋ ボタンを付けて返す（ボタンは input/change を発火＝既存ハンドラを流用）。
function stepWrap(slider){
  const w=document.createElement('span'); w.style.cssText='display:inline-flex;align-items:center;gap:3px;vertical-align:middle';
  const mk=(txt,dir)=>{ const b=document.createElement('button'); b.type='button'; b.className='mini'; b.textContent=txt; b.tabIndex=-1;
    b.style.cssText='padding:2px 7px;font-size:14px;line-height:1';
    b.onclick=()=>{ const step=parseFloat(slider.step)||1, mn=parseFloat(slider.min), mx=parseFloat(slider.max);
      let v=(parseFloat(slider.value)||0)+dir*step;
      if(!isNaN(mn)) v=Math.max(mn,v); if(!isNaN(mx)) v=Math.min(mx,v);
      v=Math.round(v/step)*step; v=Math.round(v*1000)/1000;
      slider.value=v; slider.dispatchEvent(new Event('input')); slider.dispatchEvent(new Event('change')); };
    return b; };
  w.appendChild(mk('−',-1)); w.appendChild(slider); w.appendChild(mk('＋',1));
  return w;
}

function splitTurn(tn,ta){
  const text=tn.text||'';
  let pos=(ta&&ta.selectionStart)||0;
  if(!(pos>0&&pos<text.length)){
    // カーソル未指定：中央に最も近い句読点(、。！？)で割る。無ければ中央。
    // （句点が末尾だけのセリフでも空にならないよう「、」も区切り候補にする）
    const mid=text.length/2; let best=-1,bestD=1e9;
    for(let i=1;i<text.length;i++){ if('、。！？'.includes(text[i-1])){ const d=Math.abs(i-mid); if(d<bestD){bestD=d;best=i;} } }
    pos = best>0 ? best : Math.floor(text.length/2);
  }
  const a=text.slice(0,pos).trim(), b=text.slice(pos).trim();
  if(!a||!b){ alert('分割位置が不正'); return; }
  // 後半の新ターン。継続属性(話者/章/画像/感情等)のみ引き継ぎ、一点を指すflag(compare_item等)や
  // 尺(start/end/sentences)は引き継がない＝タイミングが二重にならないようにする。
  const nt={speaker:tn.speaker, text:b};
  ['chapter','section','cut','emotion','effect','voice'].forEach(k=>{ if(tn[k]!=null) nt[k]=tn[k]; });
  // 末尾に属する属性(後の無音/締め/範囲の終了)は後半へ移す（先頭からは外す）。
  ['pause','closing','chorus','viz_end'].forEach(k=>{ if(tn[k]!=null){ nt[k]=tn[k]; delete tn[k]; } });
  // 一点flag(compare_item/panel_item/panel_event/reveal/callout_item)とviz_startは先頭に残す。
  // 後半に何を出すかは下のタイミングchip（左/右(分割)など）で指定する。
  const effects=tn.textEffects||[];
  const rawA=text.slice(0,pos), rawB=text.slice(pos), aFrom=Math.max(0,rawA.indexOf(a)), bFrom=pos+Math.max(0,rawB.indexOf(b));
  const sliceFx=(from,to,part)=>effects.filter(f=>f.end>from&&f.start<to).map(f=>{ const start=Math.max(f.start,from)-from,end=Math.min(f.end,to)-from;
    return {...f,start,end,text:part.slice(start,end)}; });
  tn.textEffects=sliceFx(aFrom,aFrom+a.length,a); nt.textEffects=sliceFx(bFrom,bFrom+b.length,b);
  if(!tn.textEffects.length)delete tn.textEffects; if(!nt.textEffects.length)delete nt.textEffects;
  // 演出点(vizPoints)も同じ分割位置で前半/後半へ振り分ける（textEffectsと同基準）。
  const vps=splitVizPoints(tn.vizPoints, pos, aFrom, bFrom, a.length, b.length);
  if(vps.a.length) tn.vizPoints=vps.a; else delete tn.vizPoints;
  if(tn.vizSeg) nt.vizSeg=tn.vizSeg;             // 演出区間内なら後半も区間に属させる（変化点の有無に依らず）
  if(vps.b.length){ nt.vizPoints=vps.b;
    vps.b.forEach(p=>moveAnchorFlag(tn,nt,p));     // 後半へ移った点の対応flagも tn→nt へ移す
  }
  tn.text=a; ['start','end','sentences'].forEach(k=>delete tn[k]);
  DATA.script.splice(DATA.script.indexOf(tn)+1,0,nt); render();
}

// 画像のインライン調整パネル（fit/クロップ/補正/余白色/画像なし/差し替え/出典）。既存APIを使う。

  fit.value=cut.fit||''; fit.onchange=()=>{ cut.fit=fit.value||null; setOpt(key,{fit:fit.value||null}); };

  // filters

  const fb=mkrange(0.3,1.5,0.05,(cut.filter&&cut.filter.brightness)||1);
  const fc=mkrange(0.5,1.5,0.05,(cut.filter&&cut.filter.contrast)||1);
  const fg=mkrange(0,1,0.05,(cut.filter&&cut.filter.grayscale)||0);
  filt.innerHTML='<span>明るさ</span>'; filt.appendChild(stepWrap(fb));
  filt.insertAdjacentHTML('beforeend','<span>コントラスト</span>'); filt.appendChild(stepWrap(fc));
  filt.insertAdjacentHTML('beforeend','<span>白黒</span>'); filt.appendChild(stepWrap(fg));
  const curFilter=()=>({brightness:+fb.value,contrast:+fc.value,grayscale:+fg.value});
  const liveFilter=()=>{ if(imgEl) imgEl.style.filter=cssFilter(curFilter()); };
  [fb,fc,fg].forEach(s=>{ s.oninput=liveFilter; s.onchange=()=>{ cut.filter=curFilter(); setOpt(key,{filter:curFilter()}); }; });
  if(imgEl) imgEl.style.filter=cssFilter(cut.filter);
  const fclr=document.createElement('button'); fclr.className='mini'; fclr.textContent='補正解除';
  fclr.onclick=()=>{ fb.value=1; fc.value=1; fg.value=0; cut.filter=null; if(imgEl) imgEl.style.filter=''; setOpt(key,{filter:null}); };

  // 余白(contain) + 画像なし
  const r2=document.createElement('div'); r2.className='row'; r2.innerHTML='<span class="hint">余白(px)</span>';
  const pad=document.createElement('input'); pad.type='number'; pad.min=0; pad.max=400; pad.step=4; pad.value=cut.pad||0; pad.style.width='62px';
  pad.title='contain時、画像の周りに空ける余白(px)'; pad.onchange=()=>{ const n=parseInt(pad.value)||0; cut.pad=n||null; setOpt(key,{pad:n}); render(); };
  const bg=document.createElement('input'); bg.type='color'; bg.value=cut.bg||'#eef1f5'; bg.title='余白の背景色';
  bg.onchange=()=>{ cut.bg=bg.value; setOpt(key,{bg:bg.value}); render(); };
  const bgc=document.createElement('button'); bgc.className='mini'; bgc.textContent='余白色クリア'; bgc.title='余白の背景色を消す＝透過（動画では背景が透けて見える）';
  bgc.onclick=()=>{ cut.bg=null; bg.value='#eef1f5'; setOpt(key,{bg:null}); render(); };

  const hideL=document.createElement('label'); hideL.className='chk'; hideL.title='中央画像を出さない（背景＋立ち絵だけ）';
  const hide=document.createElement('input'); hide.type='checkbox'; hide.checked=!!cut.hide;
  hide.onchange=()=>{ cut.hide=hide.checked; setOpt(key,{hide:hide.checked}); render(); };
  hideL.appendChild(hide); hideL.appendChild(document.createTextNode(' 画像なし'));
  r2.appendChild(pad); r2.appendChild(bg); r2.appendChild(bgc); r2.appendChild(bgState); r2.appendChild(hideL);

  // 出典・クレジット（ラベル付き・1行）
  const ar=document.createElement('div'); ar.className='row'; ar.innerHTML='<span class="hint">出典・クレジット</span>';
  const attr=document.createElement('input'); attr.type='text'; attr.placeholder='例: 作者名 / CC-BY 4.0（CC-BYは必須）'; attr.value=cut.attribution||'';
  attr.style.flex='1'; attr.style.height='34px';
  attr.onchange=()=>{ const prev=cut.attribution; cut.attribution=attr.value;
    api('/api/attribution',{key,attribution:attr.value}).then(r=>{ if(!r||!r.ok){ alert('出典の保存に失敗しました: '+((r&&r.message)||'不明')); cut.attribution=prev; attr.value=prev||''; } }); };
  ar.appendChild(attr);

  // 差し替えファイル

  const file=document.createElement('input'); file.type='file'; file.accept='image/*'; file.style.display='none'; fileL.appendChild(file);
  const onNew=async(fn)=>{ await refreshCuts(); markVisualStale(); render(); };  // 差し替え後はサーバ値(出典/調整リセット)で更新
  file.onchange=()=>{ const f=file.files[0]; if(!f)return; const rd=new FileReader();
    rd.onload=async()=>{ const r=await api('/api/replace',{key,filename:f.name,dataB64:rd.result.split(',')[1],attribution:''}); r.ok?onNew(r.filename):alert(r.message||'失敗'); };
    rd.readAsDataURL(f); };
  const cclr=document.createElement('button'); cclr.className='mini'; cclr.textContent='クロップ解除';

  const clrRow=document.createElement('div'); clrRow.className='row'; clrRow.appendChild(cclr); clrRow.appendChild(fclr);

  const r3=document.createElement('div'); r3.className='row'; r3.appendChild(fileL); repl.appendChild(ar); repl.appendChild(r3);
  ctl.appendChild(repl);
  wrap.appendChild(crop); wrap.appendChild(ctl);

  // クロップ枠描画＋ドラッグ
  function drawCrop(){ if(!cut.crop||!imgEl){ rectEl.style.display='none'; return; }
    const box=crop.getBoundingClientRect(), rr=contentRect(imgEl,box);
    rectEl.style.display='block'; rectEl.style.left=(rr.x+cut.crop.l*rr.w)+'px'; rectEl.style.top=(rr.y+cut.crop.t*rr.h)+'px';
    rectEl.style.width=((cut.crop.r-cut.crop.l)*rr.w)+'px'; rectEl.style.height=((cut.crop.b-cut.crop.t)*rr.h)+'px'; }
  if(imgEl){
    // 添付・レイアウト後に描く（キャッシュ済み画像でも box=0 で枠が消えないように。editorと統一）。
    const sched=()=>requestAnimationFrame(drawCrop);
    if(imgEl.complete) sched(); else imgEl.onload=sched;
    bindCropDrag(crop,imgEl,rectEl,(c)=>{ cut.crop=c; setOpt(key,{crop:c}); render(); },drawCrop);  // render()で行サムネにもクロップ反映
    crop.addEventListener('dragover',e=>{e.preventDefault(); crop.style.outline='2px dashed #ffd84d';});
    crop.addEventListener('dragleave',()=>crop.style.outline='');
    crop.addEventListener('drop',async(e)=>{ e.preventDefault(); crop.style.outline='';
      const r=await dropImport(key, e.dataTransfer, '');  // 差し替え＝クレジット引き継がない（URLは出典URLが入る）
      if(r) r.ok?onNew(r.filename):alert(r.message||'失敗'); });
  }
  return wrap;
}

// ===== 画像エリアの演出（panel/quiz/compare/stat/callouts）のレビュー編集 =====
const VIZ_KEYS=['panel','quiz','compare','stat','callouts'];
const VIZ_LABEL={panel:'解説パネル',quiz:'クイズ',compare:'比較',stat:'数字強調',callouts:'注釈'};
function vizOf(ch){ return VIZ_KEYS.find(k=>ch[k]); }       // 章に付いている演出キー（無ければundefined）
function clearAllVizFlags(ci){ (DATA.script||[]).forEach(t=>{ if(t.chapter===ci){
  delete t.panel_event; delete t.panel_item; delete t.reveal; delete t.compare_item; delete t.callout_item;
  delete t.viz_start; delete t.viz_end; } }); }
// 章の演出表示範囲（viz_start/viz_endの発言・無ければ章の最初/最後の発言）の通し番号。
function vizRange(ci){ let first=-1,last=-1,sGi=-1,eGi=-1;
  (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter!==ci) return;
    if(first<0)first=gi; last=gi; if(t.viz_start)sGi=gi; if(t.viz_end)eGi=gi; });
  if(sGi<0)sGi=first; if(eGi<0||eGi<sGi)eGi=last;
  return {startGi:sGi, endGi:eGi, first, last}; }
// 項目を removedIdx 番目で削除した後の再採番：removedIdx は外し、それより大きい index は1繰り下げる。
function clampItemFlags(ci,flag,removedIdx){ const shift=v=> v===removedIdx?null:(v>removedIdx?v-1:v);
  (DATA.script||[]).forEach(t=>{
  if(t.chapter!==ci) return;
  if(Array.isArray(t[flag])){ const f=t[flag].map(shift).filter(x=>x!=null); if(f.length>1) t[flag]=f; else if(f.length===1) t[flag]=f[0]; else delete t[flag]; }
  else if(typeof t[flag]==='number'){ const s=shift(t[flag]); if(s==null) delete t[flag]; else t[flag]=s; }
  // 同 type の演出点も同じ規則で再採番（削除＋繰り下げ）。
  if(t.vizPoints){ const cv=shiftVizPointValues(t.vizPoints, flag, removedIdx); if(cv) t.vizPoints=cv; else delete t.vizPoints; } }); }
// panel_item を「この発言で出す項目」の集合として持つ（int or int配列）。チェックボックス的にkを付け外し。
// 1項目は1発言（同一kは他発言から外す）＝重複防止しつつ、1発言に複数項目を同時表示できる。
function togglePanelItem(ci,sid,k,tn){
  let arr = Array.isArray(tn.panel_item)?tn.panel_item.slice():(typeof tn.panel_item==='number'?[tn.panel_item]:[]);
  if(arr.includes(k)){ arr=arr.filter(x=>x!==k); removeVizPoint(tn,{type:'panel_item',value:k}); }   // 外す＝点も削除
  else { arr.push(k);
    (DATA.script||[]).forEach(t=>{ if(t.chapter===ci&&t.vizSeg===sid&&t!==tn){
      if(Array.isArray(t.panel_item)){ const f=t.panel_item.filter(x=>x!==k); if(f.length>1)t.panel_item=f; else if(f.length===1)t.panel_item=f[0]; else delete t.panel_item; removeVizPoint(t,{type:'panel_item',value:k}); }
      else if(t.panel_item===k){ delete t.panel_item; removeVizPoint(t,{type:'panel_item',value:k}); } }}); }
  arr.sort((a,b)=>a-b);
  if(arr.length>1) tn.panel_item=arr; else if(arr.length===1) tn.panel_item=arr[0]; else delete tn.panel_item;
  markDirty();
}

  op.value=(obj[opKey]!=null?obj[opKey]:defOp); op.style.cssText='width:96px;vertical-align:middle'; op.title='不透明度（左ほど透ける）';

// 喋り文字数→推定分。英字（かな）は読み仮名だけ喋る＝畳んで数える（実測較正305字/分）。
// 目標(TARGET_CHARS/LABEL)は対象がショートか本編かで /api/status から切替（ショート=約40秒）。
const SPOKEN_CPM=305; let TARGET_CHARS=8*305, TARGET_LABEL='8分';
function spokenLen(text){
  if(!text) return 0;
  let s=String(text).replace(/[0-9A-Za-z][0-9A-Za-z._\\-]*（([^（）]+)）/g,'$1');
  s=s.replace(/[\\s\\u3000（）「」『』、。！？・,.!?]/g,'');
  return [...s].length;
}
function secLbl(ch,i,all){ if(ch.section==='intro')return '導入'; if(ch.section==='outro')return '締め';
  let n=0; for(let j=0;j<=i;j++) if((all[j]||{}).section==='trivia')n++; return 'チャプター'+n; }
function buildEstimate(){
  const sc=DATA.script||[], ch=DATA.chapters||[]; const per=ch.map(()=>0); let total=0;
  sc.forEach(t=>{ const n=spokenLen(t.text); total+=n; if(typeof t.chapter==='number'&&per[t.chapter]!=null) per[t.chapter]+=n; });
  const minE=total/SPOKEN_CPM, tgtChars=TARGET_CHARS, diff=tgtChars-total;
  const w=document.createElement('div'); w.className='estbar'; w.id='estbar';
  const parts=ch.map((c,i)=>'<span class="es3">'+secLbl(c,i,ch)+' '+per[i]+'</span>').join('');
  w.innerHTML='<b>喋り '+total+'字 ≈ 推定 '+minE.toFixed(1)+'分</b>'
    +' <span class="es">目標'+TARGET_LABEL+'≈'+tgtChars+'字（'+(diff>=0?'あと'+diff+'字':(-diff)+'字オーバー')+'）</span>'
    +'<div class="es2">'+parts+'</div>';
  return w;
}
function refreshEst(){ const o=document.getElementById('estbar'); if(o) o.replaceWith(buildEstimate()); }

const SEGCOL=['#6b6ae0','#3fa3c0','#caa23f','#b05ab0','#4fa86a','#c0683f'];
function chSegs(ch){ if(!Array.isArray(ch.vizList)) ch.vizList=[]; return ch.vizList; }
function newSegId(ch){ const u=new Set(chSegs(ch).map(s=>s.id)); let i=1; while(u.has('s'+i)) i++; return 's'+i; }
function segOf(tn,ch){ if(!tn||!tn.vizSeg) return null; return chSegs(ch).find(s=>s.id===tn.vizSeg)||null; }
function segRange(ci,id){ let s=-1,e=-1; (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter===ci&&t.vizSeg===id){ if(s<0)s=gi; e=gi; } }); return {s,e}; }
// 旧・単一演出形式を vizList へ移行（描画時に一度だけ）。行に vizSeg を付け旧flagを掃除。
function migrateViz(ch,ci){
  if(Array.isArray(ch.vizList)) return;
  const k=VIZ_KEYS.find(x=>ch[x]); if(!k){ ch.vizList=[]; return; }
  const id=newSegId(ch); const seg={id:id,type:k}; seg[k]=ch[k];
  if(k==='callouts'&&ch.calloutStyle) seg.calloutStyle=ch.calloutStyle;
  ch.vizList=[seg];
  let first=-1,last=-1,rs=-1,re=-1;
  (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter!==ci) return; if(first<0)first=gi; last=gi; if(t.viz_start)rs=gi; if(t.viz_end)re=gi; });
  if(rs<0)rs=first; if(re<0||re<rs)re=last;
  (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter!==ci) return; if(gi>=rs&&gi<=re) t.vizSeg=id; delete t.viz_start; delete t.viz_end; });
  VIZ_KEYS.forEach(x=>delete ch[x]); delete ch.calloutStyle;
}
// セグメントの範囲を s..e の連続行に再タグ。隣の演出の行も境界で奪える（1行1演出）。
// 奪われて空になった演出は自動削除（pruneEmptySegs）。
function retagSeg(ci,id,s,e){
  if(s>e){ const t=s; s=e; e=t; }
  (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter!==ci) return;
    if(gi>=s&&gi<=e){ if(t.vizSeg && t.vizSeg!==id){
        // 別演出から奪う＝その演出のタイミングflag/演出点は外す（別演出のものなので）。
        delete t.panel_event; delete t.panel_item; delete t.reveal; delete t.compare_item; delete t.callout_item; delete t.vizPoints; }
      t.vizSeg=id; }
    else if(t.vizSeg===id){ delete t.vizSeg; delete t.vizPoints;
      // 範囲から外れたセリフは旧タイミングflagも消す（範囲を戻した時に古い設定が復活しないように）。
      delete t.panel_event; delete t.panel_item; delete t.reveal; delete t.compare_item; delete t.callout_item; } });
  pruneEmptySegs(ci);
}
function pruneEmptySegs(ci){
  const ch=(DATA.chapters||[])[ci]; if(!ch) return; const vl=chSegs(ch);
  for(let i=vl.length-1;i>=0;i--){ const id=vl[i].id;
    const has=(DATA.script||[]).some(t=>t.chapter===ci && t.vizSeg===id);
    if(!has){ if(selSeg===id) selSeg=null; vl.splice(i,1); } }
}
function removeSeg(ch,ci,id){ const vl=chSegs(ch); const i=vl.findIndex(s=>s.id===id); if(i>=0)vl.splice(i,1);
  (DATA.script||[]).forEach(t=>{ if(t.chapter===ci&&t.vizSeg===id){ delete t.vizSeg; delete t.panel_event; delete t.panel_item; delete t.reveal; delete t.compare_item; delete t.callout_item; delete t.vizPoints; } });
  if(selSeg===id) selSeg=null; }

  const mount=()=>{
    if(!window.remotionEditorPlayer){ fallback('簡易プレビュー'); return; }
    window.remotionEditorPlayer.mount(host).then(()=>{ settled=true; delete p.dataset.playerLoading;

    setTimeout(()=>{ if(!window.remotionEditorPlayer) fallback('Player未ビルド・簡易表示'); },1200);
  }

// セリフが持つ演出アンカー（メンバーシップ）を {type,value?,label} の配列で返す。
// メンバーシップ(どの項目を持つか)は演出パネルで設定し、ここでは文字位置だけ扱う。
function turnVizAnchors(tn){
  const out=[];
  if(tn.panel_event==='shrink') out.push({type:'panel_event', label:'縮小'});
  const pis=Array.isArray(tn.panel_item)?tn.panel_item:(typeof tn.panel_item==='number'?[tn.panel_item]:[]);
  pis.forEach(k=>out.push({type:'panel_item', value:k, label:'項目'+(k+1)}));
  if(tn.reveal===true) out.push({type:'reveal', label:'答え'});
  if(tn.compare_item===0) out.push({type:'compare_item', value:0, label:'左'});
  if(tn.compare_item===1) out.push({type:'compare_item', value:1, label:'右'});
  if(typeof tn.callout_item==='number') out.push({type:'callout_item', value:tn.callout_item, label:'注'+(tn.callout_item+1)});
  return out;
}
function findVizPoint(tn,a){ return (tn.vizPoints||[]).find(p=>p.type===a.type && (a.value===undefined?p.value==null:p.value===a.value)); }
function nextVizPointId(tn){ const u=new Set((tn.vizPoints||[]).map(p=>p.id)); let i=1; while(u.has('vp'+i))i++; return 'vp'+i; }
// 文字位置を保存。点が存在する=明示配置（pos:0=セリフ先頭の明示）。点が無い=自動（フラグ既定へ）。
// 削除は removeVizPoint で行う（pos:0 は削除しない）。
function setVizPointPos(tn,a,pos){
  pos=Math.max(0,Math.round(pos||0));
  if(!Array.isArray(tn.vizPoints)) tn.vizPoints=[];
  let p=findVizPoint(tn,a);
  if(!p){ p={id:nextVizPointId(tn), type:a.type, pos:pos}; if(a.value!==undefined)p.value=a.value; tn.vizPoints.push(p); }
  else p.pos=pos;
}
// 演出点を削除（自動配置＝フラグ既定へ戻す）。
function removeVizPoint(tn,a){
  if(!Array.isArray(tn.vizPoints)) return;
  const p=findVizPoint(tn,a); if(!p) return;
  tn.vizPoints=tn.vizPoints.filter(x=>x!==p); if(!tn.vizPoints.length) delete tn.vizPoints;
}
// セリフ分割：各演出点を分割位置で前半/後半へ振り分け、pos を各断片基準へ調整（textEffectsと同基準）。
function splitVizPoints(vizPoints, cutPos, aFrom, bFrom, aLen, bLen){
  const a=[], b=[];
  (vizPoints||[]).forEach(p=>{
    if(typeof p.pos!=='number'){ a.push({...p}); return; }
    if(p.pos<cutPos) a.push({...p, pos:Math.max(0,Math.min(aLen,p.pos-aFrom))});
    else b.push({...p, pos:Math.max(0,Math.min(bLen,p.pos-bFrom))});
  });
  return {a,b};
}
// 項目の中間削除に対応した再採番：removedIdx の点は捨て、それより大きい value は1繰り下げる。
// 戻り値=新配列 or null(空)。
function shiftVizPointValues(vizPoints, type, removedIdx){
  if(!Array.isArray(vizPoints)) return null;
  const out=[];
  (vizPoints||[]).forEach(p=>{
    if(p.type===type && typeof p.value==='number'){
      if(p.value===removedIdx) return;                              // 削除された項目の点は捨てる
      out.push(p.value>removedIdx ? {...p, value:p.value-1} : p);   // 後ろの項目は繰り下げ
    } else out.push(p);
  });
  return out.length?out:null;
}
// セリフ分割で後半へ移った演出点に対応するタイミングflagを tn→nt へ移す（先頭固定でなく実体を移動）。
function moveAnchorFlag(tn,nt,p){
  const type=p.type, v=p.value;
  if(type==='panel_item'){
    let arr=Array.isArray(tn.panel_item)?tn.panel_item.slice():(typeof tn.panel_item==='number'?[tn.panel_item]:[]);
    arr=arr.filter(x=>x!==v); if(arr.length>1)tn.panel_item=arr; else if(arr.length===1)tn.panel_item=arr[0]; else delete tn.panel_item;
    let narr=Array.isArray(nt.panel_item)?nt.panel_item.slice():(typeof nt.panel_item==='number'?[nt.panel_item]:[]);
    if(!narr.includes(v))narr.push(v); narr.sort((a,b)=>a-b);
    if(narr.length>1)nt.panel_item=narr; else nt.panel_item=narr[0];
  }
  else if(type==='panel_event'){ if(tn.panel_event!=null){ nt.panel_event=tn.panel_event; delete tn.panel_event; } }
  else if(type==='reveal'){ if(tn.reveal!=null){ nt.reveal=tn.reveal; delete tn.reveal; } }
  else if(type==='compare_item'){ if(tn.compare_item===v){ nt.compare_item=v; delete tn.compare_item; } }
  else if(type==='callout_item'){ if(tn.callout_item===v){ nt.callout_item=v; delete tn.callout_item; } }
}
// 別セリフへ移せるか：compare/calloutは1セリフ1つ。移動先に別の値が既にあるなら不可（上書きで孤立点が出るのを防ぐ）。
// 配置の妥当性検証（追加/移動/削除 共通）。問題なければ null、あればエラー文。op: 'add'|'move'|'remove'。
function anchorPlacementError(ci, seg, dstTn, a, dstGi, op){
  if(op!=='remove'){
    if(a.type==='compare_item' && typeof dstTn.compare_item==='number' && dstTn.compare_item!==a.value) return '比較は1セリフに1つです。';
    if(a.type==='callout_item' && typeof dstTn.callout_item==='number' && dstTn.callout_item!==a.value) return '注釈は1セリフに1つです。';
  }
  if(seg && seg.panel && !seg.panel.overlay){
    const segId=seg.id;
    let shrinkGi=null; (DATA.script||[]).forEach((t,i)=>{ if(t.chapter===ci&&t.vizSeg===segId&&t.panel_event==='shrink'&&shrinkGi==null)shrinkGi=i; });
    const minItemGi=(ex)=>{ let g=null; (DATA.script||[]).forEach((t,i)=>{ if(t.chapter===ci&&t.vizSeg===segId&&i!==ex){ const has=Array.isArray(t.panel_item)?t.panel_item.length>0:(typeof t.panel_item==='number'); if(has&&(g==null||i<g))g=i; } }); return g; };
    if(a.type==='panel_item' && op!=='remove'){
      if(shrinkGi==null) return '先に「縮小」を追加してください（縮小なしでは項目を置けません）。';
      if(dstGi<shrinkGi) return '項目は縮小より前のセリフには置けません。'; }
    if(a.type==='panel_event'){
      if(op==='remove'){ if(minItemGi(-1)!=null) return '項目が残っています。先に項目を外してください。'; }
      else { const mi=minItemGi(dstGi); if(mi!=null && dstGi>mi) return '縮小は項目より後ろには置けません。'; }
    }
  }
  return null;
}
// 変化点を別セリフへ移す（タイムラインのドラッグ用）：flagと演出点を src→dst へ移し dst に文字位置を設定。
function moveAnchorToTurn(srcTn,dstTn,a,pos){
  moveAnchorFlag(srcTn,dstTn,a);
  removeVizPoint(srcTn,a);
  setVizPointPos(dstTn,a,pos);
}
// 本文編集追従：旧→新テキストの差分（共通の前/後ろ）から編集区間を求め、編集より後ろの pos をずらす。
// 編集区間内の点は編集後区間の末尾へ寄せる。戻り値=変更有無。
function reconcileVizPointPos(vizPoints, oldText, newText){
  oldText=oldText||''; newText=newText||'';
  if(oldText===newText || !Array.isArray(vizPoints)) return false;
  const oldLen=oldText.length, newLen=newText.length;
  let pre=0; while(pre<oldLen && pre<newLen && oldText[pre]===newText[pre]) pre++;
  let suf=0; while(suf<(oldLen-pre) && suf<(newLen-pre) && oldText[oldLen-1-suf]===newText[newLen-1-suf]) suf++;
  const oldEnd=oldLen-suf, delta=newLen-oldLen;
  let changed=false;
  (vizPoints||[]).forEach(p=>{ if(typeof p.pos!=='number') return;
    let np;
    if(p.pos<=pre) np=p.pos;                       // 編集より前＝不変
    else if(p.pos>=oldEnd) np=p.pos+delta;         // 編集より後＝ずらす
    else np=newLen-suf;                            // 編集区間内＝編集後区間の末尾へ寄せる
    np=Math.max(0,Math.min(newLen,np));
    if(np!==p.pos){ p.pos=np; changed=true; }
  });
  return changed;
}
// （renderVizPointMarkers/startVizPointDrag は撤去：変化点はタイムラインの変化点トラックで編集）
// セグメントの演出タイプに応じ、このセリフに置ける演出点の候補を返す（中身はパネルで作る前提）。
function segAnchorOptions(seg){
  const o=[];
  if(seg.panel){ if(!seg.panel.overlay) o.push({type:'panel_event',label:'縮小'});
    (seg.panel.items||[]).forEach((it,k)=>o.push({type:'panel_item',value:k,label:'項目'+(k+1)+(it.text?'（'+it.text.slice(0,8)+'）':'')})); }
  else if(seg.quiz) o.push({type:'reveal',label:'答えを出す'});
  else if(seg.stat) o.push({type:'reveal',label:'数字を出す'});
  else if(seg.compare){ o.push({type:'compare_item',value:0,label:'左'}); o.push({type:'compare_item',value:1,label:'右(分割)'}); }
  else if(seg.callouts) (seg.callouts||[]).forEach((c,k)=>o.push({type:'callout_item',value:k,label:'注'+(k+1)+(c.text?'（'+c.text.slice(0,8)+'）':'')}));
  return o;
}
// flag値（panel_event=shrink / reveal=true / 他=value）。型名はvizPointの type と一致。
function anchorFlagVal(opt){ return opt.type==='panel_event'?'shrink':(opt.type==='reveal'?true:opt.value); }
function anchorOn(tn,opt){
  if(opt.type==='panel_item'){ const c=tn.panel_item; return Array.isArray(c)?c.includes(opt.value):c===opt.value; }
  return tn[opt.type]===anchorFlagVal(opt);
}
function toggleAnchor(ci,seg,tn,opt){
  if(opt.type==='panel_item'){ togglePanelItem(ci,seg.id,opt.value,tn); }
  else { setSegFlag(ci,seg.id,opt.type,anchorFlagVal(opt),tn,!anchorOn(tn,opt)); }
  if(!anchorOn(tn,opt)) removeVizPoint(tn,{type:opt.type,value:opt.value});  // 外したら位置点も消す
  markDirty();
}
// セグメント全体（どのセリフにも）配置されていない演出点の候補を返す＝タイムラインの「＋追加」用。
function segUnplacedOptions(ci,seg){
  return segAnchorOptions(seg).filter(opt=> !(DATA.script||[]).some(t=>t.chapter===ci && t.vizSeg===seg.id && anchorOn(t,opt)));
}
// 選択セリフに変化点を追加：旧フラグ（互換）と vizPoints(pos:0=先頭の明示) を同時生成する。
function addAnchorToTurn(ci,seg,tn,opt){
  if(opt.type==='panel_item') togglePanelItem(ci,seg.id,opt.value,tn);
  else setSegFlag(ci,seg.id,opt.type,anchorFlagVal(opt),tn,true);
  setVizPointPos(tn,{type:opt.type,value:opt.value},0);
}
// （anchorPicker は撤去：変化点の追加はタイムラインの「＋変化点」へ移行済み）
// （演出点エディタ・モーダル(openVizPointEditor)とセリフ内ピンは撤去：変化点はタイムラインの変化点トラックで編集）
// 変化点トラックの◆ドラッグ：同セリフ内なら文字位置(pos)、別セリフ列なら所属セリフを移す（演出範囲内に限定）。
// 動かさなければクリック＝そのセリフを選択。
function startKfDrag(ev,gi,a,m){
  ev.preventDefault(); ev.stopPropagation();
  const srcTn=DATA.script[gi]; if(!srcTn) return; const ci=srcTn.chapter; const segId=srcTn.vizSeg; if(!segId) return;
  const rng=segRange(ci,segId); if(rng.s<0) return;
  const kseg=(DATA.chapters[ci]?chSegs(DATA.chapters[ci]).find(s=>s.id===segId):null);   // 配置検証用セグメント
  const ovp=findVizPoint(srcTn,a); const origPos=(ovp&&typeof ovp.pos==='number')?ovp.pos:null;
  const x0=ev.clientX, y0=ev.clientY;
  let tgtGi=gi, pos=(origPos!=null?origPos:0), moved=false, lastHi=null, caret=null;
  const clearHi=()=>{ if(lastHi){ lastHi.classList.remove('kf-drop','kf-drop-ng'); lastHi=null; } };
  const move=e=>{
    if(!moved){ if(Math.abs(e.clientX-x0)<4 && Math.abs(e.clientY-y0)<4) return;   // 手ぶれ無視（4pxのドラッグ閾値）
      moved=true; document.body.classList.add('tl-resizing'); if(m) m.classList.add('dragging');   // 掴んでいる表示
      caret=document.createElement('div'); caret.className='kf-caret'; document.body.appendChild(caret); }   // 文字位置の目印
    const scroll=document.querySelector('.tl-scroll');
    if(scroll){ const r=scroll.getBoundingClientRect(); if(e.clientX<r.left+36)scroll.scrollLeft-=18; else if(e.clientX>r.right-36)scroll.scrollLeft+=18; }
    let g=timelineTurnAtX(e.clientX,ci); if(g<0)g=gi; g=Math.max(rng.s,Math.min(rng.e,g)); tgtGi=g;
    const cell=document.querySelector('.tl-turn[data-gi="'+g+'"]'); const len=Math.max(1,(DATA.script[g].text||'').length);
    if(cell){ const cr=cell.getBoundingClientRect(); pos=Math.max(0,Math.min(len,Math.round((e.clientX-cr.left)/Math.max(1,cr.width)*len)));
      if(caret){ caret.style.left=(cr.left+(pos/len)*cr.width)+'px'; caret.style.top=cr.top+'px'; caret.style.height=cr.height+'px'; } }   // pos位置に縦線
    // ドロップ先セリフをハイライト（移動可否で色分け：可=緑/不可=赤）。
    if(lastHi && lastHi!==cell) clearHi();
    if(cell){ const ok=(tgtGi===gi)||!anchorPlacementError(ci,kseg,DATA.script[tgtGi],a,tgtGi,'move');
      cell.classList.add(ok?'kf-drop':'kf-drop-ng'); cell.classList.remove(ok?'kf-drop-ng':'kf-drop'); lastHi=cell; }
    if(m){ m.style.position='fixed'; m.style.margin='0'; m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px'; }  // 掴んだ◆をポインタに追従
  };
  const finish=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish); document.removeEventListener('pointercancel',cancel);
    document.body.classList.remove('tl-resizing'); if(m) m.classList.remove('dragging'); clearHi(); if(caret){ caret.remove(); caret=null; }
    if(!moved){ selectTurn(gi); return; }                          // 閾値未満＝クリック＝セリフ選択
    if(tgtGi===gi){ setVizPointPos(srcTn,a,pos); markDirty(); }    // 同セリフ＝文字位置変更
    else { const err=anchorPlacementError(ci,kseg,DATA.script[tgtGi],a,tgtGi,'move');   // 別セリフ＝所属移動
      if(!err){ moveAnchorToTurn(srcTn,DATA.script[tgtGi],a,pos); markDirty(); } else alert(err); }
    renderTimeline();
  };
  const cancel=()=>{ moved=false; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}

  body.appendChild(kfRow);
  const [textRow,textTrack]=timelineRow('小演出（テキスト内）'); let textCount=0;
  DATA.script.forEach((tn,gi)=>{ const effects=activeFx(tn); if(!effects.length)return; textCount+=effects.length;

      const he=document.createElement('button'); he.type='button'; he.className='tl-handle end'; he.title='終了文字をドラッグ';
      hs.onpointerdown=e=>startTextEffectResize(e,gi,fx.id,'s',group,b);

function chapterTurnBounds(ci){
  let first=-1,last=-1; (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter===ci){ if(first<0)first=gi; last=gi; } });
  return {first,last};
}

function timelineTurnAtX(clientX,ci){
  let best=-1,dist=Infinity;
  document.querySelectorAll('.tl-turn').forEach(el=>{
    const gi=+el.dataset.gi; if(!DATA.script[gi]||DATA.script[gi].chapter!==ci)return;
    const r=el.getBoundingClientRect();
    if(clientX>=r.left&&clientX<=r.right){ best=gi; dist=0; return; }
    const d=Math.min(Math.abs(clientX-r.left),Math.abs(clientX-r.right)); if(d<dist){dist=d;best=gi;}
  });
  return best;
}

// 全章横断でx座標→最寄りセリフ列（cueは章をまたぐためグローバル版）。
function timelineTurnAtXAny(clientX){ let best=-1,dist=Infinity;
  document.querySelectorAll('.tl-turn').forEach(el=>{ const gi=+el.dataset.gi; if(!DATA.script[gi])return;
    const r=el.getBoundingClientRect();
    if(clientX>=r.left&&clientX<=r.right){best=gi;dist=0;return;}
    const d=Math.min(Math.abs(clientX-r.left),Math.abs(clientX-r.right)); if(d<dist){dist=d;best=gi;} });
  return best; }
// 画像cueバーの端ドラッグ：開始=move / 終了=range。セリフ境界へスナップ。
// 衝突・範囲逆転はサーバ(editor_model)が拒否→保存されず元の表示へ戻す（silentで再描画）。
function startCueResize(ev,cueId,edge,bar){
  ev.preventDefault(); ev.stopPropagation();
  const sp=cueSpans().find(x=>x.cue.id===cueId); if(!sp)return;
  const n=(DATA.script||[]).length; let target=edge==='s'?sp.s:sp.e;
  const handle=ev.currentTarget; handle.classList.add('dragging'); bar.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const dragLabel=document.createElement('span'); dragLabel.className='tl-drag-label'; bar.appendChild(dragLabel);
  const upd=()=>{ const s=edge==='s'?target:sp.s, e=edge==='e'?target:sp.e; bar.style.gridColumn=(s+1)+' / '+(e+2);
    dragLabel.textContent=(edge==='s'?'開始 ':'終了 ')+(target+1)+'行目'; }; upd();
  const move=e=>{ const scroll=document.querySelector('.tl-scroll');
    if(scroll){ const r=scroll.getBoundingClientRect(); if(e.clientX<r.left+36)scroll.scrollLeft-=18; else if(e.clientX>r.right-36)scroll.scrollLeft+=18; }
    const gi=timelineTurnAtXAny(e.clientX); if(gi<0)return;
    target=edge==='s'?Math.min(gi,sp.e):Math.max(gi,sp.s); target=Math.max(0,Math.min(n-1,target)); upd(); };
  const finish=async()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish); document.removeEventListener('pointercancel',cancel);
    document.body.classList.remove('tl-resizing');
    const orig=edge==='s'?sp.s:sp.e;
    if(target===orig){ renderTimeline(); return; }       // 変化なし＝元の表示へ
    let r;
    if(edge==='s') r=await cueOp({op:'move', cueId, turnId:DATA.script[target].id}, {silent:true});
    else if(endDragIsContinue(target,sp.nextStart,n)) r=await cueOp({op:'range', cueId, clearEnd:true}, {silent:true});
    else r=await cueOp({op:'range', cueId, endTurnId:DATA.script[target].id}, {silent:true});
    if(r) render(); else renderTimeline();               // 失敗(衝突/逆転)は保存されず元へ
  };
  const cancel=()=>{ target=edge==='s'?sp.s:sp.e; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}
function startTimelineResize(ev,ci,id,edge,bar){
  ev.preventDefault(); ev.stopPropagation();
  const original=segRange(ci,id); if(original.s<0)return;
  const bounds=chapterTurnBounds(ci); let target=edge==='s'?original.s:original.e;
  const handle=ev.currentTarget; handle.classList.add('dragging'); bar.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const dragLabel=document.createElement('span'); dragLabel.className='tl-drag-label'; bar.appendChild(dragLabel);
  const updateLabel=()=>{ dragLabel.textContent=(edge==='s'?'開始 ':'終了 ')+(target+1)+'行目'; }; updateLabel();
  const move=e=>{
    const scroll=document.querySelector('.tl-scroll');
    if(scroll){ const r=scroll.getBoundingClientRect(); if(e.clientX<r.left+36)scroll.scrollLeft-=18; else if(e.clientX>r.right-36)scroll.scrollLeft+=18; }
    const gi=timelineTurnAtX(e.clientX,ci); if(gi<0)return;
    target=edge==='s'?Math.min(gi,original.e):Math.max(gi,original.s);
    target=Math.max(bounds.first,Math.min(bounds.last,target));
    const s=edge==='s'?target:original.s, en=edge==='e'?target:original.e;
    bar.style.gridColumn=(s+1)+' / '+(en+2); updateLabel();
  };
  const finish=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    document.removeEventListener('pointercancel',cancel); document.body.classList.remove('tl-resizing');
    if(target!==(edge==='s'?original.s:original.e)){
      const s=edge==='s'?target:original.s, en=edge==='e'?target:original.e;
      retagSeg(ci,id,s,en); selSeg=id; markDirty(); render();
    } else { bar.style.gridColumn=(original.s+1)+' / '+(original.e+2); bar.classList.remove('dragging'); handle.classList.remove('dragging'); dragLabel.remove(); }
  };
  const cancel=()=>{ target=edge==='s'?original.s:original.e; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}

function startTextEffectResize(ev,gi,id,edge,group,bar){
  ev.preventDefault(); ev.stopPropagation();
  const tn=DATA.script[gi], fx=(tn.textEffects||[]).find(f=>f.id===id); if(!fx)return;
  const len=(tn.text||'').length; if(!len)return;
  const original={start:fx.start,end:fx.end}; let target=edge==='s'?original.start:original.end;
  const handle=ev.currentTarget; handle.classList.add('dragging'); bar.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const dragLabel=document.createElement('span'); dragLabel.className='tl-drag-label'; bar.appendChild(dragLabel);
  const update=()=>{
    const start=edge==='s'?target:original.start, end=edge==='e'?target:original.end;
    bar.style.left=(start/len*100)+'%'; bar.style.width=((end-start)/len*100)+'%';
    dragLabel.textContent=(edge==='s'?'開始 ':'終了 ')+(target+1)+'文字目';
  }; update();
  const move=e=>{
    const r=group.getBoundingClientRect();
    const pos=Math.round((e.clientX-r.left)/Math.max(1,r.width)*len);
    target=edge==='s'?Math.max(0,Math.min(original.end-1,pos)):Math.max(original.start+1,Math.min(len,pos));
    update();
  };
  const cleanup=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    document.removeEventListener('pointercancel',cancel); document.body.classList.remove('tl-resizing');
  };
  const finish=()=>{
    cleanup();
    if(target!==(edge==='s'?original.start:original.end)){
      fx.start=edge==='s'?target:original.start; fx.end=edge==='e'?target:original.end;
      fx.text=tn.text.slice(fx.start,fx.end); selGi=gi; selectedTextRange=null; syncTextEffects(tn);
    } else { bar.classList.remove('dragging'); handle.classList.remove('dragging'); dragLabel.remove(); }
  };
  const cancel=()=>{ target=edge==='s'?original.start:original.end; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}

// 描画・出力に使うのは範囲が有効な演出だけ（stale=要再選択 は除外）。編集UIの一覧では別途staleも表示する。
function activeFx(tn){ return ((tn&&tn.textEffects)||[]).filter(f=>!f.stale); }
// セリフ編集後、各テキスト演出の文字位置を安全に追従させる。
// 同じ語句が複数あるとき先頭一致へ勝手に移すのは禁止。一意に追えない場合は削除せず stale 印を付ける。
function reconcileTextEffects(tn){
  const t=tn.text||''; let changed=false;
  (tn.textEffects||[]).forEach(f=>{
    if(f.text){
      if(t.slice(f.start,f.end)===f.text){ if(f.stale){ delete f.stale; changed=true; } return; }  // 位置そのまま有効
      const first=t.indexOf(f.text), last=t.lastIndexOf(f.text);
      if(first>=0 && first===last){ f.start=first; f.end=first+f.text.length; if(f.stale) delete f.stale; changed=true; }  // 一意→追従
      else if(!f.stale){ f.stale=true; changed=true; }  // 消えた/複数該当→動かさず要再選択
    } else {  // 旧データ(text無し)＝範囲がテキスト内なら有効
      if(f.end<=t.length){ if(f.stale){ delete f.stale; changed=true; } }
      else if(!f.stale){ f.stale=true; changed=true; }
    }
  });
  return changed;
}

function startEditLine(row,tn,tx){
  if(row._editing) return;   // 二重起動防止（編集ボタンとダブルクリックの併存）
  row._editing=true;
  const wasDirty=dirty;      // 編集開始前の未保存状態（Esc取消時に正しく戻すため）
  const origText=tn.text||'';
  const origEffects=JSON.parse(JSON.stringify(tn.textEffects||[]));   // 取消用スナップショット
  const origVizPoints=JSON.parse(JSON.stringify(tn.vizPoints||[]));   // 演出点も取消用に保持
  const ta=document.createElement('textarea'); ta.value=origText;
  tx.replaceWith(ta); autosize(ta); ta.focus();
  // カーソルを末尾へ
  const n=ta.value.length; try{ ta.setSelectionRange(n,n); }catch(e){}
  // 編集中は本文だけ追従。演出位置は勝手に動かさず、確定時にまとめて整合する。
  ta.oninput=()=>{ tn.text=ta.value; autosize(ta); refreshEst(); markDirty(); renderPreviewPane(); renderTimeline(); };
  let done=false;
  // revert=true で編集前へ巻き戻し。抜ける時は全再描画せずその行だけ表示へ戻す（スクロール/フォーカス飛び防止）。
  const finish=(revert)=>{
    if(done) return; done=true; row._editing=false;
    let staleChanged=false;
    if(revert){
      tn.text=origText;
      if(origEffects.length) tn.textEffects=origEffects; else delete tn.textEffects;
      if(origVizPoints.length) tn.vizPoints=origVizPoints; else delete tn.vizPoints;
    } else {
      staleChanged=reconcileTextEffects(tn);
      reconcileVizPointPos(tn.vizPoints, origText, tn.text||'');   // 演出点の文字位置も編集差分に追従
      if(!(tn.textEffects||[]).length) delete tn.textEffects;
    }
    const nd=document.createElement('div'); nd.className='tx'+(tn.text?'':' empty'); nd.textContent=tn.text||'(空・ダブルクリックで入力)';
    nd.ondblclick=(e)=>{ e.stopPropagation(); startEditLine(row,tn,nd); };
    if(ta.parentNode) ta.replaceWith(nd);
    // Esc取消で編集前へ戻したら、編集開始前が未保存なしだった場合は保存ボタンも通常へ戻す。
    // 既に別の未保存変更があった(wasDirty)なら維持。確定時は通常どおりdirty化。
    if(revert){ if(wasDirty) markDirty(); else { dirty=false; updateSaveBtn(); } }
    else markDirty();
    refreshEst();
    const gi=DATA.script.indexOf(tn);
    if(window.remotionEditorPlayer) window.remotionEditorPlayer.updateTextEffects(gi,activeFx(tn));
    renderPreviewPane(); renderTimeline();
    // 演出の追従結果（要再選択など）は小演出タブの一覧に反映する。
    if(staleChanged && rtab==='small' && gi===selGi) renderRight();
  };
  ta.onkeydown=(e)=>{
    if(e.isComposing||e.keyCode===229) return;   // IME変換中はショートカット無効
    if(e.key==='Escape'){ e.preventDefault(); finish(true); }
    else if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); finish(false); }
  };
  ta.onblur=()=>finish(false);   // フォーカスアウト=確定（編集中も即時反映のため自然）
}

function nextTextEffectId(tn){
  const used=new Set((tn.textEffects||[]).map(f=>f.id)); let i=1; while(used.has('te'+i))i++; return 'te'+i;
}

function syncTextEffects(tn){
  if(!(tn.textEffects||[]).length)delete tn.textEffects;
  markDirty();
  if(window.remotionEditorPlayer)window.remotionEditorPlayer.updateTextEffects(selGi,activeFx(tn));
  renderTimeline(); renderRight();
}

function addTextEffect(tn,type,color){
  const range=selectedTextRange; if(!range||range.gi!==selGi||range.end<=range.start){ alert('セリフ内の文字を選択してください'); return; }
  const effects=(tn.textEffects||[]);
  // Remotionは1文字につき先頭の演出のみ描画＝重複非対応。重なる既存演出は消さず、追加を拒否する。
  const overlap=effects.find(f=>!f.stale&&f.end>range.start&&f.start<range.end);
  if(overlap){ alert('選択範囲が既存の演出「'+(overlap.text||tn.text.slice(overlap.start,overlap.end))+'」と重なっています。\n既存の演出を削除してから追加してください。'); return; }
  const fx={id:nextTextEffectId(tn),type,start:range.start,end:range.end,text:range.text};
  if(color)fx.color=color; effects.push(fx); effects.sort((a,b)=>a.start-b.start); tn.textEffects=effects;
  selectedTextRange=null; syncTextEffects(tn);
}

function renderTextEffectEditor(panel,tn){
  const wrap=document.createElement('div'); wrap.className='textfx-editor';
  const source=document.createElement('textarea'); source.className='textfx-source'; source.readOnly=true; source.value=tn.text||''; wrap.appendChild(source);
  const actions=document.createElement('div'); actions.className='textfx-actions';
  const status=document.createElement('span'); status.className='textfx-status'; status.textContent='文字をドラッグして選択'; actions.appendChild(status);
  const capture=()=>{ const start=source.selectionStart,end=source.selectionEnd; if(end<=start){ selectedTextRange=null; status.textContent='文字をドラッグして選択'; return; }
    const text=source.value.slice(start,end); selectedTextRange={gi:selGi,start,end,text}; status.textContent='選択中: 「'+text+'」'; };
  source.onselect=capture; source.onmouseup=capture;
  actions.appendChild(vMini('強調',()=>addTextEffect(tn,'emphasis','#ffd000')));
  const colLbl=document.createElement('span'); colLbl.textContent='色'; colLbl.style.cssText='font-size:10px;color:var(--sub)'; actions.appendChild(colLbl);
  const color=document.createElement('input'); color.type='color'; color.value='#ff5ca8'; color.title='文字色'; actions.appendChild(color);
  actions.appendChild(vMini('文字色を適用',()=>addTextEffect(tn,'color',color.value)));
  wrap.appendChild(actions);
  const fxs=(tn.textEffects||[]);
  if(fxs.some(f=>f.stale)){ const warn=document.createElement('div'); warn.className='textfx-warn';
    warn.textContent='⚠ セリフ編集で対象範囲が特定できなくなった演出があります。一度削除して付け直してください。'; wrap.appendChild(warn); }
  fxs.forEach(fx=>{ const item=document.createElement('div'); item.className='textfx-item'+(fx.stale?' stale':'');
    const sw=document.createElement('span'); sw.className='textfx-swatch'; sw.style.background=fx.color||(fx.type==='emphasis'?'#ffd000':'#fff'); item.appendChild(sw);
    const label=(fx.type==='emphasis'?'強調':'文字色')+'「'+(fx.text||tn.text.slice(fx.start,fx.end))+'」'+(fx.stale?'（要再選択）':'');
    const text=document.createElement('span'); text.className='snippet'; text.textContent=label; item.appendChild(text);
    if(!fx.stale){ item.title='クリックで対象範囲を選択表示';
      item.onclick=(e)=>{ if(e.target.tagName==='BUTTON') return;   // 削除ボタンは除外
        source.focus(); try{ source.setSelectionRange(fx.start,fx.end); }catch(_){}
        selectedTextRange={gi:selGi,start:fx.start,end:fx.end,text:source.value.slice(fx.start,fx.end)};
        status.textContent='選択中: 「'+source.value.slice(fx.start,fx.end)+'」'; }; }
    item.appendChild(vMini('削除',()=>{ tn.textEffects=(tn.textEffects||[]).filter(f=>f.id!==fx.id); syncTextEffects(tn); })); wrap.appendChild(item); });
  panel.appendChild(wrap);
}

// ===== Phase2 1-B：セリフ基準の画像編集（editor権威・cueベース） =====
// imageCues→各セリフの有効画像を解決（Python editor_model.resolve_turn_images と同じ規則）。
function _turnIndexMap(){ const m={}; (DATA&&DATA.script||[]).forEach((t,i)=>{ if(t&&t.id!=null && !(t.id in m)) m[t.id]=i; }); return m; }
function turnGi(turnId){ const m=_turnIndexMap(); return (turnId in m)?m[turnId]:-1; }

function findCueById(id){ return (DATA&&DATA.imageCues||[]).find(c=>c.id===id)||null; }
// 「画像なし(hide)」トグルの操作を決める純関数（テスト可能）。
// 解除時：素材を持たない hide cue は削除して前画像の継続へ戻す／素材ありは hide を外して表示する。
function hideToggleOp(startCue, turnId){
  if(startCue && startCue.hide){
    return (startCue.assetId==null) ? {op:'delete', cueId:startCue.id}
                                    : {op:'setOpts', cueId:startCue.id, opts:{hide:false}};
  }
  if(startCue) return {op:'setOpts', cueId:startCue.id, opts:{hide:true}};
  return {op:'add', turnId:turnId, assetId:null, opts:{hide:true}};
}
function resolveCueJS(cue, assetBy){
  const res={cueId:cue.id};
  if(cue.hide){ res.blank=true; return res; }
  const a=assetBy[cue.assetId];
  if(a && a.file){ res.image=a.file; res.asset=a;
    if(cue.fit) res.fit=cue.fit; else if(a.kind==='subject') res.fit='contain';
    ['crop','filter','pad','bg'].forEach(k=>{ if(cue[k]) res[k]=cue[k]; });
    if(a.attribution) res.credit=a.attribution;
  } else if(a){ res.note=a.query; res.asset=a; }
  else res.blank=true;
  return res;
}
function computeImagePlan(){
  const script=(DATA&&DATA.script)||[], assets=(DATA&&DATA.assets)||[], cues=(DATA&&DATA.imageCues)||[];
  const idx=_turnIndexMap(); const assetBy={}; assets.forEach(a=>assetBy[a.id]=a);
  let arr=[]; cues.forEach(c=>{ const si=idx[c.turnId]; if(si==null)return;
    const ei=(c.endTurnId!=null && idx[c.endTurnId]!=null)?idx[c.endTurnId]:null; arr.push({si,ei,c}); });
  arr.sort((a,b)=>a.si-b.si);
  const seen=new Set(), uniq=[]; arr.forEach(x=>{ if(seen.has(x.si))return; seen.add(x.si); uniq.push(x); });
  const n=script.length, plan=new Array(n).fill(null);
  uniq.forEach((x,k)=>{ const nextStart=k+1<uniq.length?uniq[k+1].si:n;
    let end=(x.ei!=null && x.ei>=x.si)?Math.min(x.ei,nextStart-1):nextStart-1;
    const res=resolveCueJS(x.c, assetBy);
    for(let i=x.si;i<=Math.min(end,n-1);i++) plan[i]=res; });
  return plan;
}
function nextCueStartIdx(startIdx){ const idx=_turnIndexMap(); let best=(DATA.script||[]).length;
  (DATA.imageCues||[]).forEach(c=>{ const si=idx[c.turnId]; if(si!=null && si>startIdx && si<best) best=si; }); return best; }
// 即時保存を直列化する。cropやsliderを続けて操作しても、古い応答が後からDATAを上書きしない。
function createAsyncQueue(){ let tail=Promise.resolve(); return run=>{ const current=tail.then(run,run);
  tail=current.then(()=>undefined,()=>undefined); return current; }; }
const enqueueCueOp=createAsyncQueue();
// すべてのcue編集はサーバの editor_model 共通op経由（制約・正規化はPython側を正とする＝JS/Python不一致を作らない）。
async function cueOp(params, opts){
  return enqueueCueOp(async()=>{
    const r=await api('/api/editor/cue-op', Object.assign({data:DATA}, params));
    if(!r||!r.ok){ if(!(opts&&opts.silent)) alert('画像操作に失敗しました: '+((r&&r.message)||'不明')); return null; }
    DATA=r.data; markVisualStale(); return r;
  });
}
// cue区間（imageCueの開始〜終了）。終了未指定は次cue直前まで継続（computeImagePlanと同規則）。
function cueSpans(){
  const idx=_turnIndexMap(); const cues=(DATA&&DATA.imageCues)||[];
  let arr=[]; cues.forEach(c=>{ const s=idx[c.turnId]; if(s==null)return;
    arr.push({c,s,e0:(c.endTurnId!=null&&idx[c.endTurnId]!=null)?idx[c.endTurnId]:null}); });
  arr.sort((a,b)=>a.s-b.s);
  const seen=new Set(),uniq=[]; arr.forEach(x=>{ if(seen.has(x.s))return; seen.add(x.s); uniq.push(x); });
  const n=((DATA&&DATA.script)||[]).length;
  return uniq.map((x,k)=>{ const nextStart=k+1<uniq.length?uniq[k+1].s:n;
    const e=(x.e0!=null&&x.e0>=x.s)?Math.min(x.e0,nextStart-1):nextStart-1;
    return {cue:x.c, s:x.s, e:Math.min(e,n-1), nextStart}; });
}

// 保存してプレビュー更新：script.jsonを保存し、音声に影響しない変更ならmeta.jsonを再生成してPlayerを再読込。
async function saveAndPreview(){
  const b=document.getElementById('save'); if(!b||b.disabled) return;
  b.disabled=true; b.textContent='更新中…';
  let r; try{ r=await api('/api/preview-refresh', DATA); }catch(e){ r={ok:false,message:String(e)}; }
  if(r&&r.ok){ dirty=false;
    if(r.metaUpdated){
      // 新しいmeta.jsonでRemotion Playerを再読込（再mount＝loadMeta→選択セリフへseek）。
      const p=document.getElementById('previewPane');
      if(window.remotionEditorPlayer && p && p.dataset.playerMounted==='1'){
        window.remotionEditorPlayer.unmount(); delete p.dataset.playerMounted; p.innerHTML=''; renderPreviewPane();
      }
      setPreviewState('synced');
    } else { setPreviewState('audio-stale'); alert(r.message||'音声の再生成が必要です'); }
  } else { setPreviewState('error'); alert((r&&r.message)||'更新に失敗しました'); }
  b.disabled=false;
}

  showLock('再生成の前に保存中…');
  const sv=await api('/api/script', DATA);
  if(!sv.ok){ hideLock(); alert('保存に失敗したため中止しました: '+(sv.message||'')); return; }
  showLock('再生成中… Gemini生成のため操作できません（20〜40秒）');
  const r=await api('/api/regenerate', {indices: idx, fallback: fbEnabled()});
  if(r.ok){
    selChs.clear();
    const [s,rev]=await Promise.all([fetch('/api/script').then(x=>x.json()), fetch('/api/cuts').then(x=>x.json())]);
    DATA=s; CUTS=rev.cuts||[]; cutMap={}; CUTS.forEach(c=>cutMap[c.ch+'_'+c.ci]=c);
    (r.regenerated||[]).forEach(i=>OPEN.add(i));  // 再生成した章を開いて確認しやすく
    render(); updateRegenBtn(); hideLock();
    alert('再生成しました: '+ (r.titles||[]).map(t=>'「'+t+'」').join(' '));
  } else {
    hideLock(); updateRegenBtn(); alert('再生成に失敗: '+(r.message||''));
  }
};

Promise.all([fetch('/api/script').then(r=>r.json()), fetch('/api/cuts').then(r=>r.json()),
             fetch('/api/status').then(r=>r.json())])
.then(([s,rev,st])=>{
  if(st&&st.target){ TARGET_CHARS=st.target.chars; TARGET_LABEL=st.target.label; }  // ショート/本編で目標切替
  if(st&&st.previewState) previewState=st.previewState;  // 再読込後もプレビュー状態を維持（サーバがscript/meta比較）
  if(s.error){ document.getElementById('main').textContent=s.error; return; }
  DATA=s; CUTS=rev.cuts||[]; cutMap={}; CUTS.forEach(c=>cutMap[c.ch+'_'+c.ci]=c);
  if(DATA.chapters&&DATA.chapters.length) OPEN.add(0);  // 先頭は開いておく
  updateAuthorityUI(); render(); updateSaveBtn();
});
const _migBtn=document.getElementById('migrateEditor'); if(_migBtn) _migBtn.onclick=migrateToEditor;
</script>
</body></html>
