function startTimelineSplitDrag(ev){
  ev.preventDefault();
  const tp=document.querySelector('.tp'), h=ev.currentTarget; if(!tp)return;
  h.classList.add('dragging'); document.body.classList.add('tp-vresizing');
  const MIN_TOP=320, MIN_BOTTOM=120, GAP=8;   // дёҠж®өгҒЁгӮҝгӮӨгғ гғ©гӮӨгғігҒҢжҪ°гӮҢгҒӘгҒ„жңҖе°Ҹй«ҳгҒ•
  const move=e=>{
    const r=tp.getBoundingClientRect();
    const maxTop=Math.max(MIN_TOP,r.height-GAP-MIN_BOTTOM);
    const topPx=Math.max(MIN_TOP,Math.min(maxTop,e.clientY-r.top));
    timelineSplit=topPx/r.height;
    tp.style.setProperty('--tp-split',(timelineSplit*100).toFixed(2)+'%'); positionTimelineSplit();

async function dropImport(ky, dt, attribution){
  if(dt.files && dt.files.length){
    const f=dt.files[0]; let b64, fn=f.name;
    if(f.size > 8*1024*1024){  // еӨ§гҒҚгҒ„з”»еғҸгҒҜжүӢе…ғгҒ§зё®е°ҸгҒ—гҒҰгҒӢгӮүзҷ»йҢІпјҲ15MBеҲ¶йҷҗ/йҮҚгҒ•еҜҫзӯ–пјү
      try{ const durl=await shrinkImage(URL.createObjectURL(f), 1920, 5*1024*1024); b64=durl.split(',')[1]; fn='resized.jpg'; }
      catch(e){ b64=await new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(f); }); }
    } else {
      b64=await new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(f); });

  const url=(dt.getData('text/uri-list')||dt.getData('text/plain')||'').split('\\n').find(s=>s&&!s.startsWith('#'))||'';
  if(!url) return null;
  if(url.startsWith('data:image')) return api('/api/replace', {key:ky, filename:'drop.png', dataB64:url.split(',')[1], attribution});
  return api('/api/import-url', {key:ky, url, attribution});
}

// з”»еғҸгӮ’зё®е°ҸгҒ—гҒҰJPEG dataURLгҒ«гҒҷгӮӢпјҲе·ЁеӨ§з”»еғҸгҒ®зҷ»йҢІеҜҫзӯ–пјқ720pеӢ•з”»гҒ«гҒҜеҚҒеҲҶпјүгҖӮcrossOriginеҜҫеҝңURL/FileгӮ’еҸ—гҒ‘гӮӢгҖӮ
function shrinkImage(src, maxDim, maxBytes){
  return new Promise((resolve,reject)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ let w=img.naturalWidth,h=img.naturalHeight;
      const s=Math.min(1, maxDim/Math.max(w,h)); w=Math.max(1,Math.round(w*s)); h=Math.max(1,Math.round(h*s));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      try{ let q=0.88, u=cv.toDataURL('image/jpeg',q);
        while(u.length*0.75>maxBytes && q>0.4){ q-=0.1; u=cv.toDataURL('image/jpeg',q); }
        resolve(u);
      }catch(e){ reject(e); } };
    img.onerror=()=>reject(new Error('з”»еғҸиӘӯгҒҝиҫјгҒҝеӨұж•—'));
    img.src=src;
  });
}
// в”Җв”Җ гӮҜгғӘгғғгғ—гғңгғјгғү(гӮ№гӮҜгӮ·гғ§)гҒӢгӮүз”»еғҸгӮ’еҸ–гӮҠиҫјгӮҖ в”Җв”Җ
function blobToB64(blob){ return new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(blob); }); }

let pasteTarget=null;  // гғ•гӮ©гғјгғ«гғҗгғғгӮҜиІјгӮҠд»ҳгҒ‘е…Ҳ
async function pasteClipboard(ky, ci, k){
  // в‘  Clipboard API гҒ§зӣҙжҺҘиӘӯгӮҖпјҲChromeзӯүгғ»localhostпјӢгғҰгғјгӮ¶гғјж“ҚдҪңдёӢгҒӘгӮүеҸҜпјү
  if(navigator.clipboard && navigator.clipboard.read){
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){ const ty=(it.types||[]).find(t=>t.startsWith('image/'));
        if(ty){ const blob=await it.getType(ty); await importImageBlob(ky,ci,k,blob); return; } }
      alert('гӮҜгғӘгғғгғ—гғңгғјгғүгҒ«з”»еғҸгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“пјҲе…ҲгҒ« гӮ№гӮҜгӮ·гғ§ Cmd+Ctrl+Shift+4 гӮ’ж’®гҒЈгҒҰгҒҸгҒ гҒ•гҒ„пјү'); return;
    }catch(e){ /* жЁ©йҷҗжӢ’еҗҰ/йқһеҜҫеҝң вҶ’ в‘Ўгғ•гӮ©гғјгғ«гғҗгғғгӮҜгҒё */ }
  }
  // в‘Ў гғ•гӮ©гғјгғ«гғҗгғғгӮҜпјҡиІјгӮҠд»ҳгҒ‘е…ҲгӮ’иЁҳжҶ¶гҒ—гҖҒCmd+V гӮ’дҝғгҒҷпјҲе…Ёгғ–гғ©гӮҰгӮ¶еҜҫеҝңпјү
  pasteTarget={ky,ci,k};
  alert('гҒ“гҒ®гӮ«гғғгғҲгӮ’иІјгӮҠд»ҳгҒ‘е…ҲгҒ«гҒ—гҒҫгҒ—гҒҹгҖӮгҒқгҒ®гҒҫгҒҫ Cmd+V гӮ’жҠјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
}
// гғҡгғјгӮёе…ЁдҪ“гҒ® pasteпјҲCmd+VпјүгҒ§з”»еғҸгӮ’еҸ–гӮҠиҫјгӮҖгҖӮpasteTarget гҒӢгҖҒиӘҝж•ҙгғ‘гғҚгғ«гҒҢ1гҒӨгҒ гҒ‘й–ӢгҒ„гҒҰгӮҢгҒ°гҒқгҒ“гҒёгҖӮ
document.addEventListener('paste', async (e)=>{
  const items=(e.clipboardData&&e.clipboardData.items)||[];
  for(const it of items){ if(it.type && it.type.startsWith('image/')){
    let tgt=pasteTarget;
    if(!tgt){ const open=[...adjustOpen]; if(open.length===1){ const [a,b]=open[0].split('_').map(Number); tgt={ky:open[0],ci:a,k:b}; } }
    if(tgt){ e.preventDefault(); const blob=it.getAsFile(); pasteTarget=null; await importImageBlob(tgt.ky,tgt.ci,tgt.k,blob); }
    else { alert('иІјгӮҠд»ҳгҒ‘е…ҲгҒҢжңӘйҒёжҠһгҒ§гҒҷгҖӮгӮ«гғғгғҲгҒ®гҖҺрҹ“ӢиІјд»ҳгҖҸгӮ’жҠјгҒ—гҒҰгҒӢгӮү Cmd+V гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ'); }
    return;
  } }
});
// еҖҷиЈңгӮ’жҺЎз”ЁпјҡгҒҫгҒҡгӮөгғјгғҗеҸ–еҫ—гҖҒеӨ§гҒҚгҒҷгҒҺгӮӢжҷӮгҒ гҒ‘жүӢе…ғгҒ§зё®е°ҸгҒ—гҒҰзҷ»йҢІгҖӮ
async function applyCandidate(ci,k,cut,ky,c){
  const st=candState[ky]||{};

    {image:fn,attribution:c.attribution,query:(st.query!=null?st.query:cut.image_query),kind:cut.image_kind});
    candOpen.delete(ky); render(); };
  const r=await api('/api/import-url',{key:ky,url:c.url,attribution:c.attribution});
  if(r.ok){ setImg(r.filename); return; }
  if(/еӨ§гҒҚ|15MB|too large/i.test(r.message||'')){
    try{ const durl=await shrinkImage(c.url, 1600, 3*1024*1024);
      const r2=await api('/api/replace',{key:ky,filename:'cand.jpg',dataB64:durl.split(',')[1],attribution:c.attribution});

      alert(r2.message||'зё®е°Ҹзҷ»йҢІгҒ«еӨұж•—'); return;
    }catch(e){ alert('з”»еғҸгҒҢеӨ§гҒҚгҒҸиҮӘеӢ•зё®е°ҸгӮӮгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹпјҲжүӢе…ғгҒ§гғӘгӮөгӮӨгӮәгҒ—гҒҰD&DгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү'); return; }

}

function cssFilter(f){ return f?`brightness(${f.brightness??1}) contrast(${f.contrast??1}) grayscale(${f.grayscale??0})`:''; }
function contentRect(img,box){ const nw=img.naturalWidth,nh=img.naturalHeight; if(!nw||!nh) return {x:0,y:0,w:box.width,h:box.height};
  const s=Math.min(box.width/nw,box.height/nh),w=nw*s,h=nh*s; return {x:(box.width-w)/2,y:(box.height-h)/2,w,h}; }
function mkrange(min,max,step,val){ const s=document.createElement('input'); s.type='range'; s.min=min; s.max=max; s.step=step; s.value=val; return s; }
// гӮ№гғ©гӮӨгғҖгғјгҒ« вҲ’/пјӢ гғңгӮҝгғігӮ’д»ҳгҒ‘гҒҰиҝ”гҒҷпјҲгғңгӮҝгғігҒҜ input/change гӮ’зҷәзҒ«пјқж—ўеӯҳгғҸгғігғүгғ©гӮ’жөҒз”ЁпјүгҖӮ
function stepWrap(slider){
  const w=document.createElement('span'); w.style.cssText='display:inline-flex;align-items:center;gap:3px;vertical-align:middle';
  const mk=(txt,dir)=>{ const b=document.createElement('button'); b.type='button'; b.className='mini'; b.textContent=txt; b.tabIndex=-1;
    b.style.cssText='padding:2px 7px;font-size:14px;line-height:1';
    b.onclick=()=>{ const step=parseFloat(slider.step)||1, mn=parseFloat(slider.min), mx=parseFloat(slider.max);
      let v=(parseFloat(slider.value)||0)+dir*step;
      if(!isNaN(mn)) v=Math.max(mn,v); if(!isNaN(mx)) v=Math.min(mx,v);
      v=Math.round(v/step)*step; v=Math.round(v*1000)/1000;
      slider.value=v; slider.dispatchEvent(new Event('input')); slider.dispatchEvent(new Event('change')); };
    return b; };
  w.appendChild(mk('вҲ’',-1)); w.appendChild(slider); w.appendChild(mk('пјӢ',1));
  return w;
}

function splitTurn(tn,ta){

  if(!(pos>0&&pos<text.length)){
    // гӮ«гғјгӮҪгғ«жңӘжҢҮе®ҡпјҡдёӯеӨ®гҒ«жңҖгӮӮиҝ‘гҒ„еҸҘиӘӯзӮ№(гҖҒгҖӮпјҒпјҹ)гҒ§еүІгӮӢгҖӮз„ЎгҒ‘гӮҢгҒ°дёӯеӨ®гҖӮ
    // пјҲеҸҘзӮ№гҒҢжң«е°ҫгҒ гҒ‘гҒ®гӮ»гғӘгғ•гҒ§гӮӮз©әгҒ«гҒӘгӮүгҒӘгҒ„гӮҲгҒҶгҖҢгҖҒгҖҚгӮӮеҢәеҲҮгӮҠеҖҷиЈңгҒ«гҒҷгӮӢпјү
    const mid=text.length/2; let best=-1,bestD=1e9;
    for(let i=1;i<text.length;i++){ if('гҖҒгҖӮпјҒпјҹ'.includes(text[i-1])){ const d=Math.abs(i-mid); if(d<bestD){bestD=d;best=i;} } }
    pos = best>0 ? best : Math.floor(text.length/2);
  }
  const a=text.slice(0,pos).trim(), b=text.slice(pos).trim();
  if(!a||!b){ alert('еҲҶеүІдҪҚзҪ®гҒҢдёҚжӯЈ'); return; }
  // еҫҢеҚҠгҒ®ж–°гӮҝгғјгғігҖӮз¶ҷз¶ҡеұһжҖ§(и©ұиҖ…/з« /з”»еғҸ/ж„ҹжғ…зӯү)гҒ®гҒҝеј•гҒҚз¶ҷгҒҺгҖҒдёҖзӮ№гӮ’жҢҮгҒҷflag(compare_itemзӯү)гӮ„
  // е°ә(start/end/sentences)гҒҜеј•гҒҚз¶ҷгҒҢгҒӘгҒ„пјқгӮҝгӮӨгғҹгғігӮ°гҒҢдәҢйҮҚгҒ«гҒӘгӮүгҒӘгҒ„гӮҲгҒҶгҒ«гҒҷгӮӢгҖӮ
  const nt={speaker:tn.speaker, text:b};
  ['chapter','section','cut','emotion','effect','voice'].forEach(k=>{ if(tn[k]!=null) nt[k]=tn[k]; });
  // жң«е°ҫгҒ«еұһгҒҷгӮӢеұһжҖ§(еҫҢгҒ®з„Ўйҹі/з· гӮҒ/зҜ„еӣІгҒ®зөӮдәҶ)гҒҜеҫҢеҚҠгҒёз§»гҒҷпјҲе…Ҳй ӯгҒӢгӮүгҒҜеӨ–гҒҷпјүгҖӮ
  ['pause','closing','chorus','viz_end'].forEach(k=>{ if(tn[k]!=null){ nt[k]=tn[k]; delete tn[k]; } });
  // дёҖзӮ№flag(compare_item/panel_item/panel_event/reveal/callout_item)гҒЁviz_startгҒҜе…Ҳй ӯгҒ«ж®ӢгҒҷгҖӮ
  // еҫҢеҚҠгҒ«дҪ•гӮ’еҮәгҒҷгҒӢгҒҜдёӢгҒ®гӮҝгӮӨгғҹгғігӮ°chipпјҲе·Ұ/еҸі(еҲҶеүІ)гҒӘгҒ©пјүгҒ§жҢҮе®ҡгҒҷгӮӢгҖӮ
  const effects=tn.textEffects||[];
  const rawA=text.slice(0,pos), rawB=text.slice(pos), aFrom=Math.max(0,rawA.indexOf(a)), bFrom=pos+Math.max(0,rawB.indexOf(b));
  const sliceFx=(from,to,part)=>effects.filter(f=>f.end>from&&f.start<to).map(f=>{ const start=Math.max(f.start,from)-from,end=Math.min(f.end,to)-from;
    return {...f,start,end,text:part.slice(start,end)}; });
  tn.textEffects=sliceFx(aFrom,aFrom+a.length,a); nt.textEffects=sliceFx(bFrom,bFrom+b.length,b);
  if(!tn.textEffects.length)delete tn.textEffects; if(!nt.textEffects.length)delete nt.textEffects;
  tn.text=a; ['start','end','sentences'].forEach(k=>delete tn[k]);
  DATA.script.splice(DATA.script.indexOf(tn)+1,0,nt); render();
}

  function drawCrop(){ if(!cut.crop||!imgEl){ rectEl.style.display='none'; return; }
    const box=crop.getBoundingClientRect(), rr=contentRect(imgEl,box);
    rectEl.style.display='block'; rectEl.style.left=(rr.x+cut.crop.l*rr.w)+'px'; rectEl.style.top=(rr.y+cut.crop.t*rr.h)+'px';

    window.addEventListener('mousemove',(e)=>{ if(!drag)return; const x=e.clientX-drag.box.left,y=e.clientY-drag.box.top;
      rectEl.style.display='block'; rectEl.style.left=Math.min(drag.x0,x)+'px'; rectEl.style.top=Math.min(drag.y0,y)+'px';

    if(first<0)first=gi; last=gi; if(t.viz_start)sGi=gi; if(t.viz_end)eGi=gi; });

function clampItemFlags(ci,flag,n){ (DATA.script||[]).forEach(t=>{

  else if(typeof t[flag]==='number' && t[flag]>=n) delete t[flag]; }); }
// panel_item гӮ’гҖҢгҒ“гҒ®зҷәиЁҖгҒ§еҮәгҒҷй …зӣ®гҖҚгҒ®йӣҶеҗҲгҒЁгҒ—гҒҰжҢҒгҒӨпјҲint or intй…ҚеҲ—пјүгҖӮгғҒгӮ§гғғгӮҜгғңгғғгӮҜгӮ№зҡ„гҒ«kгӮ’д»ҳгҒ‘еӨ–гҒ—гҖӮ
// 1й …зӣ®гҒҜ1зҷәиЁҖпјҲеҗҢдёҖkгҒҜд»–зҷәиЁҖгҒӢгӮүеӨ–гҒҷпјүпјқйҮҚиӨҮйҳІжӯўгҒ—гҒӨгҒӨгҖҒ1зҷәиЁҖгҒ«иӨҮж•°й …зӣ®гӮ’еҗҢжҷӮиЎЁзӨәгҒ§гҒҚгӮӢгҖӮ
function togglePanelItem(ci,sid,k,tn){
  let arr = Array.isArray(tn.panel_item)?tn.panel_item.slice():(typeof tn.panel_item==='number'?[tn.panel_item]:[]);
  if(arr.includes(k)){ arr=arr.filter(x=>x!==k); }
  else { arr.push(k);
    (DATA.script||[]).forEach(t=>{ if(t.chapter===ci&&t.vizSeg===sid&&t!==tn){
      if(Array.isArray(t.panel_item)){ const f=t.panel_item.filter(x=>x!==k); if(f.length>1)t.panel_item=f; else if(f.length===1)t.panel_item=f[0]; else delete t.panel_item; }
      else if(t.panel_item===k){ delete t.panel_item; } }}); }
  arr.sort((a,b)=>a-b);
  if(arr.length>1) tn.panel_item=arr; else if(arr.length===1) tn.panel_item=arr[0]; else delete tn.panel_item;
  markDirty();
}

const SPOKEN_CPM=305; let TARGET_CHARS=8*305, TARGET_LABEL='8еҲҶ';
function spokenLen(text){
  if(!text) return 0;
  let s=String(text).replace(/[0-9A-Za-z][0-9A-Za-z._\\-]*пјҲ([^пјҲпјү]+)пјү/g,'$1');
  s=s.replace(/[\\s\\u3000пјҲпјүгҖҢгҖҚгҖҺгҖҸгҖҒгҖӮпјҒпјҹгғ»,.!?]/g,'');
  return [...s].length;
}
function secLbl(ch,i,all){ if(ch.section==='intro')return 'е°Һе…Ҙ'; if(ch.section==='outro')return 'з· гӮҒ';
  let n=0; for(let j=0;j<=i;j++) if((all[j]||{}).section==='trivia')n++; return 'гғҒгғЈгғ—гӮҝгғј'+n; }
function buildEstimate(){
  const sc=DATA.script||[], ch=DATA.chapters||[]; const per=ch.map(()=>0); let total=0;
  sc.forEach(t=>{ const n=spokenLen(t.text); total+=n; if(typeof t.chapter==='number'&&per[t.chapter]!=null) per[t.chapter]+=n; });
  const minE=total/SPOKEN_CPM, tgtChars=TARGET_CHARS, diff=tgtChars-total;
  const w=document.createElement('div'); w.className='estbar'; w.id='estbar';
  const parts=ch.map((c,i)=>'<span class="es3">'+secLbl(c,i,ch)+' '+per[i]+'</span>').join('');
  w.innerHTML='<b>е–ӢгӮҠ '+total+'еӯ— вүҲ жҺЁе®ҡ '+minE.toFixed(1)+'еҲҶ</b>'
    +' <span class="es">зӣ®жЁҷ'+TARGET_LABEL+'вүҲ'+tgtChars+'еӯ—пјҲ'+(diff>=0?'гҒӮгҒЁ'+diff+'еӯ—':(-diff)+'еӯ—гӮӘгғјгғҗгғј')+'пјү</span>'
    +'<div class="es2">'+parts+'</div>';
  return w;
}
function refreshEst(){ const o=document.getElementById('estbar'); if(o) o.replaceWith(buildEstimate()); }

function lblDiv(t){ const d=document.createElement('div'); d.className='lbl'; d.textContent=t; return d; }

function setWide(on){ rwide=on; const r=document.getElementById('rpane'); if(r){ r.classList.toggle('wide',on); renderRight(); } }
// гғ—гғ¬гғ“гғҘгғјеҶ…гҒ®ж–Үеӯ—/иҰҒзҙ гӮөгӮӨгӮәгҖӮеәғгҒ’гҒҹжҷӮгҒҜжӢЎеӨ§зҺҮгҒ«еҗҲгӮҸгҒӣгҒҰдёҖз·’гҒ«еӨ§гҒҚгҒҸгҒҷгӮӢпјҲз”»еғҸгҒ гҒ‘гҒ§гҒӘгҒҸгғ©гғҷгғ«зӯүгӮӮпјүгҖӮ
function pv(n){ return Math.round(n*(rwide?1.9:1)); }
// жҠҳгӮҠгҒҹгҒҹгҒҝгӮ’CSSгӮҜгғ©гӮ№гҒ§еҸҚжҳ пјҲе…ЁеҶҚжҸҸз”»гҒ—гҒӘгҒ„пјқгӮ№гӮҜгғӯгғјгғ«дҪҚзҪ®гӮ’дҝқгҒӨпјүгҖӮ
function applyCollapse(){

    const ci=+sec.dataset.ci; const col=collapsed.has(ci);

}

// ===== иӨҮж•°жј”еҮәпјҲгӮ»гӮ°гғЎгғігғҲпјүгғўгғҮгғ« =====
const SEGCOL=['#6b6ae0','#3fa3c0','#caa23f','#b05ab0','#4fa86a','#c0683f'];
function chSegs(ch){ if(!Array.isArray(ch.vizList)) ch.vizList=[]; return ch.vizList; }
function newSegId(ch){ const u=new Set(chSegs(ch).map(s=>s.id)); let i=1; while(u.has('s'+i)) i++; return 's'+i; }
function segOf(tn,ch){ if(!tn||!tn.vizSeg) return null; return chSegs(ch).find(s=>s.id===tn.vizSeg)||null; }
function segRange(ci,id){ let s=-1,e=-1; (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter===ci&&t.vizSeg===id){ if(s<0)s=gi; e=gi; } }); return {s,e}; }
// ж—§гғ»еҚҳдёҖжј”еҮәеҪўејҸгӮ’ vizList гҒёз§»иЎҢпјҲжҸҸз”»жҷӮгҒ«дёҖеәҰгҒ гҒ‘пјүгҖӮиЎҢгҒ« vizSeg гӮ’д»ҳгҒ‘ж—§flagгӮ’жҺғйҷӨгҖӮ
function migrateViz(ch,ci){
  if(Array.isArray(ch.vizList)) return;
  const k=VIZ_KEYS.find(x=>ch[x]); if(!k){ ch.vizList=[]; return; }
  const id=newSegId(ch); const seg={id:id,type:k}; seg[k]=ch[k];
  if(k==='callouts'&&ch.calloutStyle) seg.calloutStyle=ch.calloutStyle;
  ch.vizList=[seg];

}

function turnVizAnchors(tn){
  const out=[];
  if(tn.panel_event==='shrink') out.push({type:'panel_event', label:'зё®е°Ҹ'});
  const pis=Array.isArray(tn.panel_item)?tn.panel_item:(typeof tn.panel_item==='number'?[tn.panel_item]:[]);
  pis.forEach(k=>out.push({type:'panel_item', value:k, label:'й …зӣ®'+(k+1)}));
  if(tn.reveal===true) out.push({type:'reveal', label:'зӯ”гҒҲ'});
  if(tn.compare_item===0) out.push({type:'compare_item', value:0, label:'е·Ұ'});
  if(tn.compare_item===1) out.push({type:'compare_item', value:1, label:'еҸі'});
  if(typeof tn.callout_item==='number') out.push({type:'callout_item', value:tn.callout_item, label:'жіЁ'+(tn.callout_item+1)});
  return out;
}
function findVizPoint(tn,a){ return (tn.vizPoints||[]).find(p=>p.type===a.type && (a.value===undefined?p.value==null:p.value===a.value)); }
function nextVizPointId(tn){ const u=new Set((tn.vizPoints||[]).map(p=>p.id)); let i=1; while(u.has('vp'+i))i++; return 'vp'+i; }

function setVizPointPos(tn,a,pos){
  if(pos<=0){ if(Array.isArray(tn.vizPoints)){ tn.vizPoints=tn.vizPoints.filter(p=>p!==findVizPoint(tn,a)); if(!tn.vizPoints.length)delete tn.vizPoints; } return; }
  if(!Array.isArray(tn.vizPoints)) tn.vizPoints=[];
  let p=findVizPoint(tn,a);
  if(!p){ p={id:nextVizPointId(tn), type:a.type, pos:pos}; if(a.value!==undefined)p.value=a.value; tn.vizPoints.push(p); }
  else p.pos=pos;
}
function renderVizPointMarkers(cell,tn,gi){

function startVizPointDrag(ev,gi,a,pin,cell){
  ev.preventDefault(); ev.stopPropagation();
  const tn=DATA.script[gi]; const len=Math.max(1,(tn.text||'').length);
  const orig=(findVizPoint(tn,a)||{}).pos; let pos=typeof orig==='number'?orig:0;
  pin.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const move=e=>{ const r=cell.getBoundingClientRect();
    const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/Math.max(1,r.width)));
    pos=Math.round(frac*len); pin.style.left=(pos/len*100)+'%'; pin.classList.remove('unplaced'); };
  const finish=()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    pin.classList.remove('dragging'); document.body.classList.remove('tl-resizing');
    if(pos!==(typeof orig==='number'?orig:0)){ setVizPointPos(tn,a,pos); markDirty(); }
    renderTimeline(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish);

function segAnchorOptions(seg){
  const o=[];
  if(seg.panel){ if(!seg.panel.overlay) o.push({type:'panel_event',label:'зё®е°Ҹ'});
    (seg.panel.items||[]).forEach((it,k)=>o.push({type:'panel_item',value:k,label:'й …зӣ®'+(k+1)+(it.text?'пјҲ'+it.text.slice(0,8)+'пјү':'')})); }
  else if(seg.quiz) o.push({type:'reveal',label:'зӯ”гҒҲгӮ’еҮәгҒҷ'});
  else if(seg.stat) o.push({type:'reveal',label:'ж•°еӯ—гӮ’еҮәгҒҷ'});
  else if(seg.compare){ o.push({type:'compare_item',value:0,label:'е·Ұ'}); o.push({type:'compare_item',value:1,label:'еҸі(еҲҶеүІ)'}); }
  else if(seg.callouts) (seg.callouts||[]).forEach((c,k)=>o.push({type:'callout_item',value:k,label:'жіЁ'+(k+1)+(c.text?'пјҲ'+c.text.slice(0,8)+'пјү':'')}));
  return o;

// flagеҖӨпјҲpanel_event=shrink / reveal=true / д»–=valueпјүгҖӮеһӢеҗҚгҒҜvizPointгҒ® type гҒЁдёҖиҮҙгҖӮ
function anchorFlagVal(opt){ return opt.type==='panel_event'?'shrink':(opt.type==='reveal'?true:opt.value); }
function anchorOn(tn,opt){
  if(opt.type==='panel_item'){ const c=tn.panel_item; return Array.isArray(c)?c.includes(opt.value):c===opt.value; }
  return tn[opt.type]===anchorFlagVal(opt);
}
function toggleAnchor(ci,seg,tn,opt){
  if(opt.type==='panel_item'){ togglePanelItem(ci,seg.id,opt.value,tn); }
  else { setSegFlag(ci,seg.id,opt.type,anchorFlagVal(opt),tn,!anchorOn(tn,opt)); }
  if(!anchorOn(tn,opt)) setVizPointPos(tn,{type:opt.type,value:opt.value},0);  // еӨ–гҒ—гҒҹгӮүдҪҚзҪ®зӮ№гӮӮж¶ҲгҒҷ
  markDirty();
}

function chapterTurnBounds(ci){
  let first=-1,last=-1; (DATA.script||[]).forEach((t,gi)=>{ if(t.chapter===ci){ if(first<0)first=gi; last=gi; } });
  return {first,last};
}

function timelineTurnAtX(clientX,ci){
  let best=-1,dist=Infinity;
  document.querySelectorAll('.tl-turn').forEach(el=>{
    const gi=+el.dataset.gi; if(!DATA.script[gi]||DATA.script[gi].chapter!==ci)return;
    const r=el.getBoundingClientRect();
    if(clientX>=r.left&&clientX<=r.right){ best=gi; dist=0; return; }
    const d=Math.min(Math.abs(clientX-r.left),Math.abs(clientX-r.right)); if(d<dist){dist=d;best=gi;}
  });
  return best;
}

function startTimelineResize(ev,ci,id,edge,bar){
  ev.preventDefault(); ev.stopPropagation();
  const original=segRange(ci,id); if(original.s<0)return;
  const bounds=chapterTurnBounds(ci); let target=edge==='s'?original.s:original.e;
  const handle=ev.currentTarget; handle.classList.add('dragging'); bar.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const dragLabel=document.createElement('span'); dragLabel.className='tl-drag-label'; bar.appendChild(dragLabel);
  const updateLabel=()=>{ dragLabel.textContent=(edge==='s'?'й–Ӣе§Ӣ ':'зөӮдәҶ ')+(target+1)+'иЎҢзӣ®'; }; updateLabel();
  const move=e=>{
    const scroll=document.querySelector('.tl-scroll');
    if(scroll){ const r=scroll.getBoundingClientRect(); if(e.clientX<r.left+36)scroll.scrollLeft-=18; else if(e.clientX>r.right-36)scroll.scrollLeft+=18; }
    const gi=timelineTurnAtX(e.clientX,ci); if(gi<0)return;
    target=edge==='s'?Math.min(gi,original.e):Math.max(gi,original.s);
    target=Math.max(bounds.first,Math.min(bounds.last,target));
    const s=edge==='s'?target:original.s, en=edge==='e'?target:original.e;
    bar.style.gridColumn=(s+1)+' / '+(en+2); updateLabel();
  };
  const finish=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    document.removeEventListener('pointercancel',cancel); document.body.classList.remove('tl-resizing');
    if(target!==(edge==='s'?original.s:original.e)){
      const s=edge==='s'?target:original.s, en=edge==='e'?target:original.e;
      retagSeg(ci,id,s,en); selSeg=id; markDirty(); render();
    } else { bar.style.gridColumn=(original.s+1)+' / '+(original.e+2); bar.classList.remove('dragging'); handle.classList.remove('dragging'); dragLabel.remove(); }
  };
  const cancel=()=>{ target=edge==='s'?original.s:original.e; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}

function startTextEffectResize(ev,gi,id,edge,group,bar){
  ev.preventDefault(); ev.stopPropagation();
  const tn=DATA.script[gi], fx=(tn.textEffects||[]).find(f=>f.id===id); if(!fx)return;
  const len=(tn.text||'').length; if(!len)return;
  const original={start:fx.start,end:fx.end}; let target=edge==='s'?original.start:original.end;
  const handle=ev.currentTarget; handle.classList.add('dragging'); bar.classList.add('dragging'); document.body.classList.add('tl-resizing');
  const dragLabel=document.createElement('span'); dragLabel.className='tl-drag-label'; bar.appendChild(dragLabel);
  const update=()=>{
    const start=edge==='s'?target:original.start, end=edge==='e'?target:original.end;
    bar.style.left=(start/len*100)+'%'; bar.style.width=((end-start)/len*100)+'%';
    dragLabel.textContent=(edge==='s'?'й–Ӣе§Ӣ ':'зөӮдәҶ ')+(target+1)+'ж–Үеӯ—зӣ®';
  }; update();
  const move=e=>{
    const r=group.getBoundingClientRect();
    const pos=Math.round((e.clientX-r.left)/Math.max(1,r.width)*len);
    target=edge==='s'?Math.max(0,Math.min(original.end-1,pos)):Math.max(original.start+1,Math.min(len,pos));
    update();
  };
  const cleanup=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',finish);
    document.removeEventListener('pointercancel',cancel); document.body.classList.remove('tl-resizing');
  };
  const finish=()=>{
    cleanup();
    if(target!==(edge==='s'?original.start:original.end)){
      fx.start=edge==='s'?target:original.start; fx.end=edge==='e'?target:original.end;
      fx.text=tn.text.slice(fx.start,fx.end); selGi=gi; selectedTextRange=null; syncTextEffects(tn);
    } else { bar.classList.remove('dragging'); handle.classList.remove('dragging'); dragLabel.remove(); }
  };
  const cancel=()=>{ target=edge==='s'?original.start:original.end; finish(); };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',finish); document.addEventListener('pointercancel',cancel);
}

  const effects=(tn.textEffects||[]).filter(f=>f.end<=range.start||f.start>=range.end);
  const fx={id:nextTextEffectId(tn),type,start:range.start,end:range.end,text:range.text};

document.getElementById('regen').onclick=async()=>{
  const idx=[...selChs].sort((a,c)=>a-c); if(!idx.length) return;
  const names=idx.map(i=>'гғ»'+((DATA.chapters[i]||{}).title||('з¬¬'+i+'з« '))).join('\\n');
  if(!confirm(`ж¬ЎгҒ® ${idx.length} з« гҒ®еҸ°жң¬гҒЁз”»еғҸгӮ’еҶҚз”ҹжҲҗгҒ—гҒҫгҒҷгҖӮ\\n${names}\\n\\nгғЎгӮӨгғігғҶгғјгғһгҒҜз¶ӯжҢҒгҒ—гҖҒж—ўеӯҳгғҚгӮҝгҒЁйҮҚиӨҮгҒ—гҒӘгҒ„еҶ…е®№гӮ’ж–°иҰҸз”ҹжҲҗгҒ—гҒҫгҒҷпјҲGemini 1еӣһгғ»ж—ўеӯҳгҒ®еҸ°жң¬/з”»еғҸгҒҜз ҙжЈ„пјүгҖӮ\\nвҖ»з”ҹжҲҗдёӯгҒҜгғ‘гғҚгғ«гӮ’ж“ҚдҪңгҒ§гҒҚгҒҫгҒӣгӮ“гҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ`)) return;
  // й–Ӣе§ӢжҷӮгҒ«иҮӘеӢ•дҝқеӯҳпјҲд»–з« гҒ®з·ЁйӣҶгӮ’зўәе®ҡгҒ—гҖҒеҶҚз”ҹжҲҗгҒ®еҹәжә–гҒ«еҗ«гӮҒгӮӢпјүвҶ’ гғӯгғғгӮҜ вҶ’ еҶҚз”ҹжҲҗ
  showLock('еҶҚз”ҹжҲҗгҒ®еүҚгҒ«дҝқеӯҳдёӯвҖҰ');
  const sv=await api('/api/script', DATA);
  if(!sv.ok){ hideLock(); alert('дҝқеӯҳгҒ«еӨұж•—гҒ—гҒҹгҒҹгӮҒдёӯжӯўгҒ—гҒҫгҒ—гҒҹ: '+(sv.message||'')); return; }
  showLock('еҶҚз”ҹжҲҗдёӯвҖҰ Geminiз”ҹжҲҗгҒ®гҒҹгӮҒж“ҚдҪңгҒ§гҒҚгҒҫгҒӣгӮ“пјҲ20гҖң40з§’пјү');
  const r=await api('/api/regenerate', {indices: idx, fallback: fbEnabled()});
  if(r.ok){
    selChs.clear();
    const [s,rev]=await Promise.all([fetch('/api/script').then(x=>x.json()), fetch('/api/cuts').then(x=>x.json())]);
    DATA=s; CUTS=rev.cuts||[]; cutMap={}; CUTS.forEach(c=>cutMap[c.ch+'_'+c.ci]=c);
    (r.regenerated||[]).forEach(i=>OPEN.add(i));  // еҶҚз”ҹжҲҗгҒ—гҒҹз« гӮ’й–ӢгҒ„гҒҰзўәиӘҚгҒ—гӮ„гҒҷгҒҸ
    render(); updateRegenBtn(); hideLock();
    alert('еҶҚз”ҹжҲҗгҒ—гҒҫгҒ—гҒҹ: '+ (r.titles||[]).map(t=>'гҖҢ'+t+'гҖҚ').join(' '));
  } else {
    hideLock(); updateRegenBtn(); alert('еҶҚз”ҹжҲҗгҒ«еӨұж•—: '+(r.message||''));
  }
};

Promise.all([fetch('/api/script').then(r=>r.json()), fetch('/api/cuts').then(r=>r.json()),
             fetch('/api/status').then(r=>r.json())])
.then(([s,rev,st])=>{
  if(st&&st.target){ TARGET_CHARS=st.target.chars; TARGET_LABEL=st.target.label; }  // гӮ·гғ§гғјгғҲ/жң¬з·ЁгҒ§зӣ®жЁҷеҲҮжӣҝ
  if(s.error){ document.getElementById('main').textContent=s.error; return; }
  DATA=s; CUTS=rev.cuts||[]; cutMap={}; CUTS.forEach(c=>cutMap[c.ch+'_'+c.ci]=c);
  if(DATA.chapters&&DATA.chapters.length) OPEN.add(0);  // е…Ҳй ӯгҒҜй–ӢгҒ„гҒҰгҒҠгҒҸ
  render();
});
</script>
</body></html>
