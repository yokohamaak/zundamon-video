<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストーリーエディタ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e2e8f0;
    --text2: #8892aa;
    --accent: #5b8dee;
    --green: #4ade80;
    --danger: #f87171;
    --yellow: #fbbf24;
    --left-w: 320px;
    --right-w: 360px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── ヘッダー ── */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 14px; font-weight: 600; letter-spacing: .02em; margin-right: 4px; }
  .header-title-edit {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); padding: 3px 8px; font-size: 13px; min-width: 200px;
  }
  .header-title-edit:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 5px 12px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; white-space: nowrap;
  }
  .btn:hover:not(:disabled) { opacity: .82; }
  .btn:disabled { opacity: .38; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-sm { padding: 3px 8px; font-size: 12px; }
  /* 音声生成が必要なとき：目立つ黄色＋点滅 */
  .btn.needs-audio {
    background: var(--yellow); color: #3a2e00; font-weight: 700;
    border-color: var(--yellow);
    animation: status-pulse 1.3s ease-in-out infinite;
  }
  .status { font-size: 12px; color: var(--text2); margin-left: auto; min-width: 100px; text-align: right; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--danger); }
  .status.dirty { color: var(--yellow); }
  /* 音声生成などの進捗：目立つ色＋太字＋点滅 */
  .status.busy {
    color: #ffd23f; font-weight: 700; font-size: 13px;
    animation: status-pulse 1s ease-in-out infinite;
  }
  @keyframes status-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  /* ── トップタブ（台本/シーン） ── */
  .top-tabs { display: flex; gap: 2px; margin-left: 4px; }
  .top-tab {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 14px; font-size: 13px; cursor: pointer;
    border-radius: 6px;
  }
  .top-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── 3ペインレイアウト ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── シーン編集 / 表情編集（iframe埋め込み） ── */
  .scene-view, .expr-view { flex: 1; overflow: hidden; }
  .scene-view iframe, .expr-view iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ── 左ペイン: 台本一覧 ── */
  .pane-left {
    width: var(--left-w); flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .pane-left-toolbar {
    display: flex; gap: 4px; padding: 6px 8px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .script-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }
  /* シーングループ見出し */
  .scene-group-header {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px 2px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    color: var(--text2); text-transform: uppercase;
    border-top: 1px solid var(--border); margin-top: 4px;
  }
  .scene-group-header:first-child { border-top: none; margin-top: 0; }
  /* ターン行 */
  .turn-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; cursor: pointer; border-radius: 0;
    transition: background .1s;
  }
  .turn-row:hover { background: var(--surface2); }
  .turn-row.selected { background: rgba(91,141,238,.18); border-left: 3px solid var(--accent); padding-left: 7px; }
  .turn-icon {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    object-fit: cover; background: var(--surface2);
  }
  .turn-icon-fallback {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .turn-body { flex: 1; min-width: 0; }
  .turn-speaker { font-size: 11px; font-weight: 600; color: var(--text2); }
  .turn-text { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .turn-badges { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
  .badge {
    font-size: 10px; padding: 1px 4px; border-radius: 3px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  }
  .badge-insert { background: rgba(91,141,238,.2); color: var(--accent); }
  .badge-fx { background: rgba(251,191,36,.15); color: var(--yellow); }

  /* ── 中央ペイン: Remotion Player ── */
  .pane-center {
    flex: 1; background: var(--bg);
    display: flex; flex-direction: column;
    overflow: hidden; padding: 10px 12px;
    gap: 8px;
  }
  .preview-toolbar {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 12px; color: var(--text2);
  }
  /* 拡大時にスクロールできる領域。小さい時は中央寄せ（min-*:100%で実現）。 */
  .preview-scroll { flex: 1; overflow: auto; min-height: 0; }
  .preview-scroll-inner {
    min-width: 100%; min-height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-player-wrap {
    /* 幅/高さは sizePlayerWrap() が px で設定（16:9でペインに収める）。 */
    background: #080a0f;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    flex-shrink: 0;
  }
  .preview-status {
    font-size: 11px; color: var(--text2); text-align: center;
    flex-shrink: 0;
  }
  .timeline-header {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    font-size: 11px; color: var(--text2);
  }
  .timeline-scroll {
    flex-shrink: 0; overflow-x: auto; overflow-y: hidden;
    border: 1px solid var(--border); border-radius: 6px;
  }

  /* ── 右ペイン: 詳細 ── */
  .pane-right {
    width: var(--right-w); flex-shrink: 0;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .detail-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 13px;
  }
  /* タブ */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .tab-btn {
    flex: 1; padding: 8px 0; background: none; border: none;
    color: var(--text2); font-size: 13px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color .15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-content { flex: 1; overflow-y: auto; }
  .tab-panel { display: none; padding: 12px 14px; }
  .tab-panel.active { display: block; }

  /* フォーム部品 */
  .field-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-label { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: .04em; }
  .field-input, .field-select, .field-textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); padding: 5px 8px;
    font-size: 13px; width: 100%;
  }
  .field-textarea { resize: vertical; min-height: 72px; font-family: inherit; line-height: 1.5; }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .toggle-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
  .toggle-row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .section-divider {
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text2); padding: 8px 0 4px; border-top: 1px solid var(--border);
    margin-top: 8px; margin-bottom: 4px;
  }
  .section-divider:first-child { border-top: none; margin-top: 0; }
  .fx-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

  /* enter/exit マルチセレクト */
  .multi-select-wrap {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .multi-check {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer;
    border: 1px solid transparent;
  }
  .multi-check:hover { background: var(--surface); }
  .multi-check input { accent-color: var(--accent); cursor: pointer; }
  .exit-dir-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; font-size: 12px; color: var(--text2); }

  /* insert フォーム */
  .insert-array-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 8px; margin-bottom: 6px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .insert-array-item:last-child { margin-bottom: 0; }
  .insert-item-header { display: flex; align-items: center; justify-content: space-between; }
  .insert-item-idx { font-size: 11px; color: var(--text2); }
  .insert-add-btn {
    margin-top: 6px; width: 100%; padding: 5px;
    background: transparent; border: 1px dashed var(--border);
    color: var(--text2); border-radius: 5px; cursor: pointer; font-size: 12px;
  }
  .insert-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 音タブ共通 ── */
  .audio-section-header {
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text2); padding: 6px 0 4px; border-top: 1px solid var(--border);
    margin-top: 6px; margin-bottom: 2px;
  }
  .audio-section-header:first-child { border-top: none; margin-top: 0; }
  .se-event-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid rgba(46,51,71,.5);
  }
  .se-event-row:last-child { border-bottom: none; }
  .se-event-label {
    min-width: 110px; font-size: 12px; color: var(--text); flex-shrink: 0;
  }
  .se-event-sel { flex: 1; }
  .se-event-vol { width: 90px; flex-shrink: 0; }
  .se-enabled-cb { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  .scene-bgm-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid rgba(46,51,71,.5);
  }
  .scene-bgm-row:last-child { border-bottom: none; }
  .scene-bgm-label { min-width: 120px; font-size: 12px; color: var(--text); flex-shrink: 0; }
  .scene-bgm-sel { flex: 1; }
  .scene-bgm-vol { width: 90px; flex-shrink: 0; }
  .bgm-range-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 8px 10px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .bgm-range-label { font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .bgm-range-num { width: 58px; }
  .vol-display { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; flex-shrink: 0; }
  /* ターン詳細内手動SE */
  .se-manual-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
  }
  .se-manual-row:last-child { margin-bottom: 0; }
  .se-manual-sel { flex: 1; }
  .se-manual-at { width: 60px; }
  .se-manual-vol { width: 70px; }
</style>
</head>
<body>

<div class="header">
  <h1>ストーリーエディタ</h1>
  <div class="top-tabs">
    <button class="top-tab active" id="tabScript" data-view="script">台本</button>
    <button class="top-tab" id="tabScene" data-view="scene">シーン</button>
    <button class="top-tab" id="tabExpr" data-view="expr">表情</button>
    <button class="top-tab" id="tabGen" data-view="gen">台本生成</button>
    <button class="top-tab" id="tabAudio" data-view="audio">音</button>
  </div>
  <input type="text" class="header-title-edit" id="storyTitle" placeholder="タイトル">
  <select class="field-select" id="idleFaceSel" title="聞き役(非話者)の表情の扱い" style="width:auto; padding:2px 6px; font-size:12px;">
    <option value="normal">聞き役: 真顔</option>
    <option value="hold">聞き役: 直前を保持</option>
  </select>
  <button class="btn btn-primary" id="btnSave">💾 保存</button>
  <button class="btn btn-secondary" id="btnAudio" title="保存してVOICEVOXで音声生成（要VOICEVOX起動）">🔊 音声生成</button>
  <button class="btn btn-secondary" id="btnExport" title="編集中の台本をJSONファイルに書き出す（音声不要・別ストーリーへ切替/再開用）">⬇ エクスポート</button>
  <button class="btn btn-secondary" id="btnImport" title="JSONファイルから台本を読み込む（現在の編集内容は置き換わる）">⬆ インポート</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  <button class="btn btn-secondary" disabled title="次フェーズ（書き出し）">🎬 書き出し</button>
  <span class="status" id="statusMsg"></span>
</div>

<div class="main" id="viewScript">
  <!-- 左ペイン: 台本一覧 -->
  <div class="pane-left">
    <div class="pane-left-toolbar">
      <button class="btn btn-secondary btn-sm" id="btnAdd" title="選択行の後ろに空ターンを挿入">＋ 追加</button>
      <button class="btn btn-danger btn-sm" id="btnDelete" title="選択ターンを削除">🗑</button>
      <button class="btn btn-secondary btn-sm" id="btnUp" title="上へ">↑</button>
      <button class="btn btn-secondary btn-sm" id="btnDown" title="下へ">↓</button>
    </div>
    <div class="script-list" id="scriptList"></div>
  </div>

  <!-- 中央ペイン: Remotion Player -->
  <div class="pane-center">
    <div class="preview-toolbar">
      <label for="previewZoom">プレビュー</label>
      <select class="field-select" id="previewZoom" style="width:auto; padding:2px 6px; font-size:12px;">
        <option value="fit">フィット</option>
        <option value="1">100%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
        <option value="3">300%</option>
        <option value="4">400%</option>
      </select>
      <span class="preview-status" id="playerStatus" style="margin-left:8px;">story-player.js を読み込み中...</span>
    </div>
    <div class="preview-scroll">
      <div class="preview-scroll-inner">
        <div class="preview-player-wrap" id="playerWrap"></div>
      </div>
    </div>
    <!-- プレビュー下のタイムライン（セリフ＋BGM）。クリックでシーク。 -->
    <div class="timeline-header">
      <span>タイムライン</span>
      <button class="btn btn-secondary btn-sm" id="btnAddBgmRegion" style="margin-left:8px; font-size:12px; padding:2px 8px;">＋BGM</button>
      <label for="timelineZoom" style="margin-left:auto;">ズーム</label>
      <select class="field-select" id="timelineZoom" style="width:auto; padding:2px 6px; font-size:12px;">
        <option value="1">フィット</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
        <option value="8">8x</option>
        <option value="16">16x</option>
      </select>
    </div>
    <div class="timeline-scroll" id="timelineScroll">
      <canvas id="scriptTimeline" height="72"
        title="BGMレーン: ドラッグで区間作成/移動/リサイズ。セリフレーン: クリックでシーク"
        style="display:block; height:72px; background:var(--surface2); cursor:pointer;"></canvas>
    </div>
    <!-- BGM区間エディタ（タイムライン直下） -->
    <div id="bgmRegionEditor" style="padding:6px 10px; background:var(--surface); border-top:1px solid var(--border); min-height:32px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <span id="bgmRegionEditorHint" style="font-size:12px; color:var(--text2);">BGM区間を選択 / 空きをドラッグで作成</span>
      <div id="bgmRegionEditorFields" style="display:none; align-items:center; gap:10px; flex-wrap:wrap; width:100%;">
        <select id="bgmRegionFile" class="field-select" style="flex:1; min-width:140px; max-width:220px;"></select>
        <button id="bgmRegionPlay" class="btn btn-secondary btn-sm" style="flex-shrink:0; padding:2px 9px;" title="試聴">▶</button>
        <label style="font-size:12px; color:var(--text2); flex-shrink:0;">音量</label>
        <input type="range" id="bgmRegionVolume" min="0" max="1" step="0.05" value="0.25" style="width:80px; accent-color:var(--accent); flex-shrink:0;">
        <span id="bgmRegionVolDisp" style="font-size:12px; color:var(--text2); flex-shrink:0; min-width:30px;">0.25</span>
        <label style="font-size:12px; color:var(--text2); flex-shrink:0;">start</label>
        <input type="number" id="bgmRegionStart" class="field-input" min="0" step="0.1" style="width:64px; flex-shrink:0;">
        <label style="font-size:12px; color:var(--text2); flex-shrink:0;">end</label>
        <input type="number" id="bgmRegionEnd" class="field-input" min="0" step="0.1" style="width:64px; flex-shrink:0;">
        <label style="font-size:12px; color:var(--text2); flex-shrink:0;">fadeIn</label>
        <input type="number" id="bgmRegionFadeIn" class="field-input" min="0" step="0.1" style="width:52px; flex-shrink:0;">
        <label style="font-size:12px; color:var(--text2); flex-shrink:0;">fadeOut</label>
        <input type="number" id="bgmRegionFadeOut" class="field-input" min="0" step="0.1" style="width:52px; flex-shrink:0;">
        <button id="bgmRegionDelete" class="btn btn-danger btn-sm" style="flex-shrink:0;">削除</button>
      </div>
    </div>
  </div>

  <!-- 右ペイン: 詳細 -->
  <div class="pane-right">
    <div class="detail-empty" id="detailEmpty">ターンを選択してください</div>
    <div id="detailPanel" style="display:none; display:flex; flex-direction:column; height:100%; overflow:hidden;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="basic">基本</button>
        <button class="tab-btn" data-tab="insert">インサート</button>
      </div>
      <div class="tab-content">
        <!-- 基本タブ -->
        <div class="tab-panel active" id="tabBasic">
          <div class="field-row">
            <label class="field-label">話者</label>
            <select class="field-select" id="fSpeaker"></select>
          </div>
          <div class="field-row">
            <label class="field-label">セリフ</label>
            <textarea class="field-textarea" id="fText"></textarea>
          </div>
          <div class="field-row">
            <label class="field-label">シーン</label>
            <select class="field-select" id="fScene"></select>
          </div>
          <div class="field-row">
            <label class="field-label">表情</label>
            <select class="field-select" id="fExpression">
              <option value="">(なし)</option>
            </select>
          </div>

          <div class="section-divider">演出</div>
          <div class="fx-grid" style="margin-bottom:10px">
            <label class="toggle-row">
              <input type="checkbox" id="fEmphasis">
              <span>ズーム</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="fShake">
              <span>シェイク</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" id="fFlashback">
              <span>回想</span>
            </label>
          </div>
          <div class="field-row">
            <label class="field-label">テロップ (telop)</label>
            <input type="text" class="field-input" id="fTelop" placeholder="例: ― 前日 ―">
          </div>
          <div class="field-row">
            <label class="field-label">ポーズ秒 (pause)</label>
            <input type="number" class="field-input" id="fPause" min="0" step="0.1" placeholder="0.0">
          </div>

          <div class="section-divider">SE（任意）</div>
          <div id="fSeList" style="margin-bottom:4px;"></div>
          <button class="insert-add-btn" id="btnAddSe" style="margin-bottom:8px;">＋ SE追加</button>

          <div class="section-divider">登退場</div>
          <div class="field-row">
            <label class="field-label">enter（このセリフで登場）</label>
            <div class="multi-select-wrap" id="fEnter"></div>
          </div>
          <div class="field-row">

<script>
// ============================================================
// 状態
// ============================================================
let storyData = null;    // story-01.json 全体 { title, audio, script, ... }
let meta = null;         // /api/meta { speakers, speakerIcons, scenes, expressions, insertKinds }
let selectedIdx = -1;    // 選択中ターンのインデックス
let isDirty = false;     // 未保存変更フラグ
let playerReady = false; // Remotion Player が mount 済みか
let updateTimer = null;  // updateStory debounce タイマー

// 話者→背景色（アイコン未設定時の色丸）
const SPEAKER_COLORS = {
  zundamon: "#4ade80",
  metan: "#5b8dee",
  "営業": "#f87171",
  "部長": "#fbbf24",
  "AI": "#a78bfa",
};
function speakerColor(sp) {
  return SPEAKER_COLORS[sp] || "#8892aa";
}

// ============================================================
// 初期化
// ============================================================
async function init() {
  try {
    const [storyRes, metaRes] = await Promise.all([
      fetch("/api/story"),
      fetch("/api/meta"),
    ]);
    storyData = await storyRes.json();
    meta = await metaRes.json();

    document.getElementById("storyTitle").value = storyData.title || "";
    document.getElementById("idleFaceSel").value = storyData.idleFace || "normal";
    buildSpeakerSelect();
    buildSceneSelect();
    buildExpressionSelect();
    buildMultiSpeakers();
    renderList();
    setupEvents();
    setupTabs();
    initPlayer();
    setupScriptTimeline();
  } catch (e) {
    setStatus("err", "初期化失敗: " + e.message);
  }
}

// ============================================================
// Remotion Player 初期化
// ============================================================
// プレビュー枠を 16:9 でスクロール領域に収め（フィット）、ズーム選択時はフィット倍率を掛ける。
// 拡大時は .preview-scroll がスクロールする。
function sizePlayerWrap() {
  const scroll = document.querySelector(".preview-scroll");
  const wrap = document.getElementById("playerWrap");
  if (!scroll || !wrap) return;
  const availW = Math.max(40, scroll.clientWidth - 8);
  const availH = Math.max(40, scroll.clientHeight - 8);
  // フィットサイズ（両方向に収まる最大の16:9）
  let fw = availW, fh = (fw * 9) / 16;
  if (fh > availH) { fh = availH; fw = (fh * 16) / 9; }
  const zsel = document.getElementById("previewZoom");
  const zv = zsel ? zsel.value : "fit";
  let w, h;
  if (zv === "fit" || !zv) { w = fw; h = fh; }
  else { const f = parseFloat(zv) || 1; w = fw * f; h = (w * 9) / 16; }
  wrap.style.width = Math.max(0, Math.floor(w)) + "px";
  wrap.style.height = Math.max(0, Math.floor(h)) + "px";
  if (typeof drawScriptTimeline === "function") drawScriptTimeline();
}
window.addEventListener("resize", sizePlayerWrap);

// 逆方向の同期：再生中、Playerの現在フレームに対応するターンを選択（ターン境界でのみ更新）。
// クリック→シークのecho（playing=false）では追従しない＝暴れない。
window.addEventListener("story-player-frame", (e) => {
  const d = e.detail || {};
  if (!d.playing) return;
  const idx = turnIndexAtTime((d.frame || 0) / 30);
  if (idx >= 0 && idx !== selectedIdx) selectTurn(idx, false);
});

// ============================================================
// プレビュー下タイムライン（セリフ＋BGM）。既存データ/連動を流用。
// ============================================================
let _sceneBgmMap = null;   // { sceneKey: {bgm, bgmVolume} }
let _playheadTime = 0;     // 現在の再生位置(秒)
const _SPK_COLORS = { zundamon: "#5fb84f", metan: "#e87bb0", "営業": "#9aa0a6", "部長": "#7a8190", "AI": "#5b8dee" };

// BGMレーンD&D 状態
let _selectedBgmIdx = -1;  // 選択中の storyData.bgm インデックス
let _bgmDrag = null;       // null | { op:"move"|"resizeL"|"resizeR"|"create", idx, origStart, origEnd, startX, cursorX, newRegion }
let _bgmDragThreshold = false; // create時のドラッグ閾値超え判定済みフラグ

async function ensureSceneBgmMap() {
  if (_sceneBgmMap) return _sceneBgmMap;
  try {
    const r = await fetch("/api/scene-bgm", { cache: "no-store" });
    if (r.ok) _sceneBgmMap = await r.json();
  } catch (e) { /* 無視 */ }
  return _sceneBgmMap || {};
}

function _bgmRegions() {
  // 時間ベース: storyData.bgm = [{start,end,file,volume,fadeIn,fadeOut}]
  // file あり & end>start のものだけ表示。空ならシーン連動フォールバック表示。
  const direct = (storyData && storyData.bgm) ? storyData.bgm : [];
  const timeBased = direct.filter(o => o.file && typeof o.start === "number" && typeof o.end === "number" && o.end > o.start);
  if (timeBased.length > 0) {
    return timeBased.slice().sort((a, b) => a.start - b.start);
  }
  // フォールバック: シーン連動（ターン単位→時間変換）。表示専用(編集不可)
  const turns = storyData ? storyData.script : [];
  const scn = _sceneBgmMap || {};
  const regions = [];
  for (let i = 0; i < turns.length; i++) {
    const sc = scn[turns[i].scene];
    const f = sc && sc.bgm ? sc.bgm : null;
    if (!f) continue;
    const last = regions[regions.length - 1];
    if (last && last.file === f && last._endIdx === i - 1) {
      last._endIdx = i; last.end = turns[i].end || 0;
    } else {
      regions.push({ file: f, start: turns[i].start || 0, end: turns[i].end || 0, _endIdx: i, _sceneFallback: true });
    }
  }
  return regions;
}

function _timelineTotal() {
  const turns = storyData ? storyData.script : [];
  let m = 1;
  for (const t of turns) m = Math.max(m, t.end || 0);
  return m;
}

function drawScriptTimeline() {
  const canvas = document.getElementById("scriptTimeline");
  if (!canvas) return;
  const turns = storyData ? storyData.script : [];
  const ctx = canvas.getContext("2d");
  // 横ズーム: スクロール領域の幅 × 倍率 をキャンバス幅にする（拡大時は横スクロール）。
  const scrollEl = document.getElementById("timelineScroll");
  const zsel = document.getElementById("timelineZoom");
  const zoom = zsel ? (parseFloat(zsel.value) || 1) : 1;
  const baseW = (scrollEl ? scrollEl.clientWidth : canvas.clientWidth) || 600;
  const W = Math.max(40, Math.round(baseW * zoom));
  const H = canvas.height;
  canvas.width = W;
  canvas.style.width = W + "px";
  ctx.clearRect(0, 0, W, H);
  if (!turns.length) return;
  const total = _timelineTotal();
  const xOf = (sec) => Math.round((sec / total) * W);
  const PAD = 13;
  const laneH = (H - PAD - 6) / 2;
  const yTalk = PAD, yBgm = PAD + laneH + 2;

  // セリフ レーン
  for (let i = 0; i < turns.length; i++) {
    const t = turns[i];
    const x1 = xOf(t.start || 0), x2 = xOf(t.end || t.start || 0);
    ctx.fillStyle = _SPK_COLORS[t.speaker] || "#9aa0a6";
    ctx.globalAlpha = (i === selectedIdx) ? 1 : 0.7;
    ctx.fillRect(x1, yTalk, Math.max(2, x2 - x1 - 1), laneH);
    ctx.globalAlpha = 1;
  }
  // BGM レーン
  const regions = _bgmRegions();
  const BGM_COLORS = ["#5b8dee", "#4ade80", "#fbbf24", "#a78bfa", "#38bdf8"];
  // storyData.bgm の時間ベース区間を描画（インデックス対応で選択ハイライト）
  const directBgm = (storyData && storyData.bgm) ? storyData.bgm : [];
  const isTimeBased = directBgm.some(o => o.file && typeof o.start === "number" && typeof o.end === "number" && o.end > o.start);
  if (isTimeBased) {
    directBgm.forEach((r, i) => {
      if (!r.file || typeof r.start !== "number" || typeof r.end !== "number" || r.end <= r.start) return;
      const x1 = xOf(r.start), x2 = xOf(r.end);
      const isSel = (i === _selectedBgmIdx);
      ctx.fillStyle = BGM_COLORS[i % BGM_COLORS.length];
      ctx.globalAlpha = isSel ? 0.85 : 0.6;
      ctx.fillRect(x1, yBgm, Math.max(2, x2 - x1 - 1), laneH);
      ctx.globalAlpha = 1;
      if (isSel) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x1 + 0.75, yBgm + 0.75, Math.max(2, x2 - x1 - 2), laneH - 1.5);
      }
      if (x2 - x1 > 28) {
        ctx.fillStyle = "#0b0d12";
        ctx.font = "10px system-ui, sans-serif";
        ctx.fillText(r.file.replace(/^bgm\//, ""), x1 + 4, yBgm + laneH - 4);
      }
    });
    // ドラッグ中の新規区間プレビュー
    if (_bgmDrag && _bgmDrag.op === "create" && _bgmDragThreshold) {
      const d = _bgmDrag;
      const s = Math.min(d.origStart, d.origEnd), e2 = Math.max(d.origStart, d.origEnd);
      const x1 = xOf(s), x2 = xOf(e2);
      ctx.fillStyle = "#ffffff";
      ctx.globalAlpha = 0.25;
      ctx.fillRect(x1, yBgm, Math.max(2, x2 - x1), laneH);
      ctx.globalAlpha = 1;
    }
  } else {
    // フォールバック(シーン連動): 読み取り専用表示
    regions.forEach((r, i) => {
      const x1 = xOf(r.start), x2 = xOf(r.end);
      ctx.fillStyle = BGM_COLORS[i % BGM_COLORS.length];
      ctx.globalAlpha = 0.4;
      ctx.fillRect(x1, yBgm, Math.max(2, x2 - x1 - 1), laneH);
      ctx.globalAlpha = 1;
      if (x2 - x1 > 28) {
        ctx.fillStyle = "#8892aa";
        ctx.font = "10px system-ui, sans-serif";
        ctx.fillText(r.file.replace(/^bgm\//, ""), x1 + 4, yBgm + laneH - 4);
      }
    });
  }
  // レーン名
  ctx.fillStyle = "#8892aa"; ctx.font = "9px system-ui, sans-serif";
  ctx.fillText("セリフ", 3, 10);
  ctx.fillText("BGM", 3, yBgm - 2);
  // 再生ヘッド
  const phx = xOf(_playheadTime);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(phx, 0, 2, H);

  // 再生中は拡大時にヘッドを画面内へ自動スクロール
  if (scrollEl && zoom > 1 && window.storyPlayer && window.storyPlayer.isPlaying && window.storyPlayer.isPlaying()) {
    const view = scrollEl.clientWidth;
    if (phx < scrollEl.scrollLeft + 30 || phx > scrollEl.scrollLeft + view - 30) {
      scrollEl.scrollLeft = Math.max(0, phx - view / 2);
    }
  }
}

// ============================================================
// audioAssets を台本タブでも使えるように早期ロード
// ============================================================
async function ensureAudioAssets() {
  if (audioAssets) return audioAssets;
  try {
    const r = await fetch("/api/audio-assets");
    if (r.ok) audioAssets = await r.json();
  } catch (e) { /* 無視 */ }
  return audioAssets || { bgm: [], se: [] };
}

// ============================================================
// BGM区間 D&D ヘルパー
// ============================================================
const SNAP = 0.05;       // スナップ単位(秒)
const MIN_LEN = 0.2;     // 最小区間長(秒)
const EDGE_PX = 6;       // 端ハンドル幅(px)

function _snapT(t) {
  return Math.round(t / SNAP) * SNAP;
}

// キャンバス内 x → 時間(秒)
function _timelineXtoT(canvas, x) {
  const W = canvas.width;
  const total = _timelineTotal();
  return (x / W) * total;
}

// 時間 → キャンバス内 x
function _timelineTtoX(canvas, t) {
  const W = canvas.width;
  const total = _timelineTotal();
  return (t / total) * W;
}

// マウスイベントからキャンバス内 x を返す(スクロールオフセット込み)
function _canvasX(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  return e.clientX - rect.left;
}

// BGMレーンのY範囲
function _bgmLaneY(canvas) {
  const H = canvas.height;
  const PAD = 13;
  const laneH = (H - PAD - 6) / 2;
  const yBgm = PAD + laneH + 2;
  return { yBgm, laneH };
}

// storyData.bgm の時間ベース区間をインデックスつきで取得
function _timeBgmRegions() {
  if (!storyData || !storyData.bgm) return [];
  return storyData.bgm
    .map((r, i) => ({ ...r, _idx: i }))
    .filter(r => r.file && typeof r.start === "number" && typeof r.end === "number" && r.end > r.start);
}

// ヒットテスト: BGMレーン上のどこをクリックしたか
function _bgmHitTest(canvas, cx, cy) {
  const { yBgm, laneH } = _bgmLaneY(canvas);
  if (cy < yBgm || cy > yBgm + laneH) return null; // BGMレーン外
  const t = _timelineXtoT(canvas, cx);
  const regions = _timeBgmRegions();
  // 後ろから検索(上に重なった区間が優先)
  for (let i = regions.length - 1; i >= 0; i--) {
    const r = regions[i];
    const x1 = _timelineTtoX(canvas, r.start);
    const x2 = _timelineTtoX(canvas, r.end);
    if (cx >= x1 - EDGE_PX && cx <= x2 + EDGE_PX) {
      if (cx <= x1 + EDGE_PX) return { type: "resizeL", idx: r._idx, region: r };
      if (cx >= x2 - EDGE_PX) return { type: "resizeR", idx: r._idx, region: r };
      return { type: "move", idx: r._idx, region: r };
    }
  }
  return { type: "create", idx: -1, t };
}

// BGMエディタUI を選択区間で更新
function _updateBgmRegionEditor() {
  const hint = document.getElementById("bgmRegionEditorHint");
  const fields = document.getElementById("bgmRegionEditorFields");
  if (!hint || !fields) return;
  const idx = _selectedBgmIdx;
  const bgm = storyData && storyData.bgm ? storyData.bgm : [];
  const r = (idx >= 0 && idx < bgm.length) ? bgm[idx] : null;
  if (!r) {
    hint.style.display = "";
    fields.style.display = "none";
    return;
  }
  hint.style.display = "none";
  fields.style.display = "flex";

  // ファイルドロップダウン
  const fileSel = document.getElementById("bgmRegionFile");
  if (fileSel) {
    // 現在の選択を維持しながら options を更新
    const prev = fileSel.value;
    fileSel.innerHTML = "";
    const noneOpt = document.createElement("option");
    noneOpt.value = ""; noneOpt.textContent = "なし";
    fileSel.appendChild(noneOpt);
    const bgmFiles = (audioAssets && audioAssets.bgm) ? audioAssets.bgm : [];
    for (const f of bgmFiles) {
      const opt = document.createElement("option");
      opt.value = f; opt.textContent = f.replace(/^bgm\//, "");
      fileSel.appendChild(opt);
    }
    // 現在値が一覧にない場合でも追加
    if (r.file && !bgmFiles.includes(r.file)) {
      const opt = document.createElement("option");
      opt.value = r.file; opt.textContent = r.file;
      fileSel.insertBefore(opt, fileSel.firstChild.nextSibling);
    }
    fileSel.value = r.file || "";
  }

  const volSlider = document.getElementById("bgmRegionVolume");
  const volDisp = document.getElementById("bgmRegionVolDisp");
  if (volSlider) {
    volSlider.value = r.volume != null ? r.volume : 0.25;
    if (volDisp) volDisp.textContent = parseFloat(volSlider.value).toFixed(2);
  }
  const startInp = document.getElementById("bgmRegionStart");
  if (startInp) startInp.value = r.start != null ? r.start.toFixed(2) : "0";
  const endInp = document.getElementById("bgmRegionEnd");
  if (endInp) endInp.value = r.end != null ? r.end.toFixed(2) : "0";
  const fadeInInp = document.getElementById("bgmRegionFadeIn");
  if (fadeInInp) fadeInInp.value = r.fadeIn != null ? r.fadeIn : 0.6;
  const fadeOutInp = document.getElementById("bgmRegionFadeOut");
  if (fadeOutInp) fadeOutInp.value = r.fadeOut != null ? r.fadeOut : 0.6;
}

// BGMエディタの各コントロールから storyData.bgm[idx] へ反映
function _collectBgmRegionEditor() {
  const idx = _selectedBgmIdx;
  if (!storyData || !storyData.bgm || idx < 0 || idx >= storyData.bgm.length) return;
  const r = storyData.bgm[idx];
  const fileSel = document.getElementById("bgmRegionFile");
  if (fileSel) r.file = fileSel.value;
  const volSlider = document.getElementById("bgmRegionVolume");
  if (volSlider) r.volume = parseFloat(volSlider.value);
  const startInp = document.getElementById("bgmRegionStart");
  if (startInp && startInp.value !== "") {
    const v = parseFloat(startInp.value);
    if (!isNaN(v)) r.start = Math.max(0, Math.min(r.end - MIN_LEN, v));
  }
  const endInp = document.getElementById("bgmRegionEnd");
  if (endInp && endInp.value !== "") {
    const total = _timelineTotal();
    const v = parseFloat(endInp.value);
    if (!isNaN(v)) r.end = Math.max(r.start + MIN_LEN, Math.min(total, v));
  }
  const fadeInInp = document.getElementById("bgmRegionFadeIn");
  if (fadeInInp && fadeInInp.value !== "") r.fadeIn = parseFloat(fadeInInp.value) || 0;
  const fadeOutInp = document.getElementById("bgmRegionFadeOut");
  if (fadeOutInp && fadeOutInp.value !== "") r.fadeOut = parseFloat(fadeOutInp.value) || 0;
  markDirty();
  notifyPlayerUpdate();
  drawScriptTimeline();
  _updateBgmRegionEditor();
}

// BGMエディタの各コントロールにイベントを設定（一度だけ呼ぶ）
function _setupBgmRegionEditorEvents() {
  const fileSel = document.getElementById("bgmRegionFile");
  if (fileSel) fileSel.addEventListener("change", _collectBgmRegionEditor);
  const volSlider = document.getElementById("bgmRegionVolume");
  const volDisp = document.getElementById("bgmRegionVolDisp");
  if (volSlider) {
    volSlider.addEventListener("input", () => {
      if (volDisp) volDisp.textContent = parseFloat(volSlider.value).toFixed(2);
      _collectBgmRegionEditor();
    });
  }
  const startInp = document.getElementById("bgmRegionStart");
  if (startInp) startInp.addEventListener("change", _collectBgmRegionEditor);
  const endInp = document.getElementById("bgmRegionEnd");
  if (endInp) endInp.addEventListener("change", _collectBgmRegionEditor);
  const fadeInInp = document.getElementById("bgmRegionFadeIn");
  if (fadeInInp) fadeInInp.addEventListener("change", _collectBgmRegionEditor);
  const fadeOutInp = document.getElementById("bgmRegionFadeOut");
  if (fadeOutInp) fadeOutInp.addEventListener("change", _collectBgmRegionEditor);
  const playBtn = document.getElementById("bgmRegionPlay");
  if (playBtn) playBtn.addEventListener("click", () => {
    const f = document.getElementById("bgmRegionFile");
    if (f) previewAudioFile(f.value);
  });
  const delBtn = document.getElementById("bgmRegionDelete");
  if (delBtn) delBtn.addEventListener("click", () => {
    const idx = _selectedBgmIdx;
    if (!storyData || !storyData.bgm || idx < 0) return;
    storyData.bgm.splice(idx, 1);
    _selectedBgmIdx = -1;
    markDirty();
    notifyPlayerUpdate();
    drawScriptTimeline();
    _updateBgmRegionEditor();
  });
  const addBtn = document.getElementById("btnAddBgmRegion");
  if (addBtn) addBtn.addEventListener("click", () => {
    if (!storyData) return;
    if (!storyData.bgm) storyData.bgm = [];
    const total = _timelineTotal();
    const s = _snapT(Math.min(_playheadTime, total - MIN_LEN));
    const e2 = _snapT(Math.min(s + 5, total));
    const file = (audioAssets && audioAssets.bgm && audioAssets.bgm.length > 0) ? audioAssets.bgm[0] : "";
    storyData.bgm.push({ start: s, end: Math.max(s + MIN_LEN, e2), file, volume: 0.25, fadeIn: 0.6, fadeOut: 0.6 });
    _selectedBgmIdx = storyData.bgm.length - 1;
    markDirty();
    notifyPlayerUpdate();
    drawScriptTimeline();
    ensureAudioAssets().then(() => _updateBgmRegionEditor());
  });
}

function setupScriptTimeline() {
  const canvas = document.getElementById("scriptTimeline");
  if (!canvas) return;

  _setupBgmRegionEditorEvents();
  ensureAudioAssets(); // 早期ロード

  // ============================================================
  // BGMレーン D&D: mousedown
  // ============================================================
  canvas.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    const cx = _canvasX(canvas, e);
    const cy = e.clientY - canvas.getBoundingClientRect().top;
    const { yBgm } = _bgmLaneY(canvas);
    const turns = storyData ? storyData.script : [];

    // セリフレーン → シーク(従来動作)
    if (cy < yBgm) {
      if (!turns.length) return;
      const total = _timelineTotal();
      const t = Math.max(0, _timelineXtoT(canvas, cx));
      if (window.storyPlayer && playerReady) window.storyPlayer.seekToTime(t);
      const idx = turnIndexAtTime(t);
      if (idx >= 0) selectTurn(idx, false);
      _playheadTime = t;
      drawScriptTimeline();
      return;
    }

    // BGMレーン → D&D 開始
    e.preventDefault();
    const hit = _bgmHitTest(canvas, cx, cy);
    if (!hit) return;

    if (hit.type === "create") {
      const t = _snapT(_timelineXtoT(canvas, cx));
      _bgmDrag = { op: "create", idx: -1, origStart: t, origEnd: t, startX: cx };
      _bgmDragThreshold = false;
    } else {
      const r = hit.region;
      _bgmDrag = { op: hit.type, idx: hit.idx, origStart: r.start, origEnd: r.end, startX: cx, cursorX: cx };
      _selectedBgmIdx = hit.idx;
      ensureAudioAssets().then(() => _updateBgmRegionEditor());
    }
    drawScriptTimeline();
  });

  // ============================================================
  // BGMレーン D&D: mousemove
  // ============================================================
  window.addEventListener("mousemove", (e) => {
    if (!_bgmDrag) {
      // カーソル更新(ホバー)
      const cy = e.clientY - canvas.getBoundingClientRect().top;
      const cx = _canvasX(canvas, e);
      const { yBgm, laneH } = _bgmLaneY(canvas);
      if (cy >= yBgm && cy <= yBgm + laneH) {
        const hit = _bgmHitTest(canvas, cx, cy);
        if (hit && hit.type === "resizeL") canvas.style.cursor = "ew-resize";
        else if (hit && hit.type === "resizeR") canvas.style.cursor = "ew-resize";
        else if (hit && hit.type === "move") canvas.style.cursor = "grab";
        else canvas.style.cursor = "crosshair";
      } else {
        canvas.style.cursor = "default";
      }
      return;
    }

    e.preventDefault();
    const d = _bgmDrag;
    const cx = _canvasX(canvas, e);
    const total = _timelineTotal();
    const dt = _timelineXtoT(canvas, cx - d.startX); // 移動量(秒)

    if (d.op === "create") {
      const curT = _snapT(_timelineXtoT(canvas, cx));
      d.origEnd = Math.max(0, Math.min(total, curT));
      if (Math.abs(cx - d.startX) > 4) _bgmDragThreshold = true;
    } else if (d.op === "move") {
      const dur = d.origEnd - d.origStart;
      let ns = _snapT(d.origStart + dt);
      ns = Math.max(0, Math.min(total - dur, ns));
      storyData.bgm[d.idx].start = ns;
      storyData.bgm[d.idx].end = _snapT(ns + dur);
    } else if (d.op === "resizeL") {
      let ns = _snapT(d.origStart + dt);
      ns = Math.max(0, Math.min(storyData.bgm[d.idx].end - MIN_LEN, ns));
      storyData.bgm[d.idx].start = ns;
    } else if (d.op === "resizeR") {
      let ne = _snapT(d.origEnd + dt);
      ne = Math.max(storyData.bgm[d.idx].start + MIN_LEN, Math.min(total, ne));
      storyData.bgm[d.idx].end = ne;
    }
    drawScriptTimeline();
    if (d.op !== "create") _updateBgmRegionEditor();
  });

  // ============================================================
  // BGMレーン D&D: mouseup
  // ============================================================
  window.addEventListener("mouseup", (e) => {
    if (!_bgmDrag) return;
    const d = _bgmDrag;
    _bgmDrag = null;

    if (d.op === "create") {
      if (!_bgmDragThreshold) {
        // クリック扱い: シーク
        const t = _snapT(d.origStart);
        if (window.storyPlayer && playerReady) window.storyPlayer.seekToTime(t);
        _playheadTime = t;
        drawScriptTimeline();
        return;
      }
      // 区間作成
      let s = Math.min(d.origStart, d.origEnd);
      let en = Math.max(d.origStart, d.origEnd);
      s = _snapT(s); en = _snapT(en);
      if (en - s < MIN_LEN) en = s + MIN_LEN;
      const total = _timelineTotal();
      en = Math.min(total, en);
      s = Math.max(0, s);
      if (!storyData.bgm) storyData.bgm = [];
      const file = (audioAssets && audioAssets.bgm && audioAssets.bgm.length > 0) ? audioAssets.bgm[0] : "";
      storyData.bgm.push({ start: s, end: en, file, volume: 0.25, fadeIn: 0.6, fadeOut: 0.6 });
      _selectedBgmIdx = storyData.bgm.length - 1;
      markDirty();
      notifyPlayerUpdate();
      drawScriptTimeline();
      ensureAudioAssets().then(() => _updateBgmRegionEditor());
    } else {
      // move/resize 確定
      markDirty();
      notifyPlayerUpdate();
      drawScriptTimeline();
      _updateBgmRegionEditor();
    }
    canvas.style.cursor = "default";
  });

  // 再生中はヘッド追従
  window.addEventListener("story-player-frame", (e) => {
    _playheadTime = ((e.detail && e.detail.frame) || 0) / 30;
    drawScriptTimeline();
  });
  window.addEventListener("resize", drawScriptTimeline);
  ensureSceneBgmMap().then(drawScriptTimeline);
}

function initPlayer() {
  const statusEl = document.getElementById("playerStatus");

  function onPlayerApiReady() {
    const wrap = document.getElementById("playerWrap");
    sizePlayerWrap(); // マウント前に枠サイズを確定（Playerが正しく測れるように）
    statusEl.textContent = "Player を mount 中...";
    window.storyPlayer.mount(wrap).then(() => {
      playerReady = true;
      statusEl.textContent = "";
      sizePlayerWrap(); // ステータス文字が消えた分の高さ変化を反映
      // 選択中ターンがあればシーク
      if (selectedIdx >= 0) seekPlayer(selectedIdx);
    }).catch((err) => {
      statusEl.textContent = "Player の初期化に失敗: " + err.message;
    });
  }

  if (window.storyPlayer) {
    // すでに story-player.js が読み込み済み
    onPlayerApiReady();
  } else {
    window.addEventListener("story-player-ready", onPlayerApiReady, { once: true });
    // story-player.js を動的に読み込む
    const script = document.createElement("script");
    // キャッシュ回避: 毎回新しいURLにして再ビルド後の最新バンドルを確実に読む。
    script.src = "/story-player.js?v=" + Date.now();
    script.onerror = () => {
      statusEl.textContent = "story-player.js の読み込みに失敗（ビルドが必要: node scripts/build-story-player.mjs）";
    };
    document.head.appendChild(script);
  }
}

// 指定インデックスのターンへシーク。start が 0/未設定のターンは先頭(0)へ。
function seekPlayer(idx) {
  if (!playerReady || !window.storyPlayer) return;
  const turn = storyData && storyData.script ? storyData.script[idx] : null;
  if (!turn) return;
  const sec = (turn.start && turn.start > 0) ? turn.start : 0;
  window.storyPlayer.seekToTime(sec);
}

// storyData の変更を Player へ通知（debounce 150ms）。
function notifyPlayerUpdate() {
  if (!playerReady || !window.storyPlayer) return;
  if (updateTimer) clearTimeout(updateTimer);
  updateTimer = setTimeout(() => {
    if (window.storyPlayer && storyData) {
      window.storyPlayer.updateStory(storyData);
    }
    updateTimer = null;
  }, 150);
}

// ============================================================
// セレクト初期構築
// ============================================================
function buildSpeakerSelect() {
  const sel = document.getElementById("fSpeaker");
  sel.innerHTML = "";
  for (const sp of meta.speakers) {
    const o = document.createElement("option");
    o.value = sp; o.textContent = sp;
    sel.appendChild(o);
  }
}

function buildSceneSelect() {
  // シーンは scene_editor で登録済みのものから選ぶ（ドロップダウン）。
  // 自由入力にはしない（新規シーンは scene_editor で作ってから選ぶ運用）。
  const sel = document.getElementById("fScene");
  sel.innerHTML = "";
  for (const sc of meta.scenes) {
    const o = document.createElement("option");
    o.value = sc; o.textContent = sc;
    sel.appendChild(o);
  }
}

// turn.scene を select にセット。未登録値（AI由来/旧データ）は消さず「(未登録)」で保持表示。
function setSceneValue(scene) {
  const sel = document.getElementById("fScene");
  const val = scene || "";
  if (val && !Array.from(sel.options).some((o) => o.value === val)) {
    const o = document.createElement("option");
    o.value = val; o.textContent = "(未登録) " + val;
    sel.appendChild(o);
  }
  sel.value = val;
}

function buildExpressionSelect() {
  _buildExpressionOptions(null);
}

// 表情ドロップダウンを構築する。prevValue が指定された場合は選択を維持する。
function _buildExpressionOptions(prevValue) {
  const sel = document.getElementById("fExpression");
  const keep = prevValue !== null ? prevValue : sel.value;
  sel.innerHTML = "";
  const none = document.createElement("option");
  none.value = ""; none.textContent = "(なし)";
  sel.appendChild(none);
  for (const ex of meta.expressions) {
    const o = document.createElement("option");
    o.value = ex; o.textContent = ex;
    sel.appendChild(o);
  }
  // 以前の選択値を復元（選択肢に存在する場合のみ）
  if (keep && Array.from(sel.options).some(o => o.value === keep)) {
    sel.value = keep;
  }
}

function buildMultiSpeakers() {
  buildMultiSelect("fEnter", meta.speakers);
  buildMultiSelect("fExit", meta.speakers);
}

function buildMultiSelect(containerId, speakers) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  for (const sp of speakers) {
    const label = document.createElement("label");
    label.className = "multi-check";
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.value = sp;
    label.appendChild(cb);
    label.appendChild(document.createTextNode(sp));
    wrap.appendChild(label);
  }
}

// ============================================================
// 台本一覧レンダリング
// ============================================================
function renderList() {
  const container = document.getElementById("scriptList");
  container.innerHTML = "";
  const script = storyData.script;
  let lastScene = null;

  for (let i = 0; i < script.length; i++) {
    const turn = script[i];

    // シーングループ見出し
    if (turn.scene !== lastScene) {
      const header = document.createElement("div");
      header.className = "scene-group-header";
      header.textContent = "▸ " + (turn.scene || "(シーンなし)");
      container.appendChild(header);
      lastScene = turn.scene;
    }

    // ターン行
    const row = document.createElement("div");
    row.className = "turn-row" + (i === selectedIdx ? " selected" : "");
    row.dataset.idx = i;

    // アイコン
    const icon = speakerIcon(turn.speaker);
    row.appendChild(icon);

    // 本文
    const body = document.createElement("div");
    body.className = "turn-body";
    const spEl = document.createElement("div");
    spEl.className = "turn-speaker";
    spEl.textContent = turn.speaker;
    const textEl = document.createElement("div");
    textEl.className = "turn-text";
    textEl.textContent = turn.text;

    // バッジ
    const badges = document.createElement("div");
    badges.className = "turn-badges";
    if (turn.emphasis) badges.appendChild(makeBadge("ズーム", "fx"));
    if (turn.shake) badges.appendChild(makeBadge("シェイク", "fx"));
    if (turn.flashback) badges.appendChild(makeBadge("回想", "fx"));
    if (turn.insert) badges.appendChild(makeBadge(turn.insert.kind, "insert"));

    body.appendChild(spEl);
    body.appendChild(textEl);
    if (badges.children.length > 0) body.appendChild(badges);
    row.appendChild(body);

    row.addEventListener("click", () => selectTurn(i));
    container.appendChild(row);
  }
  if (typeof drawScriptTimeline === "function") drawScriptTimeline();
}

function makeBadge(text, type) {
  const b = document.createElement("span");
  b.className = "badge badge-" + type;
  b.textContent = text;
  return b;
}

function speakerIcon(speaker) {
  const iconPath = meta.speakerIcons[speaker];
  if (iconPath) {
    const img = document.createElement("img");
    img.className = "turn-icon";
    img.src = "/img/" + iconPath;
    img.onerror = () => {
      img.replaceWith(fallbackIcon(speaker));
    };
    return img;
  }
  return fallbackIcon(speaker);
}

function fallbackIcon(speaker) {
  const div = document.createElement("div");
  div.className = "turn-icon-fallback";
  div.style.background = speakerColor(speaker);
  div.textContent = speaker.charAt(0).toUpperCase();
  return div;
}

// ============================================================
// ターン選択
// ============================================================
function selectTurn(idx, doSeek = true) {
  selectedIdx = idx;
  renderList();
  renderDetail();
  const sel = document.querySelector(".turn-row.selected");
  if (sel) sel.scrollIntoView({ block: "nearest" });
  if (doSeek) seekPlayer(idx);
}

// 時刻(秒)に対応する turn の index（start <= t の最後のターン）。
function turnIndexAtTime(t) {
  const s = storyData ? storyData.script : [];
  let idx = -1;
  for (let i = 0; i < s.length; i++) {
    if ((s[i].start || 0) <= t + 1e-6) idx = i; else break;
  }
  return idx;
}

// ============================================================
// 詳細ペイン
// ============================================================
function renderDetail() {
  const emptyEl = document.getElementById("detailEmpty");
  const panelEl = document.getElementById("detailPanel");

  if (selectedIdx < 0 || selectedIdx >= storyData.script.length) {
    emptyEl.style.display = "";
    panelEl.style.display = "none";
    return;
  }

  emptyEl.style.display = "none";
  panelEl.style.display = "flex";

  const turn = storyData.script[selectedIdx];

  // ── 基本タブ ──
  setField("fSpeaker", "select", turn.speaker || "");
  setField("fText", "textarea", turn.text || "");
  // scene: 登録済みシーンのドロップダウン（未登録値は保持表示）
  setSceneValue(turn.scene);
  setField("fExpression", "select", turn.expression || "");
  document.getElementById("fEmphasis").checked = !!turn.emphasis;
  document.getElementById("fShake").checked = !!turn.shake;
  document.getElementById("fFlashback").checked = !!turn.flashback;
  document.getElementById("fTelop").value = turn.telop || "";
  document.getElementById("fPause").value = turn.pause != null ? turn.pause : "";

  // enter / exit（チェックボックス群）
  setMultiSelect("fEnter", turn.enter || []);
  setMultiSelect("fExit", turn.exit || []);
  setField("fExitDir", "select", turn.exitDir || "");

  // ── 手動SE ──
  renderManualSe();

  // ── インサートタブ ──
  const kind = turn.insert ? turn.insert.kind : "";
  document.getElementById("fInsertKind").value = kind;
  renderInsertFields(turn.insert || null);
}

function setField(id, type, value) {
  const el = document.getElementById(id);
  if (!el) return;
  if (type === "select") {
    // 選択肢にない値を動的追加
    let found = false;
    for (const opt of el.options) {
      if (opt.value === value) { found = true; break; }
    }
    if (!found && value) {
      const o = document.createElement("option");
      o.value = value; o.textContent = value;
      el.insertBefore(o, el.firstChild);
    }
    el.value = value;
  } else {
    el.value = value;
  }
}

function setMultiSelect(containerId, selected) {
  const wrap = document.getElementById(containerId);
  for (const label of wrap.querySelectorAll("label.multi-check")) {
    const cb = label.querySelector("input");
    cb.checked = selected.includes(cb.value);
  }
}

function getMultiSelect(containerId) {
  const wrap = document.getElementById(containerId);
  const result = [];
  for (const cb of wrap.querySelectorAll("input[type=checkbox]")) {
    if (cb.checked) result.push(cb.value);
  }
  return result;
}

// ── インサートフォーム ──
function renderInsertFields(insert) {
  const container = document.getElementById("insertFields");
  container.innerHTML = "";
  const kind = insert ? insert.kind : "";

  if (!kind) return;

  if (kind === "warning") {
    container.appendChild(makeField("title（任意）", "text", "fITitle", insert.title || ""));
    container.appendChild(makeField("text", "text", "fIText", insert.text || ""));
  } else if (kind === "ok") {
    container.appendChild(makeField("text（任意）", "text", "fIText", insert.text || ""));
  } else if (kind === "chat") {
    container.appendChild(makeField("user", "text", "fIChatUser", insert.user || ""));
    // ai: string[]
    const section = document.createElement("div");
    section.className = "section-divider";
    section.textContent = "AI 返答（ai 配列）";
    container.appendChild(section);
    const aiWrap = document.createElement("div");
    aiWrap.id = "fIAiItems";
    container.appendChild(aiWrap);
    const aiItems = insert.ai || [];
    for (let i = 0; i < aiItems.length; i++) {
      aiWrap.appendChild(makeChatAiItem(i, aiItems[i]));
    }
    container.appendChild(makeAddBtn("＋ AI返答を追加", () => {
      const items = getChatAiItems();
      items.push("");
      refreshChatAiItems(items);
    }));
    // highlight
    container.appendChild(makeField("highlight（インデックス・任意）", "number", "fIChatHighlight",
      insert.highlight != null ? insert.highlight : ""));
  } else if (kind === "teamchat") {
    container.appendChild(makeField("channel（任意）", "text", "fIChannel", insert.channel || ""));
    const section = document.createElement("div");
    section.className = "section-divider";
    section.textContent = "メッセージ（messages 配列）";
    container.appendChild(section);
    const msgWrap = document.createElement("div");
    msgWrap.id = "fIMessages";
    container.appendChild(msgWrap);
    const msgs = insert.messages || [];
    for (let i = 0; i < msgs.length; i++) {
      msgWrap.appendChild(makeTeamchatItem(i, msgs[i]));
    }
    container.appendChild(makeAddBtn("＋ メッセージを追加", () => {
      const items = getTeamchatMessages();
      const turn = storyData.script[selectedIdx];
      const lastSpeaker = items.length > 0 ? items[items.length - 1].from
        : (turn ? turn.speaker : "");
      items.push({ from: lastSpeaker, text: "", highlight: false });
      refreshTeamchatItems(items);
    }));
  } else if (kind === "mailer") {
    container.appendChild(makeField("from（差出人名・任意）", "text", "fIMailFrom", insert.from || ""));
    container.appendChild(makeField("fromAddr（メールアドレス・任意）", "text", "fIMailFromAddr", insert.fromAddr || ""));
    container.appendChild(makeField("subject（件名）", "text", "fIMailSubject", insert.subject || ""));
    container.appendChild(makeTextareaField("body（本文）", "fIMailBody", insert.body || ""));
    container.appendChild(makeField("time（時刻・任意 例: 14:32）", "text", "fIMailTime", insert.time || ""));
  }
}

function makeField(labelText, inputType, id, value) {
  const wrap = document.createElement("div");
  wrap.className = "field-row";
  const lbl = document.createElement("label");
  lbl.className = "field-label"; lbl.textContent = labelText;
  const inp = document.createElement("input");
  inp.type = inputType; inp.className = "field-input";
  inp.id = id; inp.value = value;
  inp.addEventListener("change", collectInsert);
  wrap.appendChild(lbl); wrap.appendChild(inp);
  return wrap;
}

function makeTextareaField(labelText, id, value) {
  const wrap = document.createElement("div");
  wrap.className = "field-row";
  const lbl = document.createElement("label");
  lbl.className = "field-label"; lbl.textContent = labelText;
  const ta = document.createElement("textarea");
  ta.className = "field-textarea field-input";
  ta.id = id; ta.value = value;
  ta.addEventListener("change", collectInsert);
  wrap.appendChild(lbl); wrap.appendChild(ta);

}

function makeAddBtn(text, onClick) {
  const btn = document.createElement("button");
  btn.className = "insert-add-btn";
  btn.textContent = text;
  btn.addEventListener("click", onClick);
  return btn;
}

function makeChatAiItem(idx, value) {
  const item = document.createElement("div");
  item.className = "insert-array-item";
  item.dataset.idx = idx;
  const header = document.createElement("div");
  header.className = "insert-item-header";
  const lbl = document.createElement("span");
  lbl.className = "insert-item-idx";
  lbl.textContent = "ai[" + idx + "]";
  const del = document.createElement("button");
  del.className = "btn btn-danger btn-sm"; del.textContent = "削除";

    const items = getChatAiItems();
    items.splice(idx, 1);
    refreshChatAiItems(items);
  });
  header.appendChild(lbl); header.appendChild(del);
  const inp = document.createElement("input");
  inp.type = "text"; inp.className = "field-input"; inp.value = value;
  inp.dataset.field = "ai"; inp.dataset.idx = idx;
  inp.addEventListener("change", collectInsert);

function makeTeamchatItem(idx, msg) {
  const item = document.createElement("div");
  item.className = "insert-array-item";
  item.dataset.idx = idx;
  const header = document.createElement("div");
  header.className = "insert-item-header";
  const lbl = document.createElement("span");
  lbl.className = "insert-item-idx";
  lbl.textContent = "msg[" + idx + "]";
  const del = document.createElement("button");
  del.className = "btn btn-danger btn-sm"; del.textContent = "削除";
  del.addEventListener("click", () => {
    const items = getTeamchatMessages();
    items.splice(idx, 1);
    refreshTeamchatItems(items);
  });
  header.appendChild(lbl); header.appendChild(del);

  // from: speakers から選択
  const fromRow = document.createElement("div");
  fromRow.className = "field-row";
  const fromLbl = document.createElement("label");
  fromLbl.className = "field-label"; fromLbl.textContent = "from";
  const fromSel = document.createElement("select");
  fromSel.className = "field-select"; fromSel.dataset.field = "from"; fromSel.dataset.idx = idx;
  for (const sp of meta.speakers) {
    const o = document.createElement("option");
    o.value = sp; o.textContent = sp;
    fromSel.appendChild(o);
  }
  // speakers にない値も保持
  if (msg.from && !meta.speakers.includes(msg.from)) {
    const o = document.createElement("option");
    o.value = msg.from; o.textContent = msg.from;
    fromSel.insertBefore(o, fromSel.firstChild);
  }
  fromSel.value = msg.from || "";
  fromSel.addEventListener("change", collectInsert);
  fromRow.appendChild(fromLbl); fromRow.appendChild(fromSel);

  const textRow = document.createElement("div");
  textRow.className = "field-row";
  const textLbl = document.createElement("label");
  textLbl.className = "field-label"; textLbl.textContent = "text";
  const textInp = document.createElement("input");
  textInp.type = "text"; textInp.className = "field-input";
  textInp.value = msg.text || "";
  textInp.dataset.field = "text"; textInp.dataset.idx = idx;
  textInp.addEventListener("change", collectInsert);
  textRow.appendChild(textLbl); textRow.appendChild(textInp);

  const hlRow = document.createElement("div");
  hlRow.className = "field-row";
  const hlLbl = document.createElement("label");
  hlLbl.className = "toggle-row";
  const hlCb = document.createElement("input");
  hlCb.type = "checkbox";
  hlCb.checked = !!msg.highlight;
  hlCb.dataset.field = "highlight"; hlCb.dataset.idx = idx;
  hlCb.addEventListener("change", collectInsert);
  hlLbl.appendChild(hlCb);
  hlLbl.appendChild(document.createTextNode("highlight"));
  hlRow.appendChild(hlLbl);

  item.appendChild(header); item.appendChild(fromRow); item.appendChild(textRow); item.appendChild(hlRow);
  return item;
}

function getChatAiItems() {
  const wrap = document.getElementById("fIAiItems");
  if (!wrap) return [];
  const inputs = wrap.querySelectorAll("input[type=text]");
  return Array.from(inputs).map(inp => inp.value);
}

function refreshChatAiItems(items) {
  const wrap = document.getElementById("fIAiItems");
  if (!wrap) return;
  wrap.innerHTML = "";
  for (let i = 0; i < items.length; i++) {
    const el = makeChatAiItem(i, items[i]);
    // イベント再バインドは makeChatAiItem 内で行われる
    wrap.appendChild(el);
  }
  collectInsert();
}

function getTeamchatMessages() {
  const wrap = document.getElementById("fIMessages");
  if (!wrap) return [];
  const items = wrap.querySelectorAll(".insert-array-item");
  return Array.from(items).map(item => {
    const fromSel = item.querySelector("select[data-field=from]");
    const textInp = item.querySelector("input[data-field=text]");
    const hlCb = item.querySelector("input[data-field=highlight]");
    return {
      from: fromSel ? fromSel.value : "",
      text: textInp ? textInp.value : "",
      highlight: hlCb ? hlCb.checked : false,
    };
  });
}

function refreshTeamchatItems(items) {
  const wrap = document.getElementById("fIMessages");
  if (!wrap) return;
  wrap.innerHTML = "";
  for (let i = 0; i < items.length; i++) {
    wrap.appendChild(makeTeamchatItem(i, items[i]));
  }
  collectInsert();
}

// ============================================================
// フォームから turn を収集してメモリ更新
// ============================================================
function collectBasic() {
  if (selectedIdx < 0) return;
  const turn = storyData.script[selectedIdx];
  const oldSpeaker = turn.speaker, oldText = turn.text, oldPause = turn.pause;
  turn.speaker = document.getElementById("fSpeaker").value;
  turn.text = document.getElementById("fText").value;
  turn.scene = document.getElementById("fScene").value;

  const expr = document.getElementById("fExpression").value;
  if (expr) turn.expression = expr;
  else delete turn.expression;

  turn.emphasis = document.getElementById("fEmphasis").checked || undefined;
  if (!turn.emphasis) delete turn.emphasis;
  turn.shake = document.getElementById("fShake").checked || undefined;
  if (!turn.shake) delete turn.shake;
  turn.flashback = document.getElementById("fFlashback").checked || undefined;
  if (!turn.flashback) delete turn.flashback;

  const telop = document.getElementById("fTelop").value;
  if (telop) turn.telop = telop; else delete turn.telop;

  const pauseVal = document.getElementById("fPause").value;
  if (pauseVal !== "") turn.pause = parseFloat(pauseVal);
  else delete turn.pause;

  const enter = getMultiSelect("fEnter");
  if (enter.length > 0) turn.enter = enter; else delete turn.enter;

  const exit = getMultiSelect("fExit");
  if (exit.length > 0) turn.exit = exit; else delete turn.exit;

  const exitDir = document.getElementById("fExitDir").value;
  if (exitDir) turn.exitDir = exitDir; else delete turn.exitDir;

  markDirty();
  // 音声に影響する変更（話者/セリフ/間）なら「要・音声生成」にする。
  if (turn.speaker !== oldSpeaker || turn.text !== oldText || turn.pause !== oldPause) markAudioDirty();
  renderList(); // バッジ等を更新
  notifyPlayerUpdate();
}

function collectInsert() {
  if (selectedIdx < 0) return;
  const turn = storyData.script[selectedIdx];
  const kind = document.getElementById("fInsertKind").value;

  if (!kind) {
    delete turn.insert;
    markDirty();
    renderList();
    notifyPlayerUpdate();
    return;
  }

  let ins = { kind };

  if (kind === "warning") {
    const title = document.getElementById("fITitle");
    const text = document.getElementById("fIText");
    if (title && title.value) ins.title = title.value;
    if (text) ins.text = text.value;
  } else if (kind === "ok") {
    const text = document.getElementById("fIText");
    if (text && text.value) ins.text = text.value;
  } else if (kind === "chat") {
    const user = document.getElementById("fIChatUser");
    if (user) ins.user = user.value;
    ins.ai = getChatAiItems();
    const hl = document.getElementById("fIChatHighlight");
    if (hl && hl.value !== "") ins.highlight = parseInt(hl.value, 10);
  } else if (kind === "teamchat") {
    const ch = document.getElementById("fIChannel");
    if (ch && ch.value) ins.channel = ch.value;
    const msgs = getTeamchatMessages();
    // highlight=false は省略（JSONを汚さない）
    ins.messages = msgs.map(m => {
      const obj = { from: m.from, text: m.text };
      if (m.highlight) obj.highlight = true;
      return obj;
    });
  } else if (kind === "mailer") {
    const mFrom = document.getElementById("fIMailFrom");
    if (mFrom && mFrom.value) ins.from = mFrom.value;
    const mFromAddr = document.getElementById("fIMailFromAddr");
    if (mFromAddr && mFromAddr.value) ins.fromAddr = mFromAddr.value;
    const mSubject = document.getElementById("fIMailSubject");
    ins.subject = mSubject ? mSubject.value : "";
    const mBody = document.getElementById("fIMailBody");
    ins.body = mBody ? mBody.value : "";
    const mTime = document.getElementById("fIMailTime");
    if (mTime && mTime.value) ins.time = mTime.value;
  }

  turn.insert = ins;
  markDirty();
  // セリフ空のターンのインサートは尺確保のため音声生成が必要（make_story_audioが最低表示秒を付与）。
  if (!(turn.text || "").trim()) markAudioDirty();
  renderList();
  notifyPlayerUpdate();
}

// ============================================================
// ターン操作（追加・削除・移動）
// ============================================================
function addTurnAfter() {
  const script = storyData.script;
  const refTurn = selectedIdx >= 0 && selectedIdx < script.length
    ? script[selectedIdx] : null;
  const newTurn = {
    id: generateId(script),
    speaker: refTurn ? refTurn.speaker : (meta.speakers[0] || ""),
    text: "",
    scene: refTurn ? refTurn.scene : (meta.scenes[0] || ""),
    start: 0,
    end: 0,
  };
  const insertAt = selectedIdx >= 0 ? selectedIdx + 1 : script.length;
  script.splice(insertAt, 0, newTurn);
  markDirty();
  markAudioDirty();
  selectedIdx = insertAt;
  renderList();
  renderDetail();
  notifyPlayerUpdate();
  seekPlayer(selectedIdx);
}

function deleteTurn() {
  if (selectedIdx < 0) return;
  const script = storyData.script;
  if (!confirm("ターンを削除しますか？")) return;
  script.splice(selectedIdx, 1);
  if (selectedIdx >= script.length) selectedIdx = script.length - 1;
  markDirty();
  markAudioDirty();
  renderList();
  renderDetail();
  notifyPlayerUpdate();
  seekPlayer(selectedIdx);
}

function moveUp() {
  if (selectedIdx <= 0) return;
  const script = storyData.script;
  const tmp = script[selectedIdx - 1];
  script[selectedIdx - 1] = script[selectedIdx];
  script[selectedIdx] = tmp;
  selectedIdx--;
  markDirty();
  markAudioDirty();
  renderList();
  notifyPlayerUpdate();
  seekPlayer(selectedIdx);
}

function moveDown() {
  const script = storyData.script;
  if (selectedIdx < 0 || selectedIdx >= script.length - 1) return;
  const tmp = script[selectedIdx + 1];
  script[selectedIdx + 1] = script[selectedIdx];
  script[selectedIdx] = tmp;
  selectedIdx++;
  markDirty();
  markAudioDirty();
  renderList();
  notifyPlayerUpdate();
  seekPlayer(selectedIdx);
}

function generateId(script) {
  const nums = script.map(t => {
    const m = (t.id || "").match(/turn-(\d+)/);
    return m ? parseInt(m[1], 10) : 0;
  });
  const max = nums.length > 0 ? Math.max(...nums) : 0;
  return "turn-" + String(max + 1).padStart(4, "0");
}

// ── 台本のエクスポート/インポート（編集状態だけをファイルで持ち運ぶ。音声は再生成前提） ──
function exportStory() {
  if (!storyData) return;
  storyData.title = document.getElementById("storyTitle").value;
  const safe = (storyData.title || "story").replace(/[\\/:*?"<>|\s]+/g, "_") || "story";
  const blob = new Blob([JSON.stringify(storyData, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = safe + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  setStatus("ok", "エクスポートしました");
}

function importStoryFromFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.script)) throw new Error("script 配列がありません");
      for (let i = 0; i < data.script.length; i++) {
        const t = data.script[i];
        if (!t || typeof t.speaker !== "string" || typeof t.text !== "string" || typeof t.scene !== "string")
          throw new Error("turn[" + i + "] に speaker/text/scene(文字列) が必要です");
      }
      storyData = data;
      document.getElementById("storyTitle").value = storyData.title || "";
      document.getElementById("idleFaceSel").value = storyData.idleFace || "normal";
      selectedIdx = -1;
      renderList();
      renderDetail();
      if (window.storyPlayer && playerReady) window.storyPlayer.updateStory(storyData);
      if (typeof drawScriptTimeline === "function") drawScriptTimeline();
      markDirty();
      markAudioDirty(); // 取り込んだ台本は音声未生成＝尺反映に音声生成が必要
      setStatus("ok", "インポートしました（保存→音声生成で尺反映）");
    } catch (e) {
      alert("インポート失敗: " + e.message);
    }
  };
  reader.readAsText(file);
}

async function saveStory() {
  setStatus("", "保存中...");
  // タイトル反映
  storyData.title = document.getElementById("storyTitle").value;
  try {
    const r = await fetch("/api/story", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(storyData),
    });
    const result = await r.json();
    if (r.ok && result.ok) {
      isDirty = false;
      setStatus(audioDirty ? "dirty" : "ok", audioDirty ? "保存しました（音声生成が必要）" : "保存しました");
      setTimeout(() => {
        if (!isDirty) setStatus("", "");
      }, 3000);
    } else {
      setStatus("err", result.error || "保存失敗");
    }
  } catch (e) {
    setStatus("err", "通信エラー");
  }
}

// 音声生成（保存 → make_story_audio → story再読込 → 一覧/プレビュー更新）
async function generateAudio() {
  const btn = document.getElementById("btnAudio");
  if (!confirm("VOICEVOX で音声生成します（数十秒〜）。VOICEVOXエンジンを起動済みか確認してください。")) return;
  btn.disabled = true;
  try {
    await saveStory();                       // 最新を保存してから生成（make_story_audioは保存済みJSONを読む）
    setStatus("busy", "音声生成 準備中…（VOICEVOX）");
    const r = await fetch("/api/audio", { method: "POST" });
    // 進捗を逐次ストリーム受信（[N/total] 話者: … 行を最新で表示）
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", ok = false, errMsg = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const ln of lines) {
        const s = ln.trim();
        if (!s) continue;
        if (s.startsWith("__DONE__")) {
          ok = s.startsWith("__DONE__ ok");
          if (!ok) errMsg = s.replace("__DONE__ err", "").trim();
        } else {
          const m = s.match(/\[\s*(\d+)\/(\d+)\]/);
          setStatus("busy", m ? ("音声生成 " + m[1] + "/" + m[2]) : ("音声生成: " + s));
        }
      }
    }
    if (ok) {
      const sres = await fetch("/api/story"); // 実尺/audioが入ったstoryを再読込
      storyData = await sres.json();
      renderList();
      if (selectedIdx >= 0) selectTurn(selectedIdx);
      if (window.storyPlayer && playerReady) window.storyPlayer.updateStory(storyData);
      audioDirty = false; updateAudioBtn();
      setStatus("ok", "音声生成 完了");
    } else {
      setStatus("err", "音声生成 失敗: " + (errMsg || "VOICEVOX起動を確認"));
    }
  } catch (e) {
    setStatus("err", "音声生成 通信エラー");
  } finally {
    btn.disabled = false;
  }
}

    : "保存してVOICEVOXで音声生成（要VOICEVOX起動）";

// 台本生成タブ: 取り込み結果レポート表示
// ============================================================
function showImportReport(turns, report) {
  const container = document.getElementById("genImportResult");
  if (!container) return;
  container.innerHTML = "";
  container.style.display = "block";

  const wrap = document.createElement("div");
  wrap.style.cssText = "background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:10px;";

  // ヘッダ行
  const header = document.createElement("div");
  header.style.cssText = "font-weight:700; font-size:13px; color:var(--green);";
  header.textContent = "取り込み完了: " + turns + " ターン";
  wrap.appendChild(header);

  const hasReport = report && (
    Object.keys(report.newScenes || {}).length > 0 ||
    Object.keys(report.newFields || {}).length > 0 ||
    Object.keys(report.newExpr || {}).length > 0 ||
    Object.keys(report.newInserts || {}).length > 0 ||
    (report.proposals || []).length > 0
  );

  if (!hasReport) {
    const clean = document.createElement("div");
    clean.style.cssText = "font-size:12px; color:var(--text2);";
    clean.textContent = "未対応の新演出はありません（すべて既存機能で表示できます）";
    wrap.appendChild(clean);
  } else {
    // 警告ブロック（未対応項目がある場合）
    const warnBox = document.createElement("div");
    warnBox.style.cssText = "display:flex; flex-direction:column; gap:6px;";

    function addItem(text, isWarn) {
      const row = document.createElement("div");
      row.style.cssText = "font-size:12px; line-height:1.6; padding:4px 8px; border-radius:4px; border-left:3px solid " +
        (isWarn ? "var(--yellow)" : "var(--accent)") + "; background:" +
        (isWarn ? "rgba(251,191,36,.08)" : "rgba(91,141,238,.08)") + "; color:" +
        (isWarn ? "var(--yellow)" : "var(--text)") + ";";
      row.textContent = text;
      warnBox.appendChild(row);
    }

    // 未作成シーン
    const newScenes = report.newScenes || {};
    for (const [name, turns_] of Object.entries(newScenes)) {
      addItem("未作成シーン: " + name + "（turn " + turns_.join(", ") + "）  シーンエディタで作成が必要", true);
    }

    // 新しい演出フィールド
    const newFields = report.newFields || {};
    for (const [name, turns_] of Object.entries(newFields)) {
      addItem("新しい演出: " + name + "（turn " + turns_.join(", ") + "）", true);
    }

    // 未登録表情
    const newExpr = report.newExpr || {};
    for (const [name, turns_] of Object.entries(newExpr)) {
      addItem("未登録の表情: " + name + "（turn " + turns_.join(", ") + "）  normal で表示されます", true);
    }

    // 未対応インサート
    const newInserts = report.newInserts || {};
    for (const [name, turns_] of Object.entries(newInserts)) {
      addItem("未対応インサート: " + name + "（turn " + turns_.join(", ") + "）", true);
    }

    wrap.appendChild(warnBox);

    // proposals
    const proposals = report.proposals || [];
    if (proposals.length > 0) {
      const propHeader = document.createElement("div");
      propHeader.style.cssText = "font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--text2); padding-top:4px; border-top:1px solid var(--border); margin-top:2px;";
      propHeader.textContent = "AIによる新演出提案";
      wrap.appendChild(propHeader);
      const propBox = document.createElement("div");
      propBox.style.cssText = "display:flex; flex-direction:column; gap:4px;";
      for (const p of proposals) {
        const row = document.createElement("div");
        row.style.cssText = "font-size:12px; color:var(--text); padding:4px 8px; border-radius:4px; background:rgba(91,141,238,.10); border-left:3px solid var(--accent);";
        row.textContent = "提案: " + p.name + " — " + p.desc;
        propBox.appendChild(row);
      }
      wrap.appendChild(propBox);
    }
  }

  container.appendChild(wrap);
}

// 台本/シーン/表情/台本生成/音 タブ切替。
// シーンは scene_editor(8770)、表情は expression_editor(8772) を iframe で埋め込み（初回のみ読み込み）。
function setupTabs() {
  const tScript = document.getElementById("tabScript");
  const tScene = document.getElementById("tabScene");
  const tExpr = document.getElementById("tabExpr");
  const tGen = document.getElementById("tabGen");
  const tAudio = document.getElementById("tabAudio");
  const vScript = document.getElementById("viewScript");
  const vScene = document.getElementById("viewScene");
  const vExpr = document.getElementById("viewExpr");
  const vGen = document.getElementById("viewGen");
  const vAudio = document.getElementById("viewAudio");
  const sceneFrame = document.getElementById("sceneFrame");
  const exprFrame = document.getElementById("exprFrame");

  function activateTab(active) {
    // タブボタンのactive切替
    [tScript, tScene, tExpr, tGen, tAudio].forEach(t => t.classList.toggle("active", t === active));
    // ビューの表示/非表示（viewGen/viewAudio は flex なので空文字では flex で表示する）
    vScript.style.display = active === tScript ? "" : "none";
    vScene.style.display = active === tScene ? "" : "none";
    vExpr.style.display = active === tExpr ? "" : "none";
    vGen.style.display = active === tGen ? "flex" : "none";
    vAudio.style.display = active === tAudio ? "flex" : "none";
  }

  tScript.addEventListener("click", () => {
    activateTab(tScript);
    refreshScenes();            // シーンが編集された可能性 → 台本側のシーン選択肢を更新
    refreshExpressions();       // 表情が追加/削除された可能性 → 台本側の表情選択肢を更新
    sizePlayerWrap();
  });
  tScene.addEventListener("click", () => {
    activateTab(tScene);
    if (!sceneFrame.getAttribute("src")) {
      // scene_editor は story_editor 起動時に自動起動（localhost:8770）
      sceneFrame.src = (location.protocol + "//" + location.hostname + ":8770/");
    }
  });
  tExpr.addEventListener("click", () => {
    activateTab(tExpr);
    if (!exprFrame.getAttribute("src")) {
      // expression_editor は story_editor 起動時に自動起動（localhost:8772）
      exprFrame.src = (location.protocol + "//" + location.hostname + ":8772/");
    }
  });
  tGen.addEventListener("click", () => {
    activateTab(tGen);
  });
  tAudio.addEventListener("click", () => {
    activateTab(tAudio);
    loadAudioPanel();
  });
}

// シーン編集後に台本側のシーンドロップダウンを最新化。
async function refreshScenes() {

    meta.scenes = m.scenes;
    buildSceneSelect();
    if (selectedIdx >= 0) setSceneValue(storyData.script[selectedIdx].scene);
    // プレビュー側のシーン定義も読み直す（背景/立ち位置/モブ配置の修正を反映）
    if (window.storyPlayer && playerReady) await window.storyPlayer.reloadScenes();
  } catch (e) { /* 失敗時は据え置き */ }
}

// 表情エディタでの追加/削除後に台本側の表情ドロップダウンを最新化。
// 現在選択中の表情値を可能な限り維持する。

  });
  document.getElementById("importFile").addEventListener("change", (e) => {
