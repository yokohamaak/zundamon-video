  });
  document.getElementById("btnAudio").addEventListener("click", generateAudio);
  document.getElementById("btnAdd").addEventListener("click", addTurnAfter);
  document.getElementById("btnDelete").addEventListener("click", deleteTurn);
  document.getElementById("btnUp").addEventListener("click", moveUp);
  document.getElementById("btnDown").addEventListener("click", moveDown);

  document.getElementById("storyTitle").addEventListener("input", markDirty);

  // タブ切替
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab" + capitalize(btn.dataset.tab)).classList.add("active");
    });
  });

  // 基本タブ: 変更をリアルタイム収集
  const basicIds = ["fSpeaker", "fText", "fScene", "fExpression",
                    "fEmphasis", "fShake", "fFlashback", "fTelop", "fPause", "fExitDir"];
  for (const id of basicIds) {
    const el = document.getElementById(id);
    if (!el) continue;
    const evt = (el.type === "checkbox") ? "change" : "input";
    el.addEventListener(evt, collectBasic);
  }

  // enter/exit チェックボックス群は動的生成後に委譲
  document.getElementById("fEnter").addEventListener("change", collectBasic);
  document.getElementById("fExit").addEventListener("change", collectBasic);

  // インサートタブ: kind変更でフォーム再構築
  document.getElementById("fInsertKind").addEventListener("change", () => {
    if (selectedIdx < 0) return;
    const kind = document.getElementById("fInsertKind").value;
    const turn = storyData.script[selectedIdx];
    // 種別変更時は insert を初期値にリセット
    if (!kind) {
      delete turn.insert;
    } else {
      turn.insert = buildDefaultInsert(kind, turn.insert);
    }
    renderInsertFields(turn.insert || null);
    markDirty();
    renderList();
    notifyPlayerUpdate();
  });

  // 音タブ: SEマッピング保存
  document.getElementById("btnSaveSeMap").addEventListener("click", saveSeMap);

  // 音タブ: シーンBGM保存
  document.getElementById("btnSaveSceneBgm").addEventListener("click", saveSceneBgm);

  // 音タブ: プレビュー再生/停止
  document.getElementById("btnAudioPlay").addEventListener("click", toggleAudioPreview);

  // プレビューのズーム倍率
  document.getElementById("previewZoom").addEventListener("change", sizePlayerWrap);

  // タイムラインの横ズーム
  document.getElementById("timelineZoom").addEventListener("change", drawScriptTimeline);

  // 基本タブ: 手動SE追加
  document.getElementById("btnAddSe").addEventListener("click", () => {
    if (selectedIdx < 0) return;
    const turn = storyData.script[selectedIdx];
    if (!turn.se) turn.se = [];
    turn.se.push({ file: "" });
    markDirty();
    renderManualSe();
  });

  // 台本生成タブ: プロンプト生成
  document.getElementById("btnGenPrompt").addEventListener("click", async () => {
    const theme = document.getElementById("genTheme").value.trim();
    if (!theme) {
      alert("題材・あらすじを入力してください。");
      return;
    }
    const length = document.getElementById("genLength").value.trim();
    const notes = document.getElementById("genNotes").value.trim();
    const mode = document.getElementById("genExperimental").checked ? "experimental" : "safe";
    const btn = document.getElementById("btnGenPrompt");
    btn.disabled = true;
    btn.textContent = "生成中...";
    try {
      const r = await fetch("/api/script-prompt", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ theme, length, notes, mode }),
      });
      const result = await r.json();
      if (r.ok && result.prompt) {
        document.getElementById("genPrompt").value = result.prompt;
      } else {
        alert("プロンプト生成に失敗しました: " + (result.error || r.status));
      }
    } catch (e) {
      alert("通信エラー: " + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "プロンプト生成";
    }
  });

  // 台本生成タブ: プロンプトをクリップボードへコピー
  document.getElementById("btnCopyPrompt").addEventListener("click", async () => {
    const ta = document.getElementById("genPrompt");
    const text = ta.value;
    if (!text) return;
    const btn = document.getElementById("btnCopyPrompt");
    const originalText = btn.textContent;
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = "コピーしました";
    } catch (e) {
      // fallback: select + execCommand
      ta.select();
      try { document.execCommand("copy"); } catch (_) {}
      btn.textContent = "コピーしました";
    }
    setTimeout(() => { btn.textContent = originalText; }, 1800);
  });

  // 台本生成タブ: AI出力を取り込んで読込
  document.getElementById("btnImportScript").addEventListener("click", async () => {
    const raw = document.getElementById("genImport").value.trim();
    if (!raw) {
      alert("AIが出力したJSONを貼り付けてください。");
      return;
    }
    const statusEl = document.getElementById("genImportStatus");
    const btn = document.getElementById("btnImportScript");
    btn.disabled = true;
    statusEl.style.color = "var(--text2)";
    statusEl.textContent = "送信中...";
    try {
      const r = await fetch("/api/import-script", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ raw }),
      });
      const result = await r.json();
      if (r.ok && result.ok) {
        statusEl.style.color = "var(--green)";
        statusEl.textContent = "取り込み完了";
        // ページ内でストーリーデータを再読込して一覧/プレビューを更新
        try {
          const sRes = await fetch("/api/story");
          storyData = await sRes.json();
          document.getElementById("storyTitle").value = storyData.title || "";
          buildSceneSelect();
          buildExpressionSelect();
          renderList();
          if (selectedIdx >= storyData.script.length) selectedIdx = storyData.script.length - 1;
          if (selectedIdx >= 0) renderDetail();
          if (window.storyPlayer && playerReady) window.storyPlayer.updateStory(storyData);
        } catch (_) { /* 再読込失敗時はレポートのみ表示して継続 */ }
        // レポート表示
        showImportReport(result.turns, result.report || null);
      } else {
        statusEl.style.color = "var(--danger)";
        statusEl.textContent = "エラー: " + (result.error || "取り込み失敗");
      }
    } catch (e) {
      statusEl.style.color = "var(--danger)";
      statusEl.textContent = "通信エラー: " + e.message;
    } finally {
      btn.disabled = false;
      if (statusEl.textContent === "送信中...") statusEl.textContent = "";
    }
  });
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function buildDefaultInsert(kind, prev) {
  if (kind === "warning") {
    return {
      kind: "warning",
      title: (prev && prev.kind === kind) ? (prev.title || "") : "",
      text: (prev && prev.kind === kind) ? (prev.text || "") : "",
    };
  } else if (kind === "ok") {
    return {
      kind: "ok",
      text: (prev && prev.kind === kind) ? (prev.text || "") : "",
    };
  } else if (kind === "chat") {
    return {
      kind: "chat",
      user: (prev && prev.kind === kind) ? (prev.user || "") : "",
      ai: (prev && prev.kind === kind) ? (prev.ai || []) : [],
    };
  } else if (kind === "teamchat") {
    return {
      kind: "teamchat",
      channel: (prev && prev.kind === kind) ? (prev.channel || "") : "",
      messages: (prev && prev.kind === kind) ? (prev.messages || []) : [],
    };
  }
  return { kind };
}

let _previewAudioEl = null;
function previewAudioFile(file) {
  // file 例: "se/surprise.mp3" / "bgm/bgm.mp3"。/preview-assets/ 経由(Range対応)で配信。
  if (!file) return;
  try {
    if (_previewAudioEl) { _previewAudioEl.pause(); _previewAudioEl = null; }
    _previewAudioEl = new Audio("/preview-assets/" + file);
    _previewAudioEl.volume = 0.9;
    _previewAudioEl.play().catch(() => {});
  } catch (e) { /* 無視 */ }
}
// クリックで getFile() のファイルを試聴する小さな▶ボタンを作る。
function makeAudioPlayBtn(getFile) {
  const b = document.createElement("button");
  b.type = "button";
  b.className = "btn btn-secondary btn-sm";
  b.textContent = "▶";
  b.title = "試聴";
  b.style.cssText = "flex-shrink:0; padding:2px 9px;";
  b.addEventListener("click", (e) => { e.preventDefault(); previewAudioFile(getFile()); });
  return b;
}

// 音タブ: プレビュー再生/停止
// ============================================================
function _setAudioPlayBtn(playing) {
  const btn = document.getElementById("btnAudioPlay");
  if (btn) btn.textContent = playing ? "⏸ 停止" : "▶ 再生";
}
async function toggleAudioPreview() {
  const sp = window.storyPlayer;
  const st = document.getElementById("audioPlayStatus");
  if (!sp || !playerReady) {
    if (st) { st.textContent = "プレビュー未読み込み（台本タブを一度開いてください）"; st.className = "status err"; }
    return;
  }
  if (sp.isPlaying()) {
    sp.pause();
    _setAudioPlayBtn(false);
    if (st) st.textContent = "";
    return;
  }
  if (st) { st.textContent = "最新の設定を反映中..."; st.className = "status"; }
  await sp.reloadAudio();   // 保存済みのBGM/SE/シーンを反映
  sp.play();
  _setAudioPlayBtn(true);
  if (st) st.textContent = "再生中";
}
// Player のフレーム更新イベントで再生状態に応じてボタン表示を同期。

});

async function loadAudioPanel() {
  // 既ロード済みなら更新しない（再描画のみ）。
  // 毎回再取得したい場合は audioLoaded をリセットして呼べばよい。
  if (audioLoaded) return;
  try {
    const [assetsRes, seRes, sceneBgmRes] = await Promise.all([
      fetch("/api/audio-assets"),
      fetch("/api/se-map"),
      fetch("/api/scene-bgm"),
    ]);
    audioAssets = await assetsRes.json();
    seMap = await seRes.json();
    sceneBgmData = await sceneBgmRes.json();
    audioLoaded = true;
    renderSeMapSection();
    renderSceneBgmSection();
  } catch (e) {
    document.getElementById("seMapContainer").innerHTML =
      "<div style=\"color:var(--danger);font-size:12px;\">読み込みエラー: " + e.message + "</div>";
  }
}

// ============================================================
// セクションA: SE自動マッピング
// ============================================================
function renderSeMapSection() {
  const container = document.getElementById("seMapContainer");
  container.innerHTML = "";

  const CATEGORY_LABELS = {
    expression: "表情",
    effect: "エフェクト",
    insert: "インサート",
    transition: "場面転換",
  };
  // インサートのイベント名はZun○○ブランドで表示する。
  const EVENT_LABELS = {
    insert: {
      warning: "ZunMonitor（警告）",
      ok: "ZunMonitor（正常）",
      chat: "ZunAI（AIチャット）",
      teamchat: "ZunChat（チームチャット）",
      mailer: "ZunMail（メール）",
    },
  };

  const categories = Object.keys(CATEGORY_LABELS);
  for (const cat of categories) {
    const events = seMap[cat] || {};
    const eventKeys = Object.keys(events);
    if (eventKeys.length === 0) continue;

    // カテゴリ見出し
    const hdr = document.createElement("div");
    hdr.className = "audio-section-header";
    hdr.textContent = CATEGORY_LABELS[cat];
    container.appendChild(hdr);

    for (const evtKey of eventKeys) {
      const ev = events[evtKey] || {};
      const row = document.createElement("div");
      row.className = "se-event-row";

      // イベント名ラベル
      const lbl = document.createElement("span");
      lbl.className = "se-event-label";
      lbl.textContent = (EVENT_LABELS[cat] && EVENT_LABELS[cat][evtKey]) || evtKey;
      row.appendChild(lbl);

      // SEファイル ドロップダウン
      const sel = document.createElement("select");
      sel.className = "field-select se-event-sel";
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "なし";
      sel.appendChild(noneOpt);
      for (const seFile of (audioAssets.se || [])) {
        const opt = document.createElement("option");
        opt.value = seFile; opt.textContent = seFile;
        sel.appendChild(opt);
      }
      sel.value = ev.file || "";
      sel.addEventListener("change", () => {
        seMap[cat][evtKey].file = sel.value;
      });
      row.appendChild(sel);
      row.appendChild(makeAudioPlayBtn(() => sel.value));

      // 有効(ON/OFF)チェックボックス＋ラベル
      const TOOLTIP = "OFFにすると、ファイルを設定していてもこのSEは鳴りません（自動再生を無効化）";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "se-enabled-cb";
      cb.checked = ev.enabled !== false;
      cb.title = TOOLTIP;
      cb.addEventListener("change", () => {
        seMap[cat][evtKey].enabled = cb.checked;
      });
      const cbLabel = document.createElement("label");
      cbLabel.style.cssText = "display:flex; align-items:center; gap:4px; flex-shrink:0; font-size:12px; color:var(--text2); cursor:pointer;";
      cbLabel.title = TOOLTIP;
      cbLabel.appendChild(cb);
      cbLabel.appendChild(document.createTextNode("有効"));
      row.appendChild(cbLabel);

      // 音量スライダー
      const volWrap = document.createElement("div");
      volWrap.style.cssText = "display:flex; align-items:center; gap:4px; flex-shrink:0;";
      const volSlider = document.createElement("input");
      volSlider.type = "range"; volSlider.min = "0"; volSlider.max = "1"; volSlider.step = "0.05";
      volSlider.value = ev.volume != null ? ev.volume : 0.8;
      volSlider.className = "se-event-vol";
      volSlider.style.cssText = "width:90px; accent-color:var(--accent);";
      const volDisp = document.createElement("span");
      volDisp.className = "vol-display";
      volDisp.textContent = parseFloat(volSlider.value).toFixed(2);
      volSlider.addEventListener("input", () => {
        const v = parseFloat(volSlider.value);
        volDisp.textContent = v.toFixed(2);
        seMap[cat][evtKey].volume = v;
      });
      volWrap.appendChild(volSlider);
      volWrap.appendChild(volDisp);
      row.appendChild(volWrap);

      container.appendChild(row);
    }
  }

  if (container.children.length === 0) {
    container.innerHTML = "<div style=\"font-size:12px;color:var(--text2);\">SEマップが空です（se-map.json が未作成）</div>";
  }
}

async function saveSeMap() {
  const statusEl = document.getElementById("seMapStatus");
  statusEl.style.color = "var(--text2)";
  statusEl.textContent = "保存中...";
  try {
    const r = await fetch("/api/se-map", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(seMap),
    });
    const result = await r.json();
    if (r.ok && result.ok) {
      statusEl.style.color = "var(--green)";
      statusEl.textContent = "保存しました";
      setTimeout(() => { statusEl.textContent = ""; }, 2500);
    } else {
      statusEl.style.color = "var(--danger)";
      statusEl.textContent = "保存失敗: " + (result.error || r.status);
    }
  } catch (e) {
    statusEl.style.color = "var(--danger)";
    statusEl.textContent = "通信エラー";
  }
}

    volSlider.style.cssText = "width:90px; accent-color:var(--accent);";
    const volDisp = document.createElement("span");
    volDisp.className = "vol-display";
    volDisp.textContent = parseFloat(volSlider.value).toFixed(2);
    volSlider.addEventListener("input", () => {
      volDisp.textContent = parseFloat(volSlider.value).toFixed(2);
    });
    volWrap.appendChild(volSlider);
    volWrap.appendChild(volDisp);
    row.appendChild(volWrap);

    container.appendChild(row);
  }
}

async function saveSceneBgm() {
  const statusEl = document.getElementById("sceneBgmStatus");
  statusEl.style.color = "var(--text2)";
  statusEl.textContent = "保存中...";
  try {
    // UI から収集
    const updates = {};
    const container = document.getElementById("sceneBgmContainer");
    const rows = container.querySelectorAll(".scene-bgm-row");
    for (const row of rows) {
      const sel = row.querySelector(".scene-bgm-sel");
      const volSlider = row.querySelector("input[type=range]");
      if (!sel) continue;
      const sk = sel.dataset.key;
      updates[sk] = {
        bgm: sel.value || null,
        volume: volSlider ? parseFloat(volSlider.value) : 0.25,
      };
    }
    const r = await fetch("/api/scene-bgm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ updates }),
    });
    const result = await r.json();
    if (r.ok && result.ok) {
      statusEl.style.color = "var(--green)";
      statusEl.textContent = "保存しました";
      setTimeout(() => { statusEl.textContent = ""; }, 2500);
      // タイムラインのBGM表示を最新化
      _sceneBgmMap = null;
      ensureSceneBgmMap().then(drawScriptTimeline);
    } else {
      statusEl.style.color = "var(--danger)";
      statusEl.textContent = "保存失敗: " + (result.error || r.status);
    }
  } catch (e) {
    statusEl.style.color = "var(--danger)";
    statusEl.textContent = "通信エラー";
  }
}

// ============================================================
// ターン詳細: 手動SE
// ============================================================
function renderManualSe() {
  const list = document.getElementById("fSeList");
  if (!list) return;
  list.innerHTML = "";
  if (selectedIdx < 0) return;
  const turn = storyData.script[selectedIdx];
  const seItems = (turn.se) ? turn.se : [];
  for (let i = 0; i < seItems.length; i++) {
    list.appendChild(makeManualSeRow(i, seItems[i]));
  }
}

function makeManualSeRow(idx, seItem) {
  const row = document.createElement("div");
  row.className = "se-manual-row";

  // SEファイル選択
  const sel = document.createElement("select");
  sel.className = "field-select se-manual-sel";
  const noneOpt = document.createElement("option");
  noneOpt.value = ""; noneOpt.textContent = "なし";
  sel.appendChild(noneOpt);
  const seFiles = audioAssets ? (audioAssets.se || []) : [];
  for (const f of seFiles) {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f.replace(/^se\//, "");
    sel.appendChild(opt);
  }
  // audioAssetsが未ロードの場合、現在値だけ追加して保持
  if (seItem.file && !seFiles.includes(seItem.file)) {
    const opt = document.createElement("option");
    opt.value = seItem.file; opt.textContent = seItem.file;
    sel.insertBefore(opt, sel.firstChild);
  }
  sel.value = seItem.file || "";
  sel.addEventListener("change", () => { collectManualSe(); });
  row.appendChild(sel);
  row.appendChild(makeAudioPlayBtn(() => sel.value));

  // at（オフセット秒）
  const atLbl = document.createElement("span");
  atLbl.style.cssText = "font-size:11px; color:var(--text2); flex-shrink:0;";
  atLbl.textContent = "at";
  const atInp = document.createElement("input");
  atInp.type = "number"; atInp.className = "field-input se-manual-at";
  atInp.min = "0"; atInp.step = "0.1"; atInp.placeholder = "0.0";
  atInp.value = seItem.at != null ? seItem.at : "";
  atInp.addEventListener("input", () => { collectManualSe(); });
  row.appendChild(atLbl); row.appendChild(atInp);

  // 音量
  const volLbl = document.createElement("span");
  volLbl.style.cssText = "font-size:11px; color:var(--text2); flex-shrink:0;";
  volLbl.textContent = "vol";
  const volInp = document.createElement("input");
  volInp.type = "number"; volInp.className = "field-input se-manual-vol";
  volInp.min = "0"; volInp.max = "1"; volInp.step = "0.05"; volInp.placeholder = "0.8";
  volInp.value = seItem.volume != null ? seItem.volume : "";
  volInp.addEventListener("input", () => { collectManualSe(); });
  row.appendChild(volLbl); row.appendChild(volInp);

  // 削除ボタン
  const delBtn = document.createElement("button");
  delBtn.className = "btn btn-danger btn-sm";
  delBtn.style.flexShrink = "0";
  delBtn.textContent = "×";
  delBtn.addEventListener("click", () => {
    if (selectedIdx < 0) return;
    const t = storyData.script[selectedIdx];
    if (!t.se) return;
    t.se.splice(idx, 1);
    if (t.se.length === 0) delete t.se;
    markDirty();
    renderManualSe();
  });
  row.appendChild(delBtn);
  return row;
}

function collectManualSe() {
  if (selectedIdx < 0) return;
  const list = document.getElementById("fSeList");
  if (!list) return;
  const rows = list.querySelectorAll(".se-manual-row");
  const items = [];
  for (const row of rows) {
    const sel = row.querySelector(".se-manual-sel");
    const atInp = row.querySelector(".se-manual-at");
    const volInp = row.querySelector(".se-manual-vol");
    if (!sel || !sel.value) continue;
    const obj = { file: sel.value };
    if (atInp && atInp.value !== "") obj.at = parseFloat(atInp.value);
    if (volInp && volInp.value !== "") obj.volume = parseFloat(volInp.value);
    items.push(obj);
  }
  const turn = storyData.script[selectedIdx];
  if (items.length > 0) {
    turn.se = items;
  } else {
    delete turn.se;
  }
  markDirty();
}

// ============================================================
// エントリポイント
// ============================================================
init().catch(e => {
  setStatus("err", "初期化失敗: " + e.message);
  console.error(e);
});
</script>
