name: Align Subtitles

on:
  workflow_dispatch:
    inputs:
      use_words:
        description: '単語単位タイムスタンプ方式で字幕を生成（既定）。オフ＝従来のセグメント方式'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ffmpegインストール
        run: sudo apt-get update --fix-missing && sudo apt-get install -y --fix-missing ffmpeg

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: Whisperモデルのキャッシュ
        id: hfcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-faster-whisper-medium

      - name: 大人向けアライメント
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # キャッシュヒット時はオフラインにしてHFへのアクセス（429の原因）を回避
          HF_HUB_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '' }}
        run: |
          FLAG=""
          if [ "${{ inputs.use_words }}" = "true" ]; then FLAG="--use-words"; fi
          echo "アライメント方式: ${FLAG:-（セグメント方式）}"
          for i in 1 2 3 4 5; do
            python main.py --align-only --output-dir docs/main $FLAG && break
            echo "リトライ $i/5（HF 429等）。30秒待機..."; sleep 30
          done

      - name: 成果物をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/main/meta.json
          git add -f logs/align_diag.jsonl 2>/dev/null || true
          METHOD="${{ inputs.use_words == true && 'word' || 'segment' }}"
          git diff --staged --quiet || git commit -m "chore: update alignment ($METHOD) [skip ci]"
          git push

      - name: Cloudflare Pagesデプロイ
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/ --project-name=news-digest-tts
