# ニュースソース設定
sources:
  rss:
    - name: NHKニュース
      url: https://www.nhk.or.jp/rss/news/cat0.xml
    - name: NASA Breaking News
      url: https://www.nasa.gov/rss/dyn/breaking_news.rss
    - name: Science Daily
      url: https://www.sciencedaily.com/rss/all.xml
    - name: BBC Science & Environment
      url: https://feeds.bbci.co.uk/news/science_and_environment/rss.xml

# 収集設定
collection:
  lookback_hours: 12
  cache_days: 7

# 音声生成設定
digest:
  target_minutes: 10
  language: ja

# トピック設定（小学1年生向け・親が安心して見せられる内容）
topics:
  - 動物・生き物・昆虫
  - 宇宙・星・月
  - 恐竜・化石
  - 自然・天気・季節
  - 食べ物・料理・農業
  - スポーツ・オリンピック
  - 乗り物・ロボット・発明
  - 社会の良いニュース・助け合い

# 除外キーワード
exclude_keywords:
  - 訃報
  - 事件
  - 事故
  - 殺
  - 戦争
  - 暴力
  - 政治
  - 選挙
  - 株
  - 為替
  - プレスリリース
  - 経済
  - 裁判

# キャラクター設定
characters:
  host:
    gender: female
    name: ミク
    style: 元気いっぱいの小学1年生の女の子。「えーすごい！」「なんで？なんで？」「おもしろーい！」など1年生らしい素直でかわいい反応をする。難しい言葉は使わない。
  guest:
    gender: male
    name: 博士
    style: 優しくて面白いおじいさん博士。小学1年生にもわかるようにたとえ話を使って楽しく説明する。時々おやじギャグを言って笑わせる。

# モデル設定
models:
  text: gemini-2.5-flash
  tts: gemini-2.5-flash-preview-tts

# TTS音声設定
tts:
  host_voice: Zephyr    # female（最も高めの声）
  guest_voice: Orus     # male（落ち着いた声）
