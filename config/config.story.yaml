# 実は〇〇雑学 動画パイプライン設定
# 秘密情報は書かない（APIキーは環境変数 GEMINI_API_KEY / PEXELS_API_KEY / PIXABAY_API_KEY）

# 番組（実は〇〇雑学・掛け合い）の設定
story:
  genre: tech                          # ジャンルID。重複回避の履歴ファイルをジャンル別に分ける（topic_history/<genre>.json）
  theme: "実は知らないデジタルの名前の謎"   # 当面はこれで固定（微調整中）。空にすると theme_pool→Gemini自動 で巡回
  theme_pool:                          # theme が空のとき、ここから使用済み(topic_history)を避けて1つ巡回（techの軸は固定）
    - "実は知らないデジタルの名前の謎"
    - "キーボードと入力の意外な歴史"
    - "単位・記号の意外な由来"
    - "身近なアプリ・サービスの隠れた仕組み"
    - "有名IT企業・製品の創業の意外な話"
    - "コンピュータの数字と色の不思議"
  topics: 6                            # 1本に束ねる「実は」ネタの数（尺7〜8分前後）
  questioner: ずんだもん               # 聞き手・ボケ役
  explainer: 四国めたん                # 解説役・語り役
  target_minutes: 8                    # 狙う尺（分）。総量目安に使う（実測約335字/分換算）

# アバター性別割当 兼 画面配置（この定義順が画面配置: 上=画面左 / 下=画面右）。
# → 左=四国めたん（女性アバター） / 右=ずんだもん（男性アバター）。
characters_gender:
  四国めたん: female
  ずんだもん: male

models:
  text: gemini-3.5-flash     # 台本生成（無料枠・レート制限あり）。Stable・最新世代で台本品質が期待できる
  # 503(高負荷)/クォータ枯渇時に順に試すフォールバック（いずれも無料枠のStableモデル）
  # ※ gemini-2.0-flash は廃止進行中のため除外した
  text_fallbacks:
    - gemini-2.5-flash
    - gemini-3.1-flash-lite

# 画像取得（Phase2）。image_kindで振り分け: subject→wikimedia / ambient→pexels→pixabay。
# 商用可ライセンスのみ使用。Wikimediaは無認証、Pexels/Pixabayはキー無料登録（.env）。
images:
  width: 1280
  height: 720
  timeout: 30
  wikimedia:
    enable: true
    licenses: [PD, CC0, CC-BY]   # これ以外（CC-BY-SA/ND/不明）は除外
  pexels:
    enable: true
    api_key_env: PEXELS_API_KEY
  pixabay:
    enable: true
    api_key_env: PIXABAY_API_KEY

# VOICEVOX（自己ホスト・課金なし）。話者ID（四国めたん=2 / ずんだもん=3）。
# 接続先は環境変数 VOICEVOX_URL で上書き可（コンテナからは host.docker.internal:50021）。
tts_voicevox:
  base_url: http://localhost:50021
  speakers:
    ずんだもん: 3          # ノーマル
    四国めたん: 2          # ノーマル
  speed: 1.0
  pitch: 0.0
  intonation: 1.0
  voice_params:
    四国めたん:
      speed: 0.92
    ずんだもん:
      intonation: 1.3
  caption_max_chars: 22    # 字幕1枚の最大文字数
  inter_turn_pause: 0.3    # ターン間（話者交代）の無音秒
  chapter_gap_pause: 0.35  # ネタ(章)の境目に足す追加の間。0で無効。ネタの区切りを立てテンポの単調さを和らげる
  pre_phoneme_length: 0.0  # 各文の先頭の無音秒。0で文の境目のカクつきを抑える（長い説明が滑らかに）
  post_phoneme_length: 0.1 # 各文末の余韻秒＝文と文の間。大きいほど一文ずつ区切る感じ（耳で調整）

# BGM / 効果音(SE)。無料・商用可・収益化可の音源のみ（効果音ラボ/DOVA/魔王魂 等）。
# ファイルは video/assets/bgm/・video/assets/se/ に置く。無ければ自動でスキップ（無音）＝
# まず仕組みだけ動かし、実音は後で差し替えて調整する前提。音量は render を見て詰める。
audio:
  bgm:
    file: bgm.mp3          # video/assets/bgm/ に置く。空/無ければBGMなし
    volume: 0.07           # 声(1.0)を埋めない薄さ
    fade: 1.5              # 冒頭フェードイン/末尾フェードアウト秒
  se_volume: 0.5           # SE全体の音量
  se_min_gap: 0.8          # 直前SEからこの秒数以内のSEは抑制（連発防止・先勝ち）
  se:                      # トリガー → ファイル名（video/assets/se/ に置く）
    intro: intro.mp3       # 動画冒頭のチャイム
    outro: outro.mp3       # outro章の頭
    flash: flash.mp3       # ネタ切替（各ネタ最初の発言）
    surprise: surprise.mp3 # ずんだもん(聞き手)の驚き「ええー！？」の頭だけ
